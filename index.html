    <!-- UI polish: close hamburger drawer on outside-click / Esc; also
         keeps aria-expanded synced to the toggle state for screen readers. -->
    <script>
    (function () {
        const cb = document.getElementById('hdr-menu-toggle');
        const btn = document.querySelector('label[for="hdr-menu-toggle"]');
        function syncAria() {
            if (cb && btn) btn.setAttribute('aria-expanded', cb.checked ? 'true' : 'false');
        }
        syncAria();
        if (cb) cb.addEventListener('change', syncAria);
        document.addEventListener('click', (e) => {
            if (!cb || !cb.checked) return;
            const drawer = document.getElementById('header-collapse');
            if (drawer && drawer.contains(e.target)) return;
            // Don't close on the toggle button OR on the checkbox itself —
            // when the user clicks the label, the browser also dispatches
            // a synthetic click on the linked checkbox; intercepting THAT
            // click would re-uncheck the checkbox we just toggled open.
            if (e.target.closest('.hamburger-btn')) return;
            if (e.target === cb) return;
            cb.checked = false;
            cb.dispatchEvent(new Event('change'));
        }, true);
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            if (cb && cb.checked) {
                cb.checked = false;
                cb.dispatchEvent(new Event('change'));
            }
        });
    })();
    </script>

    (function () {
        const btn = document.getElementById('back-to-top');
        if (!btn) return;
        function update() {
            const y = window.scrollY || document.documentElement.scrollTop || 0;
            btn.hidden = y < 400;
        }
        btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        window.addEventListener('scroll', update, { passive: true });
        update();
    })();
    </script>
