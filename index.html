<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangMap - 多言語語順マップ</title>
    <link rel="stylesheet" href="styles.css?v=36">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Egyptian+Hieroglyphs&display=swap">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h1><a href="#" onclick="resetToDefaults(); return false;" class="logo-link"><span id="uiTitle">LangMap</span> <span class="subtitle" id="uiSubtitle">多言語語順マップ</span></a></h1>
            <a class="site-url" href="https://langmap.heuron.com">langmap.heuron.com</a>
        </div>

        <div class="controls">
            <div class="control-row">
                <div class="control-group" style="flex:2">
                    <label id="lblSentence" for="sampleSelect">文章選択</label>
                    <select id="sampleSelect"></select>
                </div>
                <div class="control-group" style="flex:0">
                    <label>&nbsp;</label>
                    <div class="btn-group">
                        <button class="btn" onclick="prevSentence()">◀</button>
                        <button class="btn" onclick="nextSentence()">▶</button>
                        <button class="btn btn-accent" id="btnRandom" onclick="randomSentence()">ランダム</button>
                    </div>
                </div>
            </div>

            <div class="control-row">
                <div class="control-group" style="flex:1">
                    <label>
                        <span id="lblLangToggle">表示言語</span>
                        <button class="btn-open-modal" id="btnOpenLangModal" onclick="openLangModal()">言語選択</button>
                    </label>
                    <div class="lang-summary" id="langSummary"></div>
                </div>
            </div>

        </div>

        <div class="map-toolbar">
            <button class="btn btn-sm" id="btnResetOrder" onclick="resetOrder()">↻ <span id="lblResetOrder">順序をリセット</span></button>
        </div>
        <div class="map-wrapper">
            <div class="map-container" id="mapContainer">
                <svg id="linesSvg" class="lines-svg"></svg>
                <div id="langRows"></div>
            </div>
        </div>

        <div class="rtl-note" id="rtlNote" style="display:none">
            <span id="rtlNoteText"></span>
            <label class="rtl-switch">
                <input type="checkbox" id="rtlToggle" onchange="toggleRtlNative(this.checked)">
                <span class="rtl-switch-slider"></span>
                <span id="rtlToggleLabel"></span>
            </label>
        </div>

        <div class="footer">
            <button class="btn btn-sm" id="btnSavePng" onclick="downloadAsPNG()">PNG保存</button>
            <button class="btn btn-sm" id="btnSaveSvg" onclick="downloadAsSVG()">SVG保存</button>
            <button class="btn btn-sm" id="btnSaveViewCsv" onclick="downloadViewAsCSV()">CSV保存</button>
            <span class="footer-sep"></span>
            <select id="csvLangSelect" style="font-size:12px;padding:2px 4px;max-width:160px;"></select>
            <button class="btn btn-sm" id="btnSaveCsv" onclick="downloadAsCSV()">CSV</button>
            <span class="footer-sep"></span>
            <button class="btn btn-sm btn-share" id="btnCopyUrl" onclick="copyShareURL()">URLコピー</button>
            <button class="btn btn-sm btn-share btn-x" onclick="shareToX()">X</button>
            <button class="btn btn-sm btn-share btn-fb" onclick="shareToFacebook()">Facebook</button>
            <button class="btn btn-sm btn-share btn-line" onclick="shareToLINE()">LINE</button>
        </div>
        <div class="site-footer">
            <div class="ui-lang-picker">
                <label id="lblUiLang">UI言語:</label>
                <select id="uiLangSelect"></select>
            </div>
            <div class="site-footer-links">
                <a href="https://github.com/jounlai/langmap" target="_blank" rel="noopener"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-3px;margin-right:2px"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>GitHub</a>
                <span class="footer-dot">&middot;</span>
                <a href="changelog.html">Changelog</a>
                <span class="footer-dot">&middot;</span>
                <a href="https://x.com/jounlai" target="_blank" rel="noopener"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;margin-right:2px"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>@jounlai</a>
                <span class="footer-dot">&middot;</span>
                <span id="siteCredit">制作: <a href="https://heuron.com" target="_blank" rel="noopener">ヒューロン株式会社</a> 趙 俊来 (Jounlai Cho)</span>
                <span class="footer-dot">&middot;</span>
                <a href="mailto:cho@heuron.com"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>cho@heuron.com</a>
            </div>
            <p class="disclaimer" id="disclaimer">本サイトは学習・娯楽を目的として制作されたものであり、言語学的な厳密性を保証するものではございません。誤りや改善点をお気づきの際は、<a href="https://github.com/jounlai/langmap" target="_blank" rel="noopener">GitHub</a>にてご修正いただくか、<a href="mailto:cho@heuron.com">作者</a>までご連絡くださいますようお願い申し上げます。</p>
        </div>
    </div>

    <div class="copy-toast" id="copyToast">URLをコピーしました</div>

    <!-- Language selector modal -->
    <div class="lang-modal-overlay" id="langModalOverlay">
        <div class="lang-modal">
            <div class="lang-modal-header">
                <span class="lang-modal-title" id="langModalTitle">言語選択</span>
                <div class="lang-modal-actions-top">
                    <button class="btn btn-sm btn-inline" id="btnModalAllOn" onclick="modalToggleAll(true)">全ON</button>
                    <button class="btn btn-sm btn-inline" id="btnModalAllOff" onclick="modalToggleAll(false)">全OFF</button>
                </div>
            </div>
            <div class="lang-modal-body" id="langModalBody"></div>
            <div class="lang-modal-footer">
                <button class="btn" id="btnModalCancel" onclick="closeLangModal(false)">キャンセル</button>
                <button class="btn btn-accent" id="btnModalConfirm" onclick="closeLangModal(true)">選択</button>
            </div>
        </div>
    </div>

    <script src="data.js?v=36"></script>
    <script src="app.js?v=36"></script>
</body>
</html>
