    html, body { margin: 0; height: 100%; }

        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

        display: flex; flex-direction: column; min-height: 100vh; padding: 0;
    }

    /* Header overrides for full-screen layout (defaults from styles.css) */
    .site-header-bar { flex: 0 0 auto; margin: 0; z-index: 10; }

    .controls-bar {
        flex: 0 0 auto; background: #fff;
        border-bottom: 1px solid #e8e8e8; padding: 8px 16px;
        display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        position: sticky; top: 0; z-index: 5;
    }
    .controls-bar input[type="text"] {
        flex: 1; min-width: 180px; max-width: 360px;
        padding: 6px 10px; font-size: 13px;
        border: 1px solid #d0d0d0; border-radius: 4px; background: #fff;
    }
    .controls-bar button {
        padding: 6px 12px; font-size: 12px; border: 1px solid #d0d0d0;
        background: #fff; color: #444; border-radius: 4px; cursor: pointer;
    }
    .controls-bar button:hover { background: #f1f3f4; }
    .controls-bar .stats { color: #888; font-size: 12px; margin-left: auto; }
    .controls-bar .legend { font-size: 11px; color: #888; }

    /* === Vertical collapsible tree === */
    .tree-wrap {
        flex: 1 1 auto;
        overflow: auto;
        padding: 14px 20px 80px;
        background: #fafbfc;
    }
    .tree, .tree ul {
        list-style: none; margin: 0; padding: 0;
    }
    .tree ul { padding-left: 24px; position: relative; }
    /* Connector lines: vertical down the left side, horizontal into each child */
    .tree li { position: relative; padding: 2px 0; }
    .tree ul > li::before {
        content: '';
        position: absolute;
        top: 13px; left: -12px; width: 10px; height: 0;
        border-top: 1.5px solid #c7d3e7;
    }
    .tree ul > li::after {
        content: '';
        position: absolute;
        top: 0; bottom: -2px; left: -12px;
        border-left: 1.5px solid #c7d3e7;
    }
    .tree ul > li:last-child::after {
        bottom: auto;
        height: 13px;  /* stop the line at the horizontal connector */
    }

    .node {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 8px;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
        line-height: 1.35;
    }
    .node:hover { background: #f1f3f4; }
    .node.match { background: #fff3c4; }
    .node .toggle {
        display: inline-block; width: 12px; text-align: center;
        color: #6b88b8; font-size: 10px; transition: transform 0.15s;
    }
    .node.expanded .toggle { transform: rotate(90deg); }
    .node.leaf .toggle { visibility: hidden; }

    .node .label {
        font-weight: 600; color: #2c4a7a;
    }
    .node .count {
        color: #888; font-size: 11px; font-weight: 400; margin-left: 2px;
    }
    .node.leaf .label { color: #333; font-weight: 400; }
    .node.leaf .label a { color: #1a73e8; text-decoration: none; }
    .node.leaf .label a:hover { text-decoration: underline; }
    .node.leaf .native {
        color: #888; font-size: 12px; margin-left: 8px;
        unicode-bidi: isolate;
    }
    .node.leaf .code {
        color: #aaa; font-size: 11px; font-family: monospace;
        margin-left: 8px;
    }

    /* family-color dot before each top-level family node */
    .family-dot {
        display: inline-block; width: 8px; height: 8px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
    }

    /* collapsed: hide children */
    li.collapsed > ul { display: none; }

    /* search hides non-matching */
    li.search-hidden { display: none; }

    .empty {
        color: #888; padding: 40px; text-align: center; font-size: 14px;
    }

    @media (max-width: 600px) {
        .tree-wrap { padding: 8px 10px 80px; }
        .tree ul { padding-left: 18px; }
        .tree ul > li::before { left: -10px; width: 8px; }
        .tree ul > li::after { left: -10px; }
        .node { padding: 2px 6px; }
    }
</style>

        sw: { 'All Languages':'Lugha Zote', 'Unclassified':'Bila uainishwa' },
    };
    function familyDisplayName(name) {
        // 1. Tree-specific overrides (root + Unclassified)
        const rootDict = TREE_ROOT_I18N[uiLang] || TREE_ROOT_I18N[uiLang.split('_')[0]];
        if (rootDict && rootDict[name]) return rootDict[name];
        // 2. Local FAMILY_NAMES_I18N — historically maintained ja/ko/zh sub-branch
        //    overrides (e.g. 'East Slavic', dialect group names not in FAMILY_ATOMS)
        const dict = FAMILY_NAMES_I18N[uiLang] || FAMILY_NAMES_I18N[uiLang.split('_')[0]];
        if (dict && dict[name]) return dict[name];
        // 3. Smart translator — uses META_I18N_ATOMS (FAMILY_ATOMS, country atoms,
        //    geo atoms, etc.) shared with the wordmap. Covers ~17 UI langs at the
        //    family-name level and decomposes compounds like 'East Slavic'.
        if (uiLang !== 'en' && typeof translateMetaSmart === 'function') {
            const t = translateMetaSmart(name, uiLang);
            if (t && t !== name) return t;
        }
        return name;
    }

    // ===== Dialect group i18n =====
    const DIALECT_LABELS = {
        en: 'dialects', ja: '方言', ko: '방언', zh: '方言', yue: '方言',
        vi: 'phương ngữ', th: 'ภาษาถิ่น', id: 'dialek', hi: 'बोलियाँ',
        de: 'Dialekte', fr: 'dialectes', it: 'dialetti', es: 'dialectos',
        pt: 'dialetos', ru: 'диалекты', uk: 'діалекти',
        ar: 'لهجات', he: 'ניבים', sw: 'lahaja',
    };
    function dialectsLabel() {
        return DIALECT_LABELS[uiLang] || DIALECT_LABELS[uiLang.split('_')[0]] || DIALECT_LABELS.en;
    }

    // ===== Family path parsing =====
    function parseFamilyPath(famStr) {
        if (!famStr) return ['Unclassified'];
        const m = famStr.match(/^([^()]+?)(?:\s*\(([^)]+)\))?$/);
        if (!m) return [famStr];
        const top = m[1].trim();
        const inner = (m[2] || '').trim();
        const subs = inner ? inner.split(',').map(s => s.trim()).filter(Boolean) : [];
        let path = [top, ...subs];
        if (FAMILY_PROMOTE[path[0]]) path.unshift(FAMILY_PROMOTE[path[0]]);
        return path;
    }

    function langDisplayName(code) {
        const names = (typeof LANG_NAMES !== 'undefined') && (LANG_NAMES[uiLang] || LANG_NAMES.en) || {};
        return names[code] || (LANG_DATA[code] && LANG_DATA[code].name) || code;
    }

    // Top-family color (deterministic by name)
    function familyColor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
        return 'hsl(' + (h % 360) + ', 55%, 55%)';
    }

    // ===== Hierarchy build =====
    // Internal node: { name, key, children: [], leafCount, isInternal: true }
    // Leaf:          { name, code, native, leafCount: 1, isInternal: false }
    // Dialect group: { name, isLanguageGroup: true, children: [standardLeaf, dialectsNode] }
    function buildHierarchy() {
        const root = { name: familyDisplayName('All Languages'), key: 'All Languages',
                       children: [], _byKey: new Map(), isInternal: true };

        // Pre-pass: detect dialect groups
        const dialectsOf = new Map();
        for (const code of Object.keys(LANG_DATA)) {
            const us = code.indexOf('_');
            if (us <= 0) continue;
            const base = code.substring(0, us);
            if (!LANG_DATA[base]) continue;
            if (!dialectsOf.has(base)) dialectsOf.set(base, []);
            dialectsOf.get(base).push(code);
        }

        for (const code of Object.keys(LANG_DATA)) {
            const us = code.indexOf('_');
            if (us > 0 && LANG_DATA[code.substring(0, us)]) continue;  // dialect — skip, handled via base

            const lang = LANG_DATA[code];
            const fam = (lang.meta && lang.meta.family) || 'Unclassified';
            const path = parseFamilyPath(fam);
            let node = root;
            for (const segment of path) {
                if (!node._byKey.has(segment)) {
                    const child = {
                        name: familyDisplayName(segment),
                        key: segment,
                        children: [],
                        _byKey: new Map(),
                        isInternal: true,
                    };
                    node._byKey.set(segment, child);
                    node.children.push(child);
                }
                node = node._byKey.get(segment);
            }

            const variants = dialectsOf.get(code);
            const fullName = langDisplayName(code);
            // Strip parenthetical (e.g. "日本語(標準)" → "日本語") for the
            // group node so we don't get duplicate "(標準)" strings.
            const bareName = fullName.replace(/\s*[（(][^）)]+[）)]\s*$/, '').trim() || fullName;

            if (variants && variants.length > 0) {
                const langGroup = {
                    name: bareName, key: bareName,
                    children: [], isInternal: true, isLanguageGroup: true,
                };
                // Standard child = the base code as a leaf with its full display name
                langGroup.children.push({
                    name: fullName, code: code, native: lang.native || '', isInternal: false,
                });
                // Dialects sub-node
                const dialectsNode = {
                    name: bareName + '（' + dialectsLabel() + '）', key: bareName + '_dialects',
                    children: [], isInternal: true, isDialectGroup: true,
                };
                for (const vCode of variants) {
                    const v = LANG_DATA[vCode];
                    dialectsNode.children.push({
                        name: langDisplayName(vCode), code: vCode, native: v.native || '', isInternal: false,
                    });
                }
                // Sort dialects alphabetically
                dialectsNode.children.sort((a, b) => a.name.localeCompare(b.name));
                langGroup.children.push(dialectsNode);
                node.children.push(langGroup);
            } else {
                node.children.push({
                    name: fullName, code: code, native: lang.native || '', isInternal: false,
                });
            }
        }

        // Sort: internals (by leaf count desc), then leaves alphabetically.
        function countLeaves(n) {
            if (!n.children || n.children.length === 0) return 1;
            return n.children.reduce((s, c) => s + countLeaves(c), 0);
        }
        function sortNode(n) {
            if (!n.children) return;
            n.children.forEach(sortNode);
            n.children.sort((a, b) => {
                const aInt = !!a.isInternal, bInt = !!b.isInternal;
                if (aInt && !bInt) return -1;
                if (!aInt && bInt) return 1;
                if (aInt && bInt) {
                    const la = countLeaves(a), lb = countLeaves(b);
                    if (la !== lb) return lb - la;
                }
                return a.name.localeCompare(b.name);
            });
            n.leafCount = countLeaves(n);
        }
        sortNode(root);

        return root;
    }

    // ===== Render to DOM =====
    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderTree(rootNode) {
        const out = renderUL(rootNode, true, 0);
        const wrap = document.getElementById('tree-root');
        wrap.innerHTML = out;
    }

    function renderUL(node, isRoot, depth) {
        if (!node.children || node.children.length === 0) return '';
        const liStrings = node.children.map(child => {
            const isLeaf = !child.isInternal;
            const initialCollapsed = !isRoot && !isLeaf && (child.children && child.children.length > 0);
            // At depth 0 (top-level family), collapsed by default.
            // (Initial state: only top-level visible.)
            const collapseClass = (isRoot && !isLeaf) ? 'collapsed' : (initialCollapsed && depth >= 1 ? 'collapsed' : '');
            const nodeClass = 'node' + (isLeaf ? ' leaf' : (collapseClass ? '' : ' expanded'));

            let line;
            if (isLeaf) {
                const lang = LANG_DATA[child.code];
                // Historical languages route into the wordmap's "歴史言語"
                // mode by appending hist=1; modern langs get hist=0.
                const isHist = (typeof HIST_DESCENDANT !== 'undefined') &&
                               Object.prototype.hasOwnProperty.call(HIST_DESCENDANT, child.code);
                const params = lang ? `lang=${encodeURIComponent(child.code)}&z=7&lat=${lang.lat}&lng=${lang.lng}&g3d=0&hist=${isHist?'1':'0'}&ui=${uiLang}` : '';
                line = '<span class="' + nodeClass + '" data-leaf="1">'
                    + '<span class="toggle">▶</span>'
                    + '<span class="label"><a href="wordmap.html#' + escapeHtml(params) + '">' + escapeHtml(child.name) + '</a></span>'
                    + (child.native ? '<span class="native" dir="auto">' + escapeHtml(child.native) + '</span>' : '')
                    + '<span class="code">[' + escapeHtml(child.code) + ']</span>'
                    + '</span>';
            } else {
                // Internal — show family-color dot for top-level only
                const dot = (depth === 0)
                    ? '<span class="family-dot" style="background:' + familyColor(child.key) + '"></span>'
                    : '';
                const total = child.leafCount || 0;
                line = '<span class="' + nodeClass + '">'
                    + '<span class="toggle">▶</span>'
                    + dot
                    + '<span class="label">' + escapeHtml(child.name) + '</span>'
                    + '<span class="count">(' + total + ')</span>'
                    + '</span>';
            }

            const subUL = isLeaf ? '' : renderUL(child, false, depth + 1);
            const liClass = collapseClass ? ' class="collapsed"' : '';
            return '<li' + liClass + '>' + line + subUL + '</li>';
        }).join('');
        return '<ul' + (isRoot ? '' : '') + '>' + liStrings + '</ul>';
    }

    function wireInteractions() {
        const root = document.getElementById('tree-root');
        // Toggle expand/collapse on internal-node click
        root.addEventListener('click', e => {
            // Don't toggle when leaf link is clicked (the link's natural behavior carries the user to wordmap)
            if (e.target.tagName === 'A') return;
            const node = e.target.closest('.node');
            if (!node || node.classList.contains('leaf')) return;
            const li = node.parentElement;  // <li>
            if (!li) return;
            li.classList.toggle('collapsed');
            node.classList.toggle('expanded');
        });
    }

    function expandAll() {
        document.getElementById('tree-root').querySelectorAll('li.collapsed').forEach(li => li.classList.remove('collapsed'));
        document.getElementById('tree-root').querySelectorAll('.node:not(.leaf)').forEach(n => n.classList.add('expanded'));
    }
    function collapseAll() {
        // Collapse everything except the synthetic root (which has no <li>).
        document.getElementById('tree-root').querySelectorAll('li').forEach(li => {
            if (li.querySelector(':scope > ul')) li.classList.add('collapsed');
        });
        document.getElementById('tree-root').querySelectorAll('.node:not(.leaf)').forEach(n => n.classList.remove('expanded'));
    }

    function searchFilter(query) {
        const root = document.getElementById('tree-root');
        const q = (query || '').trim().toLowerCase();
        // Reset
        root.querySelectorAll('li').forEach(li => li.classList.remove('search-hidden'));
        root.querySelectorAll('.node.match').forEach(n => n.classList.remove('match'));
        if (!q) return;

        // Hide all <li>s, then unhide ones matching the query (and their ancestors).
        const allLi = root.querySelectorAll('li');
        allLi.forEach(li => li.classList.add('search-hidden'));

        // Match against leaf nodes and family names
        const matchedLeafLi = [];
        const matchedInternalLi = [];
        root.querySelectorAll('.node').forEach(node => {
            const text = (node.textContent || '').toLowerCase();
            if (text.includes(q)) {
                const li = node.closest('li');
                if (!li) return;
                node.classList.add('match');
                if (node.classList.contains('leaf')) matchedLeafLi.push(li);
                else matchedInternalLi.push(li);
            }
        });

        function showWithAncestors(li) {
            let cur = li;
            while (cur && cur !== root) {
                if (cur.tagName === 'LI') {
                    cur.classList.remove('search-hidden');
                    cur.classList.remove('collapsed');
                    const node = cur.querySelector(':scope > .node');
                    if (node && !node.classList.contains('leaf')) node.classList.add('expanded');
                }
                cur = cur.parentElement;
            }
        }
        matchedLeafLi.forEach(showWithAncestors);
        matchedInternalLi.forEach(li => {
            showWithAncestors(li);
            // Also show all descendants of a matched internal node
            li.querySelectorAll('li').forEach(c => c.classList.remove('search-hidden'));
        });
    }

    // ===== Init =====
    let __treeData = null;
    function buildAndRender() {
        __treeData = buildHierarchy();
        document.getElementById('loading')?.remove();
        renderTree(__treeData);
        wireInteractions();
        document.getElementById('stats').textContent = t('stats', Object.keys(LANG_DATA).length);
    }

    function init() {
        populateUiLangSelect();
        applyI18n();
        buildAndRender();

        document.getElementById('expand-all').addEventListener('click', expandAll);
        document.getElementById('collapse-all').addEventListener('click', collapseAll);

        const searchInput = document.getElementById('search');
        let timer;
        searchInput.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(() => searchFilter(searchInput.value), 200);
        });
    }
})();
</script>
</body>
</html>
