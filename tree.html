<link rel="stylesheet" href="styles.css?v=59">
<style>
    html, body { margin: 0; height: 100%; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #222; background: #fafbfc; overflow: hidden;
        display: flex; flex-direction: column; min-height: 100vh;
        padding: 0;  /* override styles.css default body padding */
    }
    /* Tree page-specific overrides for the shared .site-header-bar from
       styles.css. Reset margin (which the shared rule offsets for inset
       containers) and let it sit as a flex item at the top. */
    .site-header-bar {
        flex: 0 0 auto;
        margin: 0;  /* override styles.css negative margin */
        z-index: 10;
    }
    /* UI-lang select styling now lives in styles.css
       (.site-header-bar .header-ui-lang) for cross-page consistency. */

    .controls-bar {
        flex: 0 0 auto;
        background: #fff;
        border-bottom: 1px solid #e8e8e8; padding: 8px 16px;
        display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        z-index: 9;
    }
    .controls-bar input[type="text"] {
        flex: 1; min-width: 180px; max-width: 320px;
        padding: 6px 10px; font-size: 13px;
        border: 1px solid #d0d0d0; border-radius: 4px; background: #fff;
    }
    .controls-bar select, .controls-bar button {
        padding: 6px 10px; font-size: 12px; border: 1px solid #d0d0d0;
        background: #fff; color: #444; border-radius: 4px; cursor: pointer;
    }
    .controls-bar button:hover { background: #f1f3f4; }
    .controls-bar .stats { color: #888; font-size: 12px; margin-left: auto; }
    .controls-bar .legend { font-size: 11px; color: #888; }

    /* Tree canvas: takes remaining viewport with pan/zoom */
    .tree-canvas {
        flex: 1 1 auto;
        position: relative;
        overflow: hidden; background: #fafbfc;
        min-height: 200px;
    }
    .tree-canvas svg {
        display: block; cursor: grab;
        background: radial-gradient(ellipse at center, #fff 0%, #f3f5f9 100%);
    }
    .tree-canvas svg:active { cursor: grabbing; }

    /* D3 node + link styling */
    .link {
        fill: none;
        stroke: #b8c8e0;
        stroke-width: 1.5px;
        stroke-opacity: 0.8;
        transition: stroke 0.2s, stroke-width 0.2s;
    }
    .link.highlighted { stroke: #1a73e8; stroke-width: 2.2px; stroke-opacity: 1; }

    .node circle {
        stroke-width: 2px;
        cursor: pointer;
        transition: fill 0.2s;  /* don't transition r — d3 manages it; CSS r-transition causes oscillation with applyMapLikeScale */
    }
    .node-internal circle { fill: #fff; stroke: #4a78c8; }
    .node-internal.collapsed circle { fill: #4a78c8; }
    .node-leaf circle { fill: #fff; stroke: #888; r: 4; }
    .node-leaf.match circle { fill: #ffd166; stroke: #b07000; }
    .node:hover circle { stroke-width: 3px; }

    .node text {
        font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        cursor: pointer;
        user-select: none;
        paint-order: stroke fill;
        stroke: #fff;
        stroke-width: 3px;
        stroke-linejoin: round;
        stroke-opacity: 0.9;
    }
    .node-internal text { font-weight: 600; fill: #2c4a7a; }
    .node-leaf text { fill: #333; }
    .node-leaf .native { fill: #888; font-size: 11px; }
    .node-leaf .code { fill: #aaa; font-size: 10px; font-family: monospace; }
    .node-leaf.match text { fill: #804000; font-weight: 600; }

    .node-internal:hover text { fill: #1a73e8; }
    .node-leaf:hover text { fill: #1a73e8; text-decoration: underline; }

    .empty { color: #888; padding: 40px; text-align: center; font-size: 14px; }

    /* Tooltip */
    .tooltip {
        position: absolute; pointer-events: none; background: rgba(40,40,50,0.95);
        color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 11px;
        line-height: 1.4; max-width: 280px; box-shadow: 0 2px 8px rgba(0,0,0,0.25);
        opacity: 0; transition: opacity 0.15s; z-index: 100;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip .name { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
    .tooltip .meta { color: #aaa; font-size: 10px; }

    @media (max-width: 600px) {
        .controls-bar { padding: 6px 10px; gap: 6px; }
        .controls-bar input[type="text"] { max-width: none; }
        .node text { font-size: 11px; }
        .node-leaf .native { font-size: 10px; }
    }
</style>

    // Cookie helpers (shared cross-page persistence; cookie 'wm_uilang')
    function getCookie(name) {
        const m = document.cookie.match(new RegExp('(^|;\\s*)' + name + '=([^;]*)'));
        return m ? decodeURIComponent(m[2]) : null;
    }
    function setCookie(name, value) {
        document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; max-age=31536000; SameSite=Lax';
    }

    // UI lang resolution: cookie → navigator.language → 'en'.
    // URL ?ui= param overrides for transient preview.
    function resolveUiLang() {
        try {
            const params = new URLSearchParams(location.search || location.hash.replace(/^#/, ''));
            const u = params.get('ui'); if (u && UI_I18N[u]) return u;
        } catch (e) {}
        const cookie = getCookie('wm_uilang');
        if (cookie && UI_I18N[cookie]) return cookie;
        if (cookie) { const base = cookie.split('_')[0]; if (UI_I18N[base]) return base; }
        // Backward-compat: also read old localStorage key
        try {
            const u = localStorage.getItem('wm.uiLang');
            if (u && UI_I18N[u]) { setCookie('wm_uilang', u); return u; }
        } catch (e) {}
        const nav = (navigator.language || 'en').toLowerCase().split('-')[0];
        if (UI_I18N[nav]) return nav;
        return 'en';
    }
    let uiLang = resolveUiLang();
    function t(key, ...args) {
        const dict = UI_I18N[uiLang] || UI_I18N.en;
        const v = dict[key];
        if (typeof v === 'function') return v(...args);
        return v != null ? v : (UI_I18N.en[key] || key);
    }
    if (uiLang === 'ar' || uiLang === 'he') document.documentElement.dir = 'rtl';

    function populateUiLangSelect() {
        const sel = document.getElementById('header-ui-lang');
        const NATIVE = { en:'English', ja:'日本語', ko:'한국어', zh:'中文', yue:'粵語', vi:'Tiếng Việt', th:'ภาษาไทย', id:'Bahasa Indonesia', hi:'हिन्दी', de:'Deutsch', fr:'Français', it:'Italiano', es:'Español', pt:'Português', ru:'Русский', uk:'Українська', ar:'العربية', he:'עברית', sw:'Kiswahili' };
        for (const u of Object.keys(UI_I18N)) {
            const opt = document.createElement('option');
            opt.value = u; opt.textContent = NATIVE[u] || u;
            if (u === uiLang) opt.selected = true;
            sel.appendChild(opt);
        }
        sel.title = t('uiLangLabel');
        sel.addEventListener('change', () => {
            uiLang = sel.value;
            setCookie('wm_uilang', uiLang);
            try { localStorage.setItem('wm.uiLang', uiLang); } catch (e) {}  // keep backward compat
            applyI18n();
            buildAndRender();
        });
    }

    function applyI18n() {
        document.title = t('title') + ' — LangMap';
        document.getElementById('search').placeholder = t('search');
        document.getElementById('expand-all').textContent = t('expand');
        document.getElementById('collapse-all').textContent = t('collapse');
        const zin = document.getElementById('zoom-in');   if (zin) zin.title = t('zoomIn');
        const zout = document.getElementById('zoom-out'); if (zout) zout.title = t('zoomOut');

        document.getElementById('legend').textContent = t('legend');

    function parseFamilyPath(famStr) {
        if (!famStr) return ['Unclassified'];
        const m = famStr.match(/^([^()]+?)(?:\s*\(([^)]+)\))?$/);
        if (!m) return [famStr];
        const top = m[1].trim();
        const inner = (m[2] || '').trim();
        const subs = inner ? inner.split(',').map(s => s.trim()).filter(Boolean) : [];
        let path = [top, ...subs];
        if (FAMILY_PROMOTE[path[0]]) path.unshift(FAMILY_PROMOTE[path[0]]);
        return path;
    }

        const names = (typeof LANG_NAMES !== 'undefined') && (LANG_NAMES[uiLang] || LANG_NAMES.en) || {};
        return names[code] || (LANG_DATA[code] && LANG_DATA[code].name) || code;
    }

    function familyDisplayName(name) {
        const dict = FAMILY_NAMES_I18N[uiLang] || FAMILY_NAMES_I18N[uiLang.split('_')[0]];
        if (dict && dict[name]) return dict[name];
        return name;  // fall back to original (English/source) name
    }

    // Build a hierarchy compatible with d3.hierarchy().
    // Each internal node carries both `name` (display, possibly translated) and
    // `nameKey` (English original) so search can match both.
    function buildHierarchy() {
        const root = { name: familyDisplayName('All Languages'), nameKey: 'All Languages', children: [], _byKey: new Map(), depth: 0, isInternal: true };
        for (const code of Object.keys(LANG_DATA)) {
            const lang = LANG_DATA[code];
            const fam = (lang.meta && lang.meta.family) || 'Unclassified';
            const path = parseFamilyPath(fam);
            let node = root;
            for (const segment of path) {
                if (!node._byKey.has(segment)) {
                    const child = { name: familyDisplayName(segment), nameKey: segment, children: [], _byKey: new Map(), isInternal: true };
                    node._byKey.set(segment, child);
                    node.children.push(child);
                }
                node = node._byKey.get(segment);
            }
            node.children.push({
                name: langDisplayName(code),
                code: code,
                native: lang.native || '',
                isInternal: false,
            });
        }
        // Sort children by genealogical-cluster proximity rather than pure
        // alphabetical (per user request 「系統が近いもの同士で並べて」).
        // Within each parent: internals first, then leaves; both ranked by
        // descendant-leaf count descending (so larger and arguably more
        // typologically-significant subtrees cluster together at the top of
        // each ring), with alphabetical name as tiebreaker.
        function countLeaves(n) {
            if (!n.children || n.children.length === 0) return 1;
            return n.children.reduce((s, c) => s + countLeaves(c), 0);
        }
        function sortNode(n) {
            if (!n.children) return;
            n.children.forEach(sortNode);  // recurse first so leaf counts are ready
            n.children.sort((a, b) => {
                if (a.isInternal && !b.isInternal) return -1;
                if (!a.isInternal && b.isInternal) return 1;
                if (a.isInternal && b.isInternal) {
                    const la = countLeaves(a), lb = countLeaves(b);
                    if (la !== lb) return lb - la;  // larger family first
                }
                return a.name.localeCompare(b.name);
            });
        }
        sortNode(root);
        // Attach descendant counts
        function countDescendants(n) {
            if (!n.children || n.children.length === 0) return 1;
            let c = 0;
            for (const child of n.children) c += countDescendants(child);
            n.descendantLeaves = c;
            return c;
        }
        countDescendants(root);
        return root;
    }

    // Color per top-level family (deterministic by name hash → HSL hue)
    function familyColor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
        const hue = h % 360;
        return `hsl(${hue}, 55%, 50%)`;
    }

    // === D3 rendering ====================================================
    let svg, g, gLinks, gNodes, root, treeLayout, zoom, lastTransform;
    const tooltip = document.getElementById('tooltip');

    function makeSvg() {
        const canvas = document.getElementById('tree-canvas');
        canvas.innerHTML = '';
        const w = canvas.clientWidth || 800;
        const h = canvas.clientHeight || 600;
        svg = d3.select(canvas).append('svg')
            .attr('width', w).attr('height', h);
        g = svg.append('g');
        gLinks = g.append('g').attr('class', 'links');
        gNodes = g.append('g').attr('class', 'nodes');
        zoom = d3.zoom()
            .scaleExtent([0.2, 8])
            .on('zoom', (event) => {
                g.attr('transform', event.transform);
                lastTransform = event.transform;
                applyMapLikeScale(event.transform.k);
                relayoutRingsForZoom(event.transform.k);
            });
        svg.call(zoom);
        return { w, h };
    }

    // Live re-layout: recompute each node's radial distance based on the
    // current zoom level, then update node and link positions in place
    // (no transitions — needs to be cheap since this fires on every zoom event).
    function relayoutRingsForZoom(k) {
        if (!root || !gNodes) return;
        const ringStep = currentRingStep(k);
        root.each(d => { d.y = d.depth * ringStep; });
        gNodes.selectAll('g.node').attr('transform', d => {
            const angleDeg = d.x * 180 / Math.PI - 90;
            return `rotate(${angleDeg}) translate(${d.y},0)`;
        });
        const linkPath = d3.linkRadial().angle(d => d.x).radius(d => d.y);
        gLinks.selectAll('path.link').attr('d', linkPath);
    }

    // Apply map-like scaling to a specific selection of node g elements
    // (used for entering nodes in update() so they start at the right
    // pixel size without re-touching every existing node mid-transition).
    function applyMapLikeScaleToSelection(nodeSel, k) {
        nodeSel.select('circle')
            .style('r', d => ((d.data.isInternal ? (d._children ? 6 : 5) : 4) / k) + 'px')
            .style('stroke-width', (2 / k) + 'px');
        nodeSel.selectAll('text')
            .style('stroke-width', (3 / k) + 'px');
        nodeSel.selectAll('.node-internal text, text:not(.native):not(.code)')
            .style('font-size', (12 / k) + 'px');
        nodeSel.selectAll('text.native').style('font-size', (11 / k) + 'px');
        nodeSel.selectAll('text.code').style('font-size', (10 / k) + 'px');
        nodeSel.selectAll('text').each(function() {
            const parentDatum = d3.select(this.parentNode).datum();
            const sign = (parentDatum.x >= Math.PI) ? -1 : 1;
            d3.select(this).attr('x', (sign * 9) / k);
        });
    }

    // Map-like zoom: positions scale with k, but visual sizes (circle radius,
    // text font-size, line stroke width, text-to-circle offset) are
    // counter-scaled by 1/k so they stay constant on screen — like a map's
    // road labels and pin icons stay the same pixel size when you zoom.
    //
    // IMPORTANT: must use .style() not .attr() so inline CSS beats the
    // external stylesheet (CSS properties have higher cascade priority than
    // SVG presentation attributes).
    function applyMapLikeScale(k) {
        if (!g) return;
        // Link stroke (px so it overrides the .link { stroke-width: 1.5px } rule)
        g.selectAll('.link').style('stroke-width', (1.5 / k) + 'px');
        // Text font-sizes per class
        g.selectAll('.node-internal text').style('font-size', (12 / k) + 'px');
        g.selectAll('.node-leaf text:not(.native):not(.code)').style('font-size', (12 / k) + 'px');
        g.selectAll('.node-leaf text.native').style('font-size', (11 / k) + 'px');
        g.selectAll('.node-leaf text.code').style('font-size', (10 / k) + 'px');
        // Text white halo (overrides .node text { stroke-width: 3px })
        g.selectAll('.node text').style('stroke-width', (3 / k) + 'px');
        // Circle outline width (overrides .node circle { stroke-width: 2px })
        g.selectAll('.node circle').style('stroke-width', (2 / k) + 'px');
        // Circle radius — set as both attr and style to defeat CSS `.node-leaf
        // circle { r: 4 }` and similar.
        g.selectAll('.node circle').each(function(d) {
            const baseR = d.data.isInternal ? (d._children ? 6 : 5) : 4;
            d3.select(this).style('r', (baseR / k) + 'px').attr('r', baseR / k);
        });
        // Text-to-circle offset (counter-scale so labels stay close to circles).
        // x is a positional attribute, not a styled one, so attr() is correct here.
        g.selectAll('.node text').each(function() {
            const parentDatum = d3.select(this.parentNode).datum();
            const sign = (parentDatum.x >= Math.PI) ? -1 : 1;
            d3.select(this).attr('x', (sign * 9) / k);
        });
    }

    function collapseDeep(node, currentDepth, maxDepth) {
        if (!node.children) return;
        if (currentDepth >= maxDepth) {
            node._children = node.children;
            node.children = null;
            return;
        }
        node.children.forEach(c => collapseDeep(c, currentDepth + 1, maxDepth));
    }

    // Base ring distance at zoom k=1 (pixels between depth levels).
    const RING_STEP_BASE = 130;
    // Compression curve: as zoom k grows, ring distance shrinks so the
    // visual depth-to-depth gap stays roughly constant (or even shrinks
    // slightly at very high zoom). With exponent 1.0 the visual distance
    // is exactly constant (1/k * k = 1); >1 shrinks visually; <1 grows.
    // 0.92 ≈ slight visual compression as the user zooms in.
    const RING_COMPRESSION_EXP = 0.92;
    function currentRingStep(k) {
        return RING_STEP_BASE / Math.pow(Math.max(0.001, k), RING_COMPRESSION_EXP);
    }

    // Helper for radial layout: convert (angle in radians, radius) → (x, y) in
    // SVG coordinates. Angle 0 = up (12 o'clock), increases clockwise.
    function polarToCartesian(angleRad, radius) {
        return [radius * Math.cos(angleRad - Math.PI / 2),
                radius * Math.sin(angleRad - Math.PI / 2)];
    }

    function update(source) {
        const nodes = root.descendants();
        const links = root.links();

        // Compute layout. d3.tree places each node at a radius proportional
        // to its DEPTH, so collapsed branches at depth 2 stay inside the
        // ring of depth-3 leaves of an expanded sibling.
        const visibleDepths = d3.max(nodes, d => d.depth) || 1;
        const treeLayoutR = d3.tree()
            .size([2 * Math.PI, RING_STEP_BASE * visibleDepths])
            .separation((a, b) => (a.parent === b.parent ? 1 : 2) / Math.max(1, a.depth));
        treeLayoutR(root);
        // After layout, force d.y = depth * compressed-ring-step so each
        // depth gets its own concentric ring AT A SHRINKING DISTANCE as
        // the zoom level increases (per user 「拡大すると居地が縮む」).
        // Visual ring-to-ring distance = (RING_STEP_BASE / k) * k = constant
        // when compression = 1/k, or shrinks when compression < 1/k.
        const k = (lastTransform && lastTransform.k) || 1;
        const ringStep = currentRingStep(k);
        root.each(d => { d.y = d.depth * ringStep; });

        // === Links === Smooth Bezier curves between parent and child via
        // d3.linkRadial — naturally curves through the polar plane.
        const linkPath = d3.linkRadial().angle(d => d.x).radius(d => d.y);

        const link = gLinks.selectAll('path.link')
            .data(links, d => d.target.__id || (d.target.__id = ++linkSeq));

        link.enter().append('path')
            .attr('class', 'link')
            .attr('d', d => {
                // Animate from the parent's previous (or current) position
                const o0 = { x: source.x0 ?? source.x, y: source.y0 ?? source.y };
                return linkPath({ source: o0, target: o0 });
            })
            .merge(link)
            .transition().duration(500)
            .attr('d', linkPath)
            .attr('stroke', d => {
                // Color link by closest top-level family ancestor
                let n = d.target;
                while (n.parent && n.parent.depth > 1) n = n.parent;
                if (n && n.depth === 1) return familyColor(n.data.name);
                return '#b8c8e0';
            });

        link.exit().transition().duration(500)
            .attr('d', d => {
                const o = { x: source.x, y: source.y };
                return linkPath({ source: o, target: o });
            })
            .remove();

        // === Nodes ===
        const node = gNodes.selectAll('g.node')
            .data(nodes, d => d.__id || (d.__id = ++nodeSeq));

        // Initial position for entering nodes: at the parent's previous position
        const startTransform = d => {
            const ax = source.x0 ?? source.x ?? 0;
            const ay = source.y0 ?? source.y ?? 0;
            const [cx, cy] = polarToCartesian(ax, ay);
            return `translate(${cx},${cy})`;
        };
        // Final radial transform: rotate+translate puts node at (angle, radius).
        // Then text is rotated within the node's local frame so it reads outward
        // (right side of disk: text reads left-to-right; left side: rotate 180°).
        const finalTransform = d => {
            const angleDeg = d.x * 180 / Math.PI - 90;  // rotate so radial axis points "right"
            return `rotate(${angleDeg}) translate(${d.y},0)`;
        };

        const nodeEnter = node.enter().append('g')
            .attr('class', d => 'node ' + (d.data.isInternal ? 'node-internal' : 'node-leaf') + (d._children ? ' collapsed' : '') + (d.data._matched ? ' match' : ''))
            .attr('transform', startTransform)
            .style('opacity', 0);

        // Circle (drawn at local origin; node group's transform places it)
        nodeEnter.append('circle')
            .attr('r', d => d.data.isInternal ? (d._children ? 6 : 5) : 4)
            .attr('stroke', d => {
                let n = d;
                while (n.parent && n.parent.depth > 1) n = n.parent;
                return n && n.depth === 1 ? familyColor(n.data.name) : '#888';
            });

        // Text label: rotate so it reads outward. If node is on the left half
        // of the disk (angle > π), flip text 180° and anchor "end" so it reads
        // from outside in.
        function textRotation(d) {
            return (d.x >= Math.PI) ? 180 : 0;
        }
        function textAnchor(d) {
            return (d.x >= Math.PI) ? 'end' : 'start';
        }
        function textX(d) {
            const offset = d.data.isInternal ? 9 : 9;
            return (d.x >= Math.PI) ? -offset : offset;
        }

        // Internal node text: family name + count
        nodeEnter.filter(d => d.data.isInternal).append('text')
            .attr('dy', '0.31em')
            .attr('x', textX)
            .attr('text-anchor', textAnchor)
            .attr('transform', d => `rotate(${textRotation(d)})`)
            .text(d => d.data.name + ' (' + (d.data.descendantLeaves || (d._children || d.children || []).length) + ')');

        // Leaf node text — show display name, native, and code on three lines
        // arranged radially outward.
        const leafEnter = nodeEnter.filter(d => !d.data.isInternal);
        leafEnter.append('text')
            .attr('dy', '0.31em')
            .attr('x', textX)
            .attr('text-anchor', textAnchor)
            .attr('transform', d => `rotate(${textRotation(d)})`)
            .text(d => d.data.name);
        leafEnter.append('text')
            .attr('class', 'native')
            .attr('dy', '1.45em')
            .attr('x', textX)
            .attr('text-anchor', textAnchor)
            .attr('transform', d => `rotate(${textRotation(d)})`)
            .attr('dir', 'auto')
            .text(d => d.data.native || '');
        leafEnter.append('text')
            .attr('class', 'code')
            .attr('dy', d => d.data.native ? '2.55em' : '1.45em')
            .attr('x', textX)
            .attr('text-anchor', textAnchor)
            .attr('transform', d => `rotate(${textRotation(d)})`)
            .text(d => '[' + d.data.code + ']');

        // Click handler
        nodeEnter
            .on('click', (event, d) => {
                event.stopPropagation();
                if (d.data.isInternal) {
                    if (d.children) {
                        d._children = d.children;
                        d.children = null;
                    } else if (d._children) {
                        d.children = d._children;
                        d._children = null;
                    }
                    update(d);
                } else {
                    const lang = LANG_DATA[d.data.code];
                    if (!lang) return;
                    const params = new URLSearchParams();
                    params.set('lang', d.data.code);
                    params.set('z', '7');
                    params.set('lat', String(lang.lat));
                    params.set('lng', String(lang.lng));
                    params.set('g3d', '0');
                    params.set('ui', uiLang);
                    location.href = 'wordmap.html#' + params.toString();
                }
            })
            .on('mouseenter', (event, d) => showTooltip(event, d))
            .on('mousemove', (event) => moveTooltip(event))
            .on('mouseleave', hideTooltip);

        // Update all nodes (entering + existing) to their final radial positions.
        const nodeUpdate = nodeEnter.merge(node);
        nodeUpdate.transition().duration(500)
            .attr('transform', finalTransform)
            .style('opacity', 1)
            .attr('class', d => 'node ' + (d.data.isInternal ? 'node-internal' : 'node-leaf') + (d._children ? ' collapsed' : '') + (d.data._matched ? ' match' : ''));

        nodeUpdate.select('circle')
            .attr('r', d => d.data.isInternal ? (d._children ? 6 : 5) : 4);

        // Re-orient text on existing nodes whose angle changed
        nodeUpdate.selectAll('text')
            .transition().duration(500)
            .attr('transform', function() {
                const parentDatum = d3.select(this.parentNode).datum();
                return `rotate(${textRotation(parentDatum)})`;
            })
            .attr('text-anchor', function() {
                const parentDatum = d3.select(this.parentNode).datum();
                return textAnchor(parentDatum);
            })
            .attr('x', function() {
                const parentDatum = d3.select(this.parentNode).datum();
                return textX(parentDatum);
            });

        // Exit
        node.exit().transition().duration(500)
            .attr('transform', startTransform)
            .style('opacity', 0)
            .remove();

        // Cache positions for next transition's animation origin
        root.each(d => { d.x0 = d.x; d.y0 = d.y; });

        // Apply map-like counter-scaling for ENTERING nodes immediately so
        // they start at the right pixel size. EXISTING nodes are left to
        // their in-flight 500ms transition (their counter-scaling already
        // matches the previous zoom level, which is unchanged during an
        // expand/collapse). A page-wide refresh is deferred via setTimeout
        // to AFTER the transition completes — using setTimeout (not d3
        // transition) so we don't interrupt the in-flight d3 transition
        // queue on the same selection.
        const currentK = (lastTransform && lastTransform.k) || 1;
        applyMapLikeScaleToSelection(nodeEnter, currentK);
        gLinks.selectAll('path.link').style('stroke-width', (1.5 / currentK) + 'px');
        // Schedule a final reconciliation after transitions complete so any
        // newly-shifted text positions are corrected for left/right side
        // (text rotation flips at angle = π).
        clearTimeout(window.__treeMapScaleTimer);
        window.__treeMapScaleTimer = setTimeout(() => {
            applyMapLikeScale(currentK);
        }, 540);
    }
    let linkSeq = 0, nodeSeq = 0;

    function showTooltip(event, d) {
        if (d.data.isInternal) {
            const total = d.data.descendantLeaves || (d.descendants().length - 1);
            tooltip.innerHTML = '<div class="name">' + escapeHtml(d.data.name) + '</div><div class="meta">' + total + ' ' + escapeHtml(t('langsWord')) + '</div>';
        } else {
            const lang = LANG_DATA[d.data.code]; if (!lang) return;
            const m = lang.meta || {};
            tooltip.innerHTML = '<div class="name">' + escapeHtml(d.data.name) + (d.data.native ? ' · <span dir="auto">' + escapeHtml(d.data.native) + '</span>' : '') + '</div>'
                + '<div class="meta">' + escapeHtml(m.family || '') + (m.speakers ? ' · ' + escapeHtml(m.speakers) : '') + '</div>'
                + '<div class="meta">[' + escapeHtml(d.data.code) + ']' + (m.iso6393 ? ' · ISO-3: ' + escapeHtml(m.iso6393) : '') + '</div>';
        }
        tooltip.classList.add('visible');
        moveTooltip(event);
    }
    function moveTooltip(event) {
        const x = event.clientX + 14, y = event.clientY + 14;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
    }
    function hideTooltip() { tooltip.classList.remove('visible'); }

    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function expandAll(node) {
        if (node._children) { node.children = node._children; node._children = null; }
        if (node.children) node.children.forEach(expandAll);
    }
    function collapseAll(node, depth) {
        if (depth >= 1 && node.children) {
            node._children = node.children; node.children = null;
        }
        if (node.children) node.children.forEach(c => collapseAll(c, depth + 1));
        if (node._children) node._children.forEach(c => collapseAll(c, depth + 1));
    }

    function search(query) {
        const q = (query || '').trim().toLowerCase();
        // Reset matches
        root.descendants().forEach(d => { d.data._matched = false; });
        if (!q) {
            // Return tree to default state (expand top 3 levels)
            collapseAll(root, 0);
            collapseDeepHierarchy(root, 0, 3);
            update(root);
            return;
        }
        // Find matches
        let matchedAny = false;
        root.descendants().forEach(d => {
            if (d.data.isInternal) return;
            const name = (d.data.name || '').toLowerCase();
            const native = (d.data.native || '').toLowerCase();
            const code = (d.data.code || '').toLowerCase();
            if (name.includes(q) || native.includes(q) || code.includes(q)) {
                d.data._matched = true;
                matchedAny = true;
                // Expand all ancestors
                let p = d.parent;
                while (p) {
                    if (p._children) {
                        p.children = p._children;
                        p._children = null;
                    }
                    p = p.parent;
                }
            }
        });
        update(root);
    }

    // Set initial collapse depth
    function collapseDeepHierarchy(node, depth, maxDepth) {
        if (depth >= maxDepth && node.children) {
            node._children = node.children; node.children = null;
        }
        if (node.children) node.children.forEach(c => collapseDeepHierarchy(c, depth + 1, maxDepth));
        if (node._children) node._children.forEach(c => collapseDeepHierarchy(c, depth + 1, maxDepth));
    }

    function buildAndRender() {
        const data = buildHierarchy();
        root = d3.hierarchy(data, d => d.children);
        root.x0 = 0; root.y0 = 0;
        // Initial collapse: top-level family rows visible, subfamilies collapsed (depth 2 cutoff)
        // Initial state: only show top-level family nodes (per user
        // request 「最初開いた時は１階層までにしといて」).
        collapseDeepHierarchy(root, 0, 1);
        document.getElementById('loading')?.remove();
        makeSvg();
        update(root);
        document.getElementById('stats').textContent = t('stats', Object.keys(LANG_DATA).length);
    }

    function centerInitialView() {
        if (!svg || !zoom) return;
        const canvas = document.getElementById('tree-canvas');
        const w = canvas.clientWidth || 800;
        const h = canvas.clientHeight || 600;
        // Center the radial dendrogram in the canvas.
        const tx = w / 2;
        const ty = h / 2;
        svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty));
    }

    function init() {
        populateUiLangSelect();
        applyI18n();
        buildAndRender();
        centerInitialView();

        document.getElementById('expand-all').addEventListener('click', () => {
            expandAll(root); update(root);
        });
        document.getElementById('collapse-all').addEventListener('click', () => {
            collapseAll(root, 0);
            collapseDeepHierarchy(root, 0, 1);
            update(root);
        });
        document.getElementById('reset-view').addEventListener('click', () => {
            centerInitialView();
        });
        // Zoom in/out buttons. Use the THIRD argument to scaleBy so the
        // zoom is centered on the current viewport center — that way the
        // visual focus stays in the middle of the screen instead of
        // drifting toward the SVG origin (top-left). 2× factor per click
        // (was 1.5×) for a snappier zoom.
        const ZOOM_FACTOR = 2;
        function viewCenterPoint() {
            const c = document.getElementById('tree-canvas');
            return [(c.clientWidth || 800) / 2, (c.clientHeight || 600) / 2];
        }
        document.getElementById('zoom-in').addEventListener('click', () => {
            if (svg && zoom) svg.transition().duration(250).call(zoom.scaleBy, ZOOM_FACTOR, viewCenterPoint());
        });
        document.getElementById('zoom-out').addEventListener('click', () => {
            if (svg && zoom) svg.transition().duration(250).call(zoom.scaleBy, 1 / ZOOM_FACTOR, viewCenterPoint());
        });

        const searchInput = document.getElementById('search');
        let searchTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => search(searchInput.value), 200);
        });

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('tree-canvas');
            if (svg) {
                svg.attr('width', canvas.clientWidth).attr('height', canvas.clientHeight);
            }
        });
    }
})();
</script>
</body>
</html>
