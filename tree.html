     Fonts so the Serif family is the only option. -->

<style>
    /* Lock the page to the viewport — only .tree-wrap scrolls. iOS
       Safari's overflow:hidden alone doesn't hold against rubber-band
       touch on the header; position:fixed + width/height 100% on
       html+body is the recipe that does. */
    html, body {
        position: fixed;
        top: 0; left: 0;
        margin: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
    }
    body {
        /* Tibetan fonts MUST NOT be in the body cascade — Kailasa
         * (iOS system font) has very large vertical metrics and iOS
         * Safari uses it to calculate line-boxes for the whole
         * document, which surfaces as button-text-shifted-upward in
         * any element with an explicit line-height. Scope Tibetan to
         * .node.leaf .native below, which is the only selector that
         * actually contains Tibetan codepoints on this page. */
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
            sans-serif;
        color: #222; background: #fafbfc;
        display: flex; flex-direction: column; padding: 0;
        touch-action: pan-x pan-y;
    }

    /* Header overrides for full-screen layout (defaults from styles.css) */
    /* z-index 1101 keeps the header above the hamburger backdrop (1099)
       so the menu chrome stays visible against the dimmed page. */
    .site-header-bar { flex: 0 0 auto; margin: 0; z-index: 1101; }

    .controls-bar {
        flex: 0 0 auto; background: #fff;
        border-bottom: 1px solid #e8e8e8; padding: 8px 16px;
        display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        position: sticky; top: 0; z-index: 5;
    }
    .controls-bar input[type="text"] {
        flex: 1; min-width: 180px; max-width: 360px;
        padding: 6px 10px; font-size: 13px;
        border: 1px solid #d0d0d0; border-radius: 4px; background: #fff;
    }
    .controls-bar button {
        padding: 6px 12px; font-size: 12px; border: 1px solid #d0d0d0;
        background: #fff; color: #444; border-radius: 4px; cursor: pointer;
    }
    .controls-bar button:hover { background: #f1f3f4; }
    .controls-bar .stats { color: #888; font-size: 12px; margin-left: auto; }
    .controls-bar .legend { font-size: 11px; color: #888; }

    /* === Vertical collapsible tree === */
    .tree-wrap {
        flex: 1 1 auto;
        overflow: auto;
        padding: 14px 20px 80px;
        background: #fafbfc;
    }
    .tree, .tree ul {
        list-style: none; margin: 0; padding: 0;
    }
    .tree ul { padding-left: 24px; position: relative; }
    /* Connector lines: vertical down the left side, horizontal into each child */
    .tree li { position: relative; padding: 2px 0; }
    .tree ul > li::before {
        content: '';
        position: absolute;
        top: 13px; left: -12px; width: 10px; height: 0;
        border-top: 1.5px solid #c7d3e7;
    }
    .tree ul > li::after {
        content: '';
        position: absolute;
        top: 0; bottom: -2px; left: -12px;
        border-left: 1.5px solid #c7d3e7;
    }
    .tree ul > li:last-child::after {
        bottom: auto;
        height: 13px;  /* stop the line at the horizontal connector */
    }

    .node {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 8px;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
        line-height: 1.35;
    }
    .node:hover { background: #f1f3f4; }
    .node.match { background: #fff3c4; }
    /* Last-visited language: subtle blue highlight + animated pulse on
       initial scroll-in so the returning user can find their language
       in the 700+ tree without scanning by hand. */
    .node.last-visited {
        background: #e3f0ff;
        box-shadow: inset 0 0 0 1px #8ab4f8;
    }
    .node.last-visited.flash {
        animation: lastVisitedPulse 1.6s ease-out 1;
    }
    @keyframes lastVisitedPulse {
        0%   { background: #ffe082; box-shadow: inset 0 0 0 2px #f9a825; }
        100% { background: #e3f0ff; box-shadow: inset 0 0 0 1px #8ab4f8; }
    }
    .node .toggle {
        display: inline-block; width: 12px; text-align: center;
        color: #6b88b8; font-size: 10px; transition: transform 0.15s;
    }
    .node.expanded .toggle { transform: rotate(90deg); }
    .node.leaf .toggle { visibility: hidden; }

    .node .label {
        font-weight: 600; color: #2c4a7a;
    }
    .node .count {
        color: #888; font-size: 11px; font-weight: 400; margin-left: 2px;
    }
    .node.leaf .label { color: #333; font-weight: 400; }
    .node.leaf .label a { color: #1a73e8; text-decoration: none; }
    .node.leaf .label a:hover { text-decoration: underline; }
    .node.leaf .native {
        /* Tibetan-script native names (e.g. བོད་སྐད, ཆོས་སྐད, རྫོང་ཁ)
         * need a Tibetan font in the cascade. Scoped here — see body
         * rule for why we can't keep Kailasa in the body chain. */
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
            'Noto Serif Tibetan', 'Kailasa', 'Microsoft Himalaya', 'Jomolhari', 'Tibetan Machine Uni',
            sans-serif;
        color: #888; font-size: 12px; margin-left: 8px;
        unicode-bidi: isolate;
    }
    .node.leaf .code {
        color: #aaa; font-size: 11px; font-family: monospace;
        margin-left: 8px;
    }

    /* family-color dot before each top-level family node */
    .family-dot {
        display: inline-block; width: 8px; height: 8px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
    }

    /* collapsed: hide children */
    li.collapsed > ul { display: none; }

    /* search hides non-matching */
    li.search-hidden { display: none; }

    .empty {
        color: #888; padding: 40px; text-align: center; font-size: 14px;
    }

    @media (max-width: 600px) {
        .tree-wrap { padding: 8px 10px 80px; }
        .tree ul { padding-left: 18px; }
        .tree ul > li::before { left: -10px; width: 8px; }
        .tree ul > li::after { left: -10px; }
        .node { padding: 2px 6px; }
        /* Allow long node labels to wrap on narrow screens instead of
           overflowing the viewport. The native-name and code stay
           inline but reflow naturally. */
        .node { flex-wrap: wrap; row-gap: 1px; }
        .node .label, .node.leaf .label, .node.leaf .native {
            word-break: break-word; overflow-wrap: anywhere;
        }
    }

    /* Audit Task 232: prevent iOS Safari focus auto-zoom (font < 16px). */
    @media (max-width: 768px) {
        input[type="text"], input[type="search"], input[type="number"],
        input[type="email"], select, textarea, .header-ui-lang, #search {
            font-size: 16px !important;
        }
    }

    /* .back-to-top styles live in styles.css (shared with index.html). */
</style>

<!-- UI polish: close hamburger drawer on outside-click / Esc; also
     keeps aria-expanded synced to the toggle state for screen readers. -->
<script>
(function () {
    const cb = document.getElementById('hdr-menu-toggle');
    const btn = document.querySelector('label[for="hdr-menu-toggle"]');
    function syncAria() {
        if (cb && btn) btn.setAttribute('aria-expanded', cb.checked ? 'true' : 'false');
    }
    syncAria();
    if (cb) cb.addEventListener('change', syncAria);
    document.addEventListener('click', (e) => {
        if (!cb || !cb.checked) return;
        const drawer = document.getElementById('header-collapse');
        if (drawer && drawer.contains(e.target)) return;
        // Don't close on the toggle button OR on the checkbox itself —
        // when the user clicks the label, the browser also dispatches
        // a synthetic click on the linked checkbox; intercepting THAT
        // click would re-uncheck the checkbox we just toggled open.
        if (e.target.closest('.hamburger-btn')) return;
        if (e.target === cb) return;
        cb.checked = false;
        cb.dispatchEvent(new Event('change'));
    }, true);
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Escape') return;
        if (cb && cb.checked) {
            cb.checked = false;
            cb.dispatchEvent(new Event('change'));
        }
    });
})();
</script>

<button type="button" id="back-to-top" class="back-to-top" aria-label="Scroll to top" hidden>↑</button>
<script>
(function () {
    const btn = document.getElementById('back-to-top');
    const wrap = document.querySelector('.tree-wrap');
    if (!btn || !wrap) return;
    function update() {
        // Use the document scrollY since tree-wrap usually doesn't have its
        // own scrollbar — the page scrolls.
        const y = window.scrollY || document.documentElement.scrollTop || 0;
        btn.hidden = y < 400;
    }
    btn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    window.addEventListener('scroll', update, { passive: true });
    update();
})();
</script>

    function resolveUiLang() {
        try {
            const params = new URLSearchParams(location.search || location.hash.replace(/^#/, ''));
            const u = params.get('ui'); if (u && UI_I18N[u]) return u;
        } catch (e) {}
        const cookie = getCookie('wm_uilang');
        if (cookie && UI_I18N[cookie]) return cookie;
        if (cookie) { const base = cookie.split('_')[0]; if (UI_I18N[base]) return base; }
        const nav = (navigator.language || 'en').toLowerCase().split('-')[0];
        if (UI_I18N[nav]) return nav;
        return 'en';
    }
    let uiLang = resolveUiLang();
    function t(key, ...args) {
        const dict = UI_I18N[uiLang] || UI_I18N.en;
        const v = dict[key];
        if (typeof v === 'function') return v(...args);
        return v != null ? v : (UI_I18N.en[key] || key);
    }
    if (uiLang === 'ar' || uiLang === 'he') document.documentElement.dir = 'rtl';

    function populateUiLangSelect() {
        const sel = document.getElementById('header-ui-lang');
        const NATIVE = { en:'English', ja:'日本語', ko:'한국어', zh:'中文', yue:'粵語', vi:'Tiếng Việt', th:'ภาษาไทย', id:'Bahasa Indonesia', hi:'हिन्दी', de:'Deutsch', fr:'Français', it:'Italiano', es:'Español', pt:'Português', ru:'Русский', uk:'Українська', ar:'العربية', he:'עברית', sw:'Kiswahili' };
        for (const u of Object.keys(UI_I18N)) {
            const opt = document.createElement('option');
            opt.value = u; opt.textContent = NATIVE[u] || u;
            if (u === uiLang) opt.selected = true;
            sel.appendChild(opt);
        }
        sel.addEventListener('change', () => {
            uiLang = sel.value;
            setCookie('wm_uilang', uiLang);
            applyI18n();
            buildAndRender();
            // Re-apply the last-visited highlight after the tree DOM is
            // rebuilt under the new UI language.
            if (getLastVisited()) requestAnimationFrame(() => revealLastVisited({ smooth: false, flash: false }));
        });
    }

    function applyI18n() {
        document.title = t('title') + ' — LangMap';
        const searchEl = document.getElementById('search');
        searchEl.placeholder = t('search');
        // Audit Task 161: keep aria-label aligned with the visible
        // placeholder so screen-reader users hear the localized prompt.
        searchEl.setAttribute('aria-label', t('search').replace(/^[\s🔍]+/, ''));
        const expandEl = document.getElementById('expand-all');
        const collapseEl = document.getElementById('collapse-all');
        expandEl.textContent = t('expand');
        expandEl.setAttribute('aria-label', t('expand'));
        collapseEl.textContent = t('collapse');
        collapseEl.setAttribute('aria-label', t('collapse'));
        const jumpEl = document.getElementById('jump-last');
        if (jumpEl) {
            jumpEl.textContent = t('jumpLast');
            jumpEl.setAttribute('aria-label', t('jumpLast'));
        }
        document.getElementById('legend').textContent = t('legend');
        const treeRoot = document.getElementById('tree-root');
        if (treeRoot) treeRoot.setAttribute('aria-label', t('title'));
        function setNavText(el, text) {
            if (!el) return;
            const last = el.lastChild;
            if (last && last.nodeType === Node.TEXT_NODE) last.textContent = text;
            else el.appendChild(document.createTextNode(text));
        }
        setNavText(document.getElementById('nav-order'), t('navOrder'));
        setNavText(document.getElementById('nav-map'), t('navMap'));
        setNavText(document.getElementById('nav-han'), t('navHan'));
        setNavText(document.getElementById('nav-tree'), t('navTree'));
    }

            'All Languages':'所有语言', 'Unclassified':'未分类', 'Language isolate':'孤立语',
            'Indo-European':'印欧语系', 'Germanic':'日耳曼语支', 'Romance':'罗曼语族',
            'Slavic':'斯拉夫语族', 'Indo-Aryan':'印度雅利安语支', 'Iranian':'伊朗语支',
            'Celtic':'凯尔特语族', 'Hellenic':'希腊语族',
            'Sino-Tibetan':'汉藏语系', 'Sinitic':'汉语族', 'Tibeto-Burman':'藏缅语族',
            'Mandarin':'官话', 'Cantonese':'粤语', 'Min Nan':'闽南语', 'Hakka':'客家话',
            'Atlantic-Congo':'大西洋-刚果语系', 'Bantu':'班图语支',
            'Afro-Asiatic':'亚非语系', 'Semitic':'闪米特语族',
            'Japonic':'日本语系', 'Koreanic':'朝鲜语系',
            'Austronesian':'南岛语系', 'Polynesian':'波利尼西亚',
            'Austroasiatic':'南亚语系',
            'Kra-Dai':'壮侗语系', 'Hmong-Mien':'苗瑶语系', 'Dravidian':'达罗毗荼语系',
            'Turkic':'突厥语族', 'Mongolic':'蒙古语族', 'Tungusic':'通古斯语族',
            'Uralic':'乌拉尔语系', 'Nilo-Saharan':'尼罗-撒哈拉语系',
            'Constructed':'人工语言', 'English-based creole':'英语克里奥尔语',
            'Northern':'北部', 'Southern':'南部', 'Eastern':'东部', 'Western':'西部',
            'Central':'中央', 'Old':'古', 'Middle':'中世', 'Modern':'现代',
        },
    };
    // Tree-specific labels for the synthetic root + the rare "Unclassified"
    // fallback. These don't appear in meta.family, so translateMetaSmart()
    // can't translate them. Minimal entry per UI lang.
    const TREE_ROOT_I18N = {
        en: { 'All Languages':'All Languages', 'Unclassified':'Unclassified' },
        ja: { 'All Languages':'全言語', 'Unclassified':'未分類' },
        ko: { 'All Languages':'전 언어', 'Unclassified':'미분류' },
        zh: { 'All Languages':'所有语言', 'Unclassified':'未分类' },
        yue:{ 'All Languages':'所有語言', 'Unclassified':'未分類' },
        vi: { 'All Languages':'Tất cả ngôn ngữ', 'Unclassified':'Chưa phân loại' },
        th: { 'All Languages':'ทุกภาษา', 'Unclassified':'ไม่ได้จำแนก' },
        id: { 'All Languages':'Semua Bahasa', 'Unclassified':'Belum diklasifikasi' },
        hi: { 'All Languages':'सभी भाषाएँ', 'Unclassified':'अवर्गीकृत' },
        de: { 'All Languages':'Alle Sprachen', 'Unclassified':'Nicht klassifiziert' },
        fr: { 'All Languages':'Toutes les langues', 'Unclassified':'Non classé' },
        it: { 'All Languages':'Tutte le lingue', 'Unclassified':'Non classificato' },
        es: { 'All Languages':'Todas las lenguas', 'Unclassified':'Sin clasificar' },
        pt: { 'All Languages':'Todas as línguas', 'Unclassified':'Não classificado' },
        ru: { 'All Languages':'Все языки', 'Unclassified':'Неклассифицировано' },
        uk: { 'All Languages':'Усі мови', 'Unclassified':'Некласифіковано' },
        ar: { 'All Languages':'كل اللغات', 'Unclassified':'غير مصنفة' },
        he: { 'All Languages':'כל השפות', 'Unclassified':'לא מסווג' },
        sw: { 'All Languages':'Lugha Zote', 'Unclassified':'Bila uainishwa' },
    };
    function familyDisplayName(name) {
        // 1. Tree-specific overrides (root + Unclassified)
        const rootDict = TREE_ROOT_I18N[uiLang] || TREE_ROOT_I18N[uiLang.split('_')[0]];
        if (rootDict && rootDict[name]) return rootDict[name];
        // 2. Local FAMILY_NAMES_I18N — historically maintained ja/ko/zh sub-branch
        //    overrides (e.g. 'East Slavic', dialect group names not in FAMILY_ATOMS)
        const dict = FAMILY_NAMES_I18N[uiLang] || FAMILY_NAMES_I18N[uiLang.split('_')[0]];
        if (dict && dict[name]) return dict[name];
        // 3. Smart translator — uses META_I18N_ATOMS (FAMILY_ATOMS, country atoms,
        //    geo atoms, etc.) shared with the wordmap. Covers ~17 UI langs at the
        //    family-name level and decomposes compounds like 'East Slavic'.
        if (uiLang !== 'en' && typeof translateMetaSmart === 'function') {
            const t = translateMetaSmart(name, uiLang);
            if (t && t !== name) return t;
        }
        return name;
    }

    // ===== Dialect group i18n =====
    const DIALECT_LABELS = {
        en: 'dialects', ja: '方言', ko: '방언', zh: '方言', yue: '方言',
        vi: 'phương ngữ', th: 'ภาษาถิ่น', id: 'dialek', hi: 'बोलियाँ',
        de: 'Dialekte', fr: 'dialectes', it: 'dialetti', es: 'dialectos',
        pt: 'dialetos', ru: 'диалекты', uk: 'діалекти',
        ar: 'لهجات', he: 'ניבים', sw: 'lahaja',
    };
    function dialectsLabel() {
        return DIALECT_LABELS[uiLang] || DIALECT_LABELS[uiLang.split('_')[0]] || DIALECT_LABELS.en;
    }

    // ===== Family path parsing =====
    function parseFamilyPath(famStr) {
        if (!famStr) return ['Unclassified'];
        const m = famStr.match(/^([^()]+?)(?:\s*\(([^)]+)\))?$/);
        if (!m) return [famStr];
        const top = m[1].trim();
        const inner = (m[2] || '').trim();
        const subs = inner ? inner.split(',').map(s => s.trim()).filter(Boolean) : [];
        let path = [top, ...subs];
        if (FAMILY_PROMOTE[path[0]]) path.unshift(FAMILY_PROMOTE[path[0]]);
        return path;
    }

    function langDisplayName(code) {
        const names = (typeof LANG_NAMES !== 'undefined') && (LANG_NAMES[uiLang] || LANG_NAMES.en) || {};
        return names[code] || (LANG_DATA[code] && LANG_DATA[code].name) || code;
    }

    // Top-family color (deterministic by name)
    function familyColor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
        return 'hsl(' + (h % 360) + ', 55%, 55%)';
    }

    // ===== Hierarchy build =====
    // Internal node: { name, key, children: [], leafCount, isInternal: true }
    // Leaf:          { name, code, native, leafCount: 1, isInternal: false }
    // Language group: { name, isLanguageGroup: true, children: [standardLeaf, dialect1, dialect2, ...] }
    //   2026-05-09 restructure: dialects are now SIBLINGS of the standard form, not nested
    //   under a separate "(dialects)" wrapper.
    function buildHierarchy() {
        const root = { name: familyDisplayName('All Languages'), key: 'All Languages',
                       children: [], _byKey: new Map(), isInternal: true };

        // Pre-pass: detect dialect groups via either underscore-base OR meta.parentCode.
        // 2026-05-09 fix: also recognize parentCode-based grouping so es_mx/es_co/etc.
        // group under es_eu (their declared parent), not as separate top-level rows under "Romance".
        const dialectsOf = new Map();
        const baseOf = new Map();
        for (const code of Object.keys(LANG_DATA)) {
            const pc = LANG_DATA[code]?.meta?.parentCode;
            let base = null;
            if (pc && LANG_DATA[pc] && pc !== code) {
                base = pc;
            } else {
                const us = code.indexOf('_');
                if (us > 0 && LANG_DATA[code.substring(0, us)]) base = code.substring(0, us);
            }
            if (!base) continue;
            if (!dialectsOf.has(base)) dialectsOf.set(base, []);
            dialectsOf.get(base).push(code);
            baseOf.set(code, base);
        }

        for (const code of Object.keys(LANG_DATA)) {
            if (baseOf.has(code)) continue;  // dialect/variant — handled via its base

            const lang = LANG_DATA[code];
            const fam = (lang.meta && lang.meta.family) || 'Unclassified';
            const path = parseFamilyPath(fam);
            let node = root;
            for (const segment of path) {
                if (!node._byKey.has(segment)) {
                    const child = {
                        name: familyDisplayName(segment),
                        key: segment,
                        children: [],
                        _byKey: new Map(),
                        isInternal: true,
                    };
                    node._byKey.set(segment, child);
                    node.children.push(child);
                }
                node = node._byKey.get(segment);
            }

            const variants = dialectsOf.get(code);
            const fullName = langDisplayName(code);
            // Strip parenthetical (e.g. "日本語(標準)" → "日本語") for the
            // group node so we don't get duplicate "(標準)" strings.
            const bareName = fullName.replace(/\s*[（(][^）)]+[）)]\s*$/, '').trim() || fullName;

            if (variants && variants.length > 0) {
                // 2026-05-09: dialects are siblings of the standard form (no nested
                // "(dialects)" wrapper). Standard form first, then variants alphabetical.
                const langGroup = {
                    name: bareName, key: bareName,
                    children: [], isInternal: true, isLanguageGroup: true,
                };
                // Standard child = the base code as a leaf with its full display name
                // (isStandardForm flag keeps it first within the language group regardless of sort)
                langGroup.children.push({
                    name: fullName, code: code, native: lang.native || '', isInternal: false,
                    isStandardForm: true,
                });
                // Add each variant as a direct sibling
                const dialectLeaves = [];
                for (const vCode of variants) {
                    const v = LANG_DATA[vCode];
                    dialectLeaves.push({
                        name: langDisplayName(vCode), code: vCode, native: v.native || '', isInternal: false,
                    });
                }
                dialectLeaves.sort((a, b) => a.name.localeCompare(b.name));
                for (const d of dialectLeaves) langGroup.children.push(d);
                node.children.push(langGroup);
            } else {
                node.children.push({
                    name: fullName, code: code, native: lang.native || '', isInternal: false,
                });
            }
        }

        // Sort:
        //   - internals (by leaf count desc) — bigger families first
        //   - leaves by speaker count desc — Spanish before Galician, ja before ainu
        //   - within a language group: standard form first, then variants by speaker count
        // (2026-05-09 user request: 重要度順や類似した言語を近く. Family tree already
        //  groups similar langs; within siblings, sort by importance = speaker count.)
        function countLeaves(n) {
            if (!n.children || n.children.length === 0) return 1;
            return n.children.reduce((s, c) => s + countLeaves(c), 0);
        }
        function speakerCountFor(node) {
            if (!node || !node.code) {
                // For a language group internal node, use its standard form's speaker count
                if (node && node.isLanguageGroup && node.children && node.children.length > 0) {
                    const std = node.children.find(c => c.isStandardForm) || node.children[0];
                    return speakerCountFor(std);
                }
                return 0;
            }
            const lang = (typeof LANG_DATA !== 'undefined') ? LANG_DATA[node.code] : null;
            const m = lang && lang.meta;
            if (!m) return 0;
            // Prefer structured speakerCount: l1 → total → rangeMax → l1RangeMax
            const sc = m.speakerCount;
            if (sc) {
                const v = sc.l1 ?? sc.total ?? sc.rangeMax ?? sc.l1RangeMax;
                if (typeof v === 'number' && v > 0) return v;
            }
            // Fallback: parse m.speakers prose (e.g. "~125M", "~5K", "12-15M")
            const sp = String(m.speakers || '').match(/(\d+(?:[.,]\d+)?)\s*([KMB])\b/i);
            if (sp) {
                const n = parseFloat(sp[1].replace(/,/g, ''));
                const u = sp[2].toUpperCase();
                return n * (u === 'B' ? 1e9 : u === 'M' ? 1e6 : 1e3);
            }
            // Fallback: plain number with comma separator
            const plain = String(m.speakers || '').match(/(\d{1,3}(?:,\d{3})+|\d{4,})/);
            if (plain) return parseInt(plain[1].replace(/,/g, ''), 10) || 0;
            return 0;
        }
        function sortNode(n) {
            if (!n.children) return;
            n.children.forEach(sortNode);
            const isLangGroup = !!n.isLanguageGroup;
            n.children.sort((a, b) => {
                // Within a language group: standard form ALWAYS first
                if (isLangGroup) {
                    if (a.isStandardForm && !b.isStandardForm) return -1;
                    if (!a.isStandardForm && b.isStandardForm) return 1;
                }
                const aInt = !!a.isInternal, bInt = !!b.isInternal;
                if (aInt && !bInt) return -1;
                if (!aInt && bInt) return 1;
                if (aInt && bInt) {
                    // Both internal nodes: by leaf count desc, then by speakerCount of representative
                    const la = countLeaves(a), lb = countLeaves(b);
                    if (la !== lb) return lb - la;
                    const sa = speakerCountFor(a), sb = speakerCountFor(b);
                    if (sa !== sb) return sb - sa;
                    return a.name.localeCompare(b.name);
                }
                // Both leaves: by speaker count desc (importance order)
                const sa = speakerCountFor(a), sb = speakerCountFor(b);
                if (sa !== sb) return sb - sa;
                return a.name.localeCompare(b.name);
            });
            n.leafCount = countLeaves(n);
        }
        sortNode(root);

        return root;
    }

    // ===== Render to DOM =====
    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderTree(rootNode) {
        const out = renderUL(rootNode, true, 0);
        const wrap = document.getElementById('tree-root');
        wrap.innerHTML = out;
    }

    function renderUL(node, isRoot, depth) {
        if (!node.children || node.children.length === 0) return '';
        const liStrings = node.children.map(child => {
            const isLeaf = !child.isInternal;
            const initialCollapsed = !isRoot && !isLeaf && (child.children && child.children.length > 0);
            // At depth 0 (top-level family), collapsed by default.
            // (Initial state: only top-level visible.)
            const collapseClass = (isRoot && !isLeaf) ? 'collapsed' : (initialCollapsed && depth >= 1 ? 'collapsed' : '');
            const nodeClass = 'node' + (isLeaf ? ' leaf' : (collapseClass ? '' : ' expanded'));

            let line;
            if (isLeaf) {
                const lang = LANG_DATA[child.code];
                // Historical languages route into the wordmap's "歴史言語"
                // mode by appending hist=1; modern langs get hist=0.
                const isHist = (typeof HIST_DESCENDANT !== 'undefined') &&
                               Object.prototype.hasOwnProperty.call(HIST_DESCENDANT, child.code);
                const params = lang ? `lang=${encodeURIComponent(child.code)}&z=7&lat=${lang.lat}&lng=${lang.lng}&g3d=0&hist=${isHist?'1':'0'}&ui=${uiLang}` : '';
                line = '<span class="' + nodeClass + '" data-leaf="1" data-code="' + escapeHtml(child.code) + '">'
                    + '<span class="toggle">▶</span>'
                    + '<span class="label"><a href="wordmap.html#' + escapeHtml(params) + '">' + escapeHtml(child.name) + '</a></span>'
                    + (child.native ? '<span class="native" dir="auto">' + escapeHtml(child.native) + '</span>' : '')
                    + '<span class="code">[' + escapeHtml(child.code) + ']</span>'
                    + '</span>';
            } else {
                // Internal — show family-color dot for top-level only
                const dot = (depth === 0)
                    ? '<span class="family-dot" style="background:' + familyColor(child.key) + '"></span>'
                    : '';
                const total = child.leafCount || 0;
                line = '<span class="' + nodeClass + '">'
                    + '<span class="toggle">▶</span>'
                    + dot
                    + '<span class="label">' + escapeHtml(child.name) + '</span>'
                    + '<span class="count">(' + total + ')</span>'
                    + '</span>';
            }

            const subUL = isLeaf ? '' : renderUL(child, false, depth + 1);
            const liClass = collapseClass ? ' class="collapsed"' : '';
            return '<li' + liClass + '>' + line + subUL + '</li>';
        }).join('');
        return '<ul' + (isRoot ? '' : '') + '>' + liStrings + '</ul>';
    }

    function wireInteractions() {
        const root = document.getElementById('tree-root');
        // Toggle expand/collapse on internal-node click
        root.addEventListener('click', e => {
            // Leaf link click → remember the lang code in localStorage so
            // when the user comes back from the wordmap we can scroll the
            // tree to their last-visited language.
            if (e.target.tagName === 'A') {
                const node = e.target.closest('.node');
                const code = node && node.getAttribute('data-code');
                if (code) saveLastVisited(code);
                return;
            }
            const node = e.target.closest('.node');
            if (!node || node.classList.contains('leaf')) return;
            const li = node.parentElement;  // <li>
            if (!li) return;
            li.classList.toggle('collapsed');
            node.classList.toggle('expanded');
        });
    }

    // ===== Last-visited language (localStorage) =====
    const LAST_VISITED_KEY = 'langmap_tree_last_visited';
    function saveLastVisited(code) {
        try { localStorage.setItem(LAST_VISITED_KEY, code); } catch (e) {}
    }
    function getLastVisited() {
        try { return localStorage.getItem(LAST_VISITED_KEY); } catch (e) { return null; }
    }

    // Expand ancestors of `node`, scroll it into view, and pulse-highlight
    // it. Used both on initial load and when the user clicks the
    // "Jump to last visited" button.
    function revealNode(node, opts) {
        if (!node) return false;
        opts = opts || {};
        // Walk up; un-collapse each enclosing <li> and set the parent
        // .node to expanded so the toggle caret points down.
        let cur = node.parentElement;  // starting <li>
        while (cur && cur.id !== 'tree-root') {
            if (cur.tagName === 'LI') {
                cur.classList.remove('collapsed');
                const parentNode = cur.querySelector(':scope > .node');
                if (parentNode && !parentNode.classList.contains('leaf')) {
                    parentNode.classList.add('expanded');
                }
            }
            cur = cur.parentElement;
        }
        // Clear any prior last-visited marker, then mark this one.
        document.querySelectorAll('.node.last-visited').forEach(n => {
            n.classList.remove('last-visited', 'flash');
        });
        node.classList.add('last-visited');
        if (opts.flash !== false) {
            // Force reflow so the animation re-triggers on repeat clicks.
            node.classList.remove('flash');
            void node.offsetWidth;
            node.classList.add('flash');
        }
        // Scroll the .tree-wrap container so the node is visible.
        try {
            node.scrollIntoView({ behavior: opts.smooth ? 'smooth' : 'auto', block: 'center' });
        } catch (e) {
            node.scrollIntoView();
        }
        return true;
    }

    function revealLastVisited(opts) {
        const code = getLastVisited();
        if (!code) return false;
        const node = document.querySelector('.node.leaf[data-code="' + CSS.escape(code) + '"]');
        if (!node) return false;
        return revealNode(node, opts);
    }

    function expandAll() {
        document.getElementById('tree-root').querySelectorAll('li.collapsed').forEach(li => li.classList.remove('collapsed'));
        document.getElementById('tree-root').querySelectorAll('.node:not(.leaf)').forEach(n => n.classList.add('expanded'));
    }
    function collapseAll() {
        // Collapse everything except the synthetic root (which has no <li>).
        document.getElementById('tree-root').querySelectorAll('li').forEach(li => {
            if (li.querySelector(':scope > ul')) li.classList.add('collapsed');
        });
        document.getElementById('tree-root').querySelectorAll('.node:not(.leaf)').forEach(n => n.classList.remove('expanded'));
    }

    function searchFilter(query) {
        const root = document.getElementById('tree-root');
        const q = (query || '').trim().toLowerCase();
        // Reset
        root.querySelectorAll('li').forEach(li => li.classList.remove('search-hidden'));
        root.querySelectorAll('.node.match').forEach(n => n.classList.remove('match'));
        if (!q) return;

        // Hide all <li>s, then unhide ones matching the query (and their ancestors).
        const allLi = root.querySelectorAll('li');
        allLi.forEach(li => li.classList.add('search-hidden'));

        // Match against leaf nodes and family names
        const matchedLeafLi = [];
        const matchedInternalLi = [];
        root.querySelectorAll('.node').forEach(node => {
            const text = (node.textContent || '').toLowerCase();
            if (text.includes(q)) {
                const li = node.closest('li');
                if (!li) return;
                node.classList.add('match');
                if (node.classList.contains('leaf')) matchedLeafLi.push(li);
                else matchedInternalLi.push(li);
            }
        });

        function showWithAncestors(li) {
            let cur = li;
            while (cur && cur !== root) {
                if (cur.tagName === 'LI') {
                    cur.classList.remove('search-hidden');
                    cur.classList.remove('collapsed');
                    const node = cur.querySelector(':scope > .node');
                    if (node && !node.classList.contains('leaf')) node.classList.add('expanded');
                }
                cur = cur.parentElement;
            }
        }
        matchedLeafLi.forEach(showWithAncestors);
        matchedInternalLi.forEach(li => {
            showWithAncestors(li);
            // Also show all descendants of a matched internal node
            li.querySelectorAll('li').forEach(c => c.classList.remove('search-hidden'));
        });
    }

    // ===== Init =====
    let __treeData = null;
    function buildAndRender() {
        __treeData = buildHierarchy();
        document.getElementById('loading')?.remove();
        renderTree(__treeData);
        wireInteractions();
        document.getElementById('stats').textContent = t('stats', Object.keys(LANG_DATA).length);
    }

    function init() {
        populateUiLangSelect();
        applyI18n();
        buildAndRender();

        document.getElementById('expand-all').addEventListener('click', expandAll);
        document.getElementById('collapse-all').addEventListener('click', collapseAll);

        const searchInput = document.getElementById('search');
        let timer;
        searchInput.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(() => searchFilter(searchInput.value), 200);
        });

        // Last-visited: if we have one saved, show the jump button and
        // auto-scroll to it on first paint. Auto-reveal is silent (no
        // flash) so it doesn't yank attention if the user came from a
        // bookmark; the button click does flash for clear feedback.
        const jumpBtn = document.getElementById('jump-last');
        const lastCode = getLastVisited();
        if (lastCode && document.querySelector('.node.leaf[data-code="' + CSS.escape(lastCode) + '"]')) {
            jumpBtn.hidden = false;
            jumpBtn.addEventListener('click', () => revealLastVisited({ smooth: true, flash: true }));
            // Defer one frame so layout is settled before scrollIntoView.
            requestAnimationFrame(() => revealLastVisited({ smooth: false, flash: true }));
        }
    }
})();
</script>
</body>
</html>
