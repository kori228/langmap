<style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; color: #222; background: #fafbfc; }
    .site-header-bar {
        position: sticky; top: 0; z-index: 10; background: #fff;
        padding: 8px 16px; border-bottom: 1px solid #e0e0e0;
        display: flex; align-items: center; gap: 18px;
    }
    .site-header-bar .logo { font-weight: 700; color: #1a73e8; text-decoration: none; font-size: 16px; }
    .header-nav { display: flex; align-items: center; gap: 6px; flex: 1; font-size: 13px; }
    .header-nav-link, .header-nav-current { color: #444; text-decoration: none; padding: 4px 8px; border-radius: 4px; }
    .header-nav-link:hover { background: #f1f3f4; }
    .header-nav-current { font-weight: 600; color: #1a73e8; background: #e8f0fe; }
    .nav-sep { color: #ccc; }
    .header-url { color: #888; font-size: 12px; text-decoration: none; }
    .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 22px; margin: 16px 0 4px; }
    .subtitle { color: #666; font-size: 13px; margin: 0 0 16px; }
    .controls {
        display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px;
        align-items: center;
    }
    .controls input[type="text"] {
        flex: 1; min-width: 180px; padding: 6px 10px; font-size: 13px;
        border: 1px solid #d0d0d0; border-radius: 4px; background: #fff;
    }
    .controls select {
        padding: 6px 10px; font-size: 12px; border: 1px solid #d0d0d0;
        background: #fff; color: #444; border-radius: 4px;
    }
    .controls button {
        padding: 6px 12px; font-size: 12px; border: 1px solid #d0d0d0;
        background: #fff; color: #444; border-radius: 4px; cursor: pointer;
    }
    .controls button:hover { background: #f1f3f4; }
    .stats { color: #888; font-size: 12px; margin-left: auto; }

    /* Tree with curved branch connectors. Each li uses ::before to draw an
       L-shape with rounded corner from its parent's vertical guide down/right
       to itself; ::after extends the vertical guide to the next sibling. */
    .tree { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 14px 18px 18px; font-size: 13px; line-height: 1.7; }
    .tree ul { list-style: none; padding-left: 22px; margin: 0; position: relative; }
    .tree > ul { padding-left: 4px; }
    .tree > ul > li::before, .tree > ul > li::after { display: none; }  /* top-level: no parent connector */
    .tree li { position: relative; }
    .tree li::before {
        content: '';
        position: absolute;
        top: 0;
        left: -14px;
        width: 12px;
        height: 14px;  /* curves into node center vertically */
        border-left: 1.5px solid #b8c8e0;
        border-bottom: 1.5px solid #b8c8e0;
        border-bottom-left-radius: 10px;
        pointer-events: none;
    }
    .tree li::after {
        content: '';
        position: absolute;
        top: 14px;
        bottom: 0;
        left: -14px;
        border-left: 1.5px solid #b8c8e0;
        pointer-events: none;
    }
    .tree li:last-child::after { display: none; }
    .tree li.collapsed > ul { display: none; }
    .tree li.collapsed::after { display: none; }  /* don't continue line into collapsed children */

    .node { display: inline-block; cursor: pointer; user-select: none; padding: 1px 4px; border-radius: 3px; }
    .node:hover { background: #f1f3f4; }
    .node .toggle { display: inline-block; width: 12px; color: #6b88b8; font-size: 10px; transform: translateY(-1px); }
    .node.expanded > .toggle::before { content: '▾'; }
    .node.collapsed > .toggle::before { content: '▸'; }
    .node.leaf > .toggle { visibility: hidden; }
    .node .label { font-weight: 600; color: #2c4a7a; }
    .node .count { color: #888; font-size: 11px; margin-left: 4px; }
    .lang-leaf { color: #444; }
    .lang-leaf a { color: #1a73e8; text-decoration: none; }
    .lang-leaf a:hover { text-decoration: underline; }
    .lang-leaf .native-name { color: #888; font-size: 12px; margin-left: 6px; unicode-bidi: isolate; }
    .lang-leaf .code { color: #aaa; font-size: 11px; margin-left: 6px; font-family: monospace; }
    .lang-leaf.match { background: #fff8d8; }
    .lang-leaf .node .label { color: #333; font-weight: 400; }

    .empty { color: #888; padding: 20px; text-align: center; }
    @media (max-width: 600px) {
        .container { padding: 10px; }
        .tree { font-size: 12px; line-height: 1.6; padding: 10px 12px 12px; }
        .tree ul { padding-left: 18px; }
        .tree li::before { left: -10px; width: 10px; }
        .tree li::after { left: -10px; }
    }
</style>

        hi: { title:'भाषा परिवार वृक्ष', subtitle:n=>n+' भाषाएँ वंशानुगत परिवार के अनुसार व्यवस्थित। परिवार पर क्लिक करके विस्तार करें; भाषा पर क्लिक करके मानचित्र पर मोडल खोलें।', search:'🔍 भाषा नाम या कोड से फ़िल्टर…', expand:'सभी का विस्तार करें', collapse:'सभी को संक्षिप्त करें', stats:n=>n+' भाषाएँ', navOrder:'शब्द क्रम', navMap:'शब्द मानचित्र', navTree:'वृक्ष', uiLangLabel:'UI भाषा' },

        fr: { title:'Arbre des familles linguistiques', subtitle:n=>n+' langues organisées par famille génétique. Cliquez sur une famille pour la développer ; cliquez sur une langue pour ouvrir la fenêtre sur la carte.', search:'🔍 Filtrer par nom ou code de langue…', expand:'Tout développer', collapse:'Tout réduire', stats:n=>n+' langues', navOrder:'Ordre des mots', navMap:'Carte des mots', navTree:'Arbre', uiLangLabel:'Langue de l’IU' },

        pt: { title:'Árvore genealógica das línguas', subtitle:n=>n+' línguas organizadas por família genealógica. Clique em uma família para expandir; clique em uma língua para abrir o modal no mapa.', search:'🔍 Filtrar por nome ou código…', expand:'Expandir tudo', collapse:'Recolher tudo', stats:n=>n+' línguas', navOrder:'Ordem das palavras', navMap:'Mapa de palavras', navTree:'Árvore', uiLangLabel:'Idioma da UI' },

        uk: { title:'Мовне генеалогічне дерево', subtitle:n=>n+' мов, упорядкованих за генеалогічною родиною. Натисніть на родину, щоб розгорнути; натисніть на мову, щоб відкрити вікно на карті.', search:'🔍 Фільтр за назвою або кодом…', expand:'Розгорнути все', collapse:'Згорнути все', stats:n=>n+' мов', navOrder:'Порядок слів', navMap:'Карта слів', navTree:'Дерево', uiLangLabel:'Мова інтерфейсу' },

        sw: { title:'Mti wa Kifamilia wa Lugha', subtitle:n=>n+' lugha zilizopangwa kwa familia ya nasaba. Bofya familia kupanua; bofya lugha kufungua dirisha kwenye ramani.', search:'🔍 Chuja kwa jina au msimbo…', expand:'Panua zote', collapse:'Kunja zote', stats:n=>n+' lugha', navOrder:'Mpangilio wa maneno', navMap:'Ramani ya maneno', navTree:'Mti', uiLangLabel:'Lugha ya UI' },
    };

    // Pick a UI language. Resolution order: ?ui=… → localStorage('wm.uiLang')
    // → navigator.language → 'en'.
    function resolveUiLang() {
        try {
            const params = new URLSearchParams(location.search || location.hash.replace(/^#/, ''));
            const u = params.get('ui'); if (u && UI_I18N[u]) return u;
        } catch (e) {}
        try {
            const u = localStorage.getItem('wm.uiLang'); if (u && UI_I18N[u]) return u;
            // Strip region from full code (es_eu → es, pt_br → pt)
            if (u) { const base = u.split('_')[0]; if (UI_I18N[base]) return base; }
        } catch (e) {}
        const nav = (navigator.language || 'en').toLowerCase().split('-')[0];
        if (UI_I18N[nav]) return nav;
        return 'en';
    }
    let uiLang = resolveUiLang();
    function t(key, ...args) {
        const dict = UI_I18N[uiLang] || UI_I18N.en;
        const v = dict[key];
        if (typeof v === 'function') return v(...args);
        return v != null ? v : (UI_I18N.en[key] || key);
    }

    // Set RTL direction for Arabic / Hebrew UI
    if (uiLang === 'ar' || uiLang === 'he') {
        document.documentElement.dir = 'rtl';
    }

    // Populate UI lang dropdown
    function populateUiLangSelect() {
        const sel = document.getElementById('ui-lang');
        const langs = Object.keys(UI_I18N);
        // Native names for the dropdown options
        const NATIVE = {
            en:'English', ja:'日本語', ko:'한국어', zh:'中文', yue:'粵語',
            vi:'Tiếng Việt', th:'ภาษาไทย', id:'Bahasa Indonesia', hi:'हिन्दी',
            de:'Deutsch', fr:'Français', it:'Italiano', es:'Español', pt:'Português',
            ru:'Русский', uk:'Українська', ar:'العربية', he:'עברית', sw:'Kiswahili'
        };
        for (const u of langs) {
            const opt = document.createElement('option');
            opt.value = u;
            opt.textContent = NATIVE[u] || u;
            if (u === uiLang) opt.selected = true;
            sel.appendChild(opt);
        }
        sel.title = t('uiLangLabel');
        sel.addEventListener('change', () => {
            uiLang = sel.value;
            try { localStorage.setItem('wm.uiLang', uiLang); } catch (e) {}
            // Update URL hash
            try {
                const params = new URLSearchParams(location.hash.slice(1));
                params.set('ui', uiLang);
                location.hash = params.toString();
            } catch (e) {}
            applyI18n();
            // Re-render so language names switch UI
            if (window.__treeData) renderTree(window.__treeData);
        });
    }

    function applyI18n() {
        document.title = t('title') + ' — LangMap';
        document.getElementById('page-title').textContent = t('title');
        document.getElementById('search').placeholder = t('search');
        document.getElementById('expand-all').textContent = t('expand');
        document.getElementById('collapse-all').textContent = t('collapse');
        document.getElementById('nav-order').textContent = t('navOrder');
        document.getElementById('nav-map').textContent = t('navMap');
        document.getElementById('nav-tree').textContent = t('navTree');
        const sub = document.getElementById('subtitle');
        if (window.__treeTotal) sub.textContent = t('subtitle', window.__treeTotal);
        const stats = document.getElementById('stats');
        if (window.__treeTotal) stats.textContent = t('stats', window.__treeTotal);
    }

    // Lazy-load wordmap_meta.js (full meta needed for family strings)
    const metaScript = document.createElement('script');
    metaScript.src = 'wordmap_meta.js?v=55';
    metaScript.onload = init;
    metaScript.onerror = () => {
        document.getElementById('tree-root').innerHTML = '<div class="empty">Failed to load wordmap_meta.js.</div>';
    };
    document.head.appendChild(metaScript);

    // Higher-level family promotion. Branches like "Germanic" or "Slavic" are
    // attested in the data without their parent ("Indo-European"). Adding the
    // parent here gives a single connected tree per macro-family.
    const FAMILY_PROMOTE = {
        'Germanic': 'Indo-European', 'Romance': 'Indo-European', 'Slavic': 'Indo-European',
        'Indo-Aryan': 'Indo-European', 'Iranian': 'Indo-European', 'Celtic': 'Indo-European',
        'Hellenic': 'Indo-European', 'Albanian': 'Indo-European', 'Armenian': 'Indo-European',
        'Baltic': 'Indo-European', 'Anatolian': 'Indo-European', 'Tocharian': 'Indo-European',
        'Sinitic': 'Sino-Tibetan', 'Tibeto-Burman': 'Sino-Tibetan', 'Bodish': 'Sino-Tibetan',
        'Bantu': 'Atlantic-Congo', 'Mel': 'Atlantic-Congo', 'Kru': 'Atlantic-Congo',
        'Gur': 'Atlantic-Congo', 'Kwa': 'Atlantic-Congo', 'Volta-Niger': 'Atlantic-Congo',
        'Adamawa': 'Atlantic-Congo',
        'Semitic': 'Afro-Asiatic', 'Cushitic': 'Afro-Asiatic', 'Berber': 'Afro-Asiatic',
        'Chadic': 'Afro-Asiatic', 'Egyptian': 'Afro-Asiatic',
        'Tai': 'Kra-Dai', 'Hlai': 'Kra-Dai', 'Kam-Sui': 'Kra-Dai',
        'Polynesian': 'Austronesian', 'Micronesian': 'Austronesian',
        'Malayo-Polynesian': 'Austronesian', 'Formosan': 'Austronesian',
        'Nilotic': 'Nilo-Saharan', 'Saharan': 'Nilo-Saharan', 'Songhai': 'Nilo-Saharan',
    };

    function parseFamilyPath(famStr) {
        if (!famStr) return ['Unclassified'];
        const m = famStr.match(/^([^()]+?)(?:\s*\(([^)]+)\))?$/);
        if (!m) return [famStr];
        const top = m[1].trim();
        const inner = (m[2] || '').trim();
        const subs = inner ? inner.split(',').map(s => s.trim()).filter(Boolean) : [];
        let path = [top, ...subs];
        if (FAMILY_PROMOTE[path[0]]) path.unshift(FAMILY_PROMOTE[path[0]]);
        return path;
    }

    function buildTree() {
        const root = { name: '(root)', children: new Map(), langs: [] };
        for (const code of Object.keys(LANG_DATA)) {
            const lang = LANG_DATA[code];
            const fam = (lang.meta && lang.meta.family) || 'Unclassified';
            const path = parseFamilyPath(fam);
            let node = root;
            for (const segment of path) {
                if (!node.children.has(segment)) {
                    node.children.set(segment, { name: segment, children: new Map(), langs: [] });
                }
                node = node.children.get(segment);
            }
            node.langs.push(code);
        }
        return root;
    }

    function countLangs(node) {
        let n = node.langs.length;
        for (const child of node.children.values()) n += countLangs(child);
        return n;
    }

    function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function langDisplayName(code) {
        const names = (typeof LANG_NAMES !== 'undefined') && (LANG_NAMES[uiLang] || LANG_NAMES.en) || {};
        return names[code] || (LANG_DATA[code] && LANG_DATA[code].name) || code;
    }

    function renderNode(node, isRoot) {
        let html = '';
        const childEntries = Array.from(node.children.entries()).sort((a, b) => a[0].localeCompare(b[0]));
        const langSorted = node.langs.slice().sort((a, b) =>
            langDisplayName(a).localeCompare(langDisplayName(b))
        );

        html += '<ul>';
        for (const [name, child] of childEntries) {
            const total = countLangs(child);
            const initialCollapsed = total > 25;
            html += '<li class="' + (initialCollapsed ? 'collapsed' : '') + '">';
            html += '<span class="node ' + (initialCollapsed ? 'collapsed' : 'expanded') + '">';
            html += '<span class="toggle"></span>';
            html += '<span class="label">' + escapeHtml(name) + '</span>';
            html += '<span class="count">(' + total + ')</span>';
            html += '</span>';
            html += renderNode(child, false);
            html += '</li>';
        }
        for (const code of langSorted) {
            const lang = LANG_DATA[code];
            const display = langDisplayName(code);
            const native = lang.native ? '<span class="native-name" dir="auto">' + escapeHtml(lang.native) + '</span>' : '';
            html += '<li class="lang-leaf" data-code="' + escapeHtml(code) + '" data-search="' + escapeHtml((display + ' ' + (lang.native || '') + ' ' + code).toLowerCase()) + '">';
            html += '<span class="node leaf"><span class="toggle"></span>';
            html += '<a href="wordmap.html#lang=' + encodeURIComponent(code) + '">' + escapeHtml(display) + '</a>';
            html += native;
            html += '<span class="code">[' + escapeHtml(code) + ']</span>';
            html += '</span>';
            html += '</li>';
        }
        html += '</ul>';
        return html;
    }

    function renderTree(tree) {
        const root = document.getElementById('tree-root');
        root.innerHTML = renderNode(tree, true);
        wireTreeInteractions(root);
    }

    function wireTreeInteractions(root) {
        root.addEventListener('click', e => {
            const node = e.target.closest('.node:not(.leaf)');
            if (!node) return;
            const li = node.closest('li');
            if (!li) return;
            li.classList.toggle('collapsed');
            node.classList.toggle('collapsed');
            node.classList.toggle('expanded');
        });
    }

    function init() {
        populateUiLangSelect();
        applyI18n();
        const tree = buildTree();
        const totalLangs = countLangs(tree);
        window.__treeData = tree;
        window.__treeTotal = totalLangs;
        document.getElementById('subtitle').textContent = t('subtitle', totalLangs);
        document.getElementById('stats').textContent = t('stats', totalLangs);
        renderTree(tree);

        document.getElementById('expand-all').addEventListener('click', () => {
            const root = document.getElementById('tree-root');
            root.querySelectorAll('li.collapsed').forEach(li => li.classList.remove('collapsed'));
            root.querySelectorAll('.node.collapsed').forEach(n => { n.classList.remove('collapsed'); n.classList.add('expanded'); });
        });
        document.getElementById('collapse-all').addEventListener('click', () => {
            const root = document.getElementById('tree-root');
            root.querySelectorAll('li').forEach(li => {
                if (li.querySelector(':scope > ul')) li.classList.add('collapsed');
            });
            root.querySelectorAll('.node:not(.leaf)').forEach(n => {
                n.classList.remove('expanded'); n.classList.add('collapsed');
            });
        });

        const searchInput = document.getElementById('search');
        searchInput.addEventListener('input', () => {
            const root = document.getElementById('tree-root');
            const q = searchInput.value.trim().toLowerCase();
            const allLi = root.querySelectorAll('li.lang-leaf');
            if (!q) {
                allLi.forEach(li => { li.style.display = ''; li.classList.remove('match'); });
                root.querySelectorAll('li').forEach(li => li.style.display = '');
                return;
            }
            root.querySelectorAll('li').forEach(li => li.style.display = 'none');
            allLi.forEach(li => {
                const sd = li.getAttribute('data-search') || '';
                if (sd.includes(q)) {
                    li.style.display = '';
                    li.classList.add('match');
                    let p = li.parentElement;
                    while (p && p !== root) {
                        if (p.tagName === 'LI') {
                            p.style.display = '';
                            p.classList.remove('collapsed');
                            const node = p.querySelector(':scope > .node');
                            if (node) { node.classList.remove('collapsed'); node.classList.add('expanded'); }
                        } else if (p.tagName === 'UL') {
                            p.style.display = '';
                        }
                        p = p.parentElement;
                    }
                } else {
                    li.classList.remove('match');
                }
            });
        });
    }
})();
</script>
</body>
</html>
