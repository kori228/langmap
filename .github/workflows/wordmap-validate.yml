name: LangMap validation

# Audit Task 140: automated validation on every PR / push to main +
# develop. Catches schema regressions, missing translations, hardcoded
# count drift, inline-script syntax errors, and sentence/segment
# alignment issues. All scripts run offline (no network), so CI stays
# fast and deterministic.

on:
  pull_request:
    paths:
      - 'wordmap.html'
      - 'wordmap_data.js'
      - 'wordmap_meta.js'
      - 'meta_i18n_ext.js'
      - 'meta_i18n_coverage.js'
      - 'lang_names.js'
      - 'lang-filter.js'
      - 'tree.html'
      - 'index.html'
      - 'changelog.html'
      - 'data.js'
      - 'app.js'
      - 'validate_wordmap_data.js'
      - 'validate_data.py'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - '.github/workflows/wordmap-validate.yml'
  push:
    branches: [main, develop]
    paths:
      - 'wordmap.html'
      - 'wordmap_data.js'
      - 'wordmap_meta.js'
      - 'meta_i18n_ext.js'
      - 'meta_i18n_coverage.js'
      - 'lang_names.js'
      - 'lang-filter.js'
      - 'tree.html'
      - 'index.html'
      - 'changelog.html'
      - 'data.js'
      - 'app.js'
      - 'validate_wordmap_data.js'
      - 'validate_data.py'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - '.github/workflows/wordmap-validate.yml'

# Cancel any in-flight runs on the same ref when a new push lands —
# avoids piling up duplicate runs while a PR is being iterated.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-wordmap:
    name: Validate Word Map data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need history beyond the latest commit so the per-batch gate
          # (Audit Task 201) can `git diff origin/main..HEAD` to detect
          # newly-added LANG_DATA codes. fetch-depth=0 = unshallow.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Ensure origin/main is available locally
        # `actions/checkout` only fetches the triggering ref by default
        # even with fetch-depth=0. Explicitly fetch main so the diff
        # works on PRs from feature branches.
        run: |
          git fetch origin main:refs/remotes/origin/main || true
      - name: Run Word Map validator (strict mode — Audit Task 198)
        # WM_VALIDATE_STRICT promotes [#19] cache-buster drift WARNs to
        # ERRORs so a stale cache buster blocks PR merge. Local
        # development still sees WARN to avoid blocking iteration.
        # WM_BASE_REF tells the per-batch gate (Audit Task 201) what
        # to diff against — in CI we compare the PR/push ref against
        # main to surface newly-added LANG_DATA codes that lack
        # cross-cutting metadata.
        env:
          WM_VALIDATE_STRICT: '1'
          WM_BASE_REF: 'origin/main'
        run: node validate_wordmap_data.js

  cache-buster-drift-gate:
    name: Cache-buster drift gate (Audit Task 198)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Fail PR if [#19] drift warnings present
        # Dedicated gate that surfaces the drift count separately from
        # the main validator output so reviewers see the exact ?v=N
        # mismatches without scrolling. Independent of the strict-mode
        # validator job — both fail the workflow if drift exists.
        run: |
          set -euo pipefail
          out=$(node validate_wordmap_data.js 2>&1 || true)
          drift=$(printf '%s\n' "$out" | grep -E '^[[:space:]]*[!✗][[:space:]]*\[#19\]' || true)
          if [ -n "$drift" ]; then
            echo "::error title=Cache-buster drift::WM_ASSET_VERSION values disagree with <script src=...?v=N>:"
            printf '%s\n' "$drift"
            exit 1
          fi
          echo "No [#19] cache-buster drift detected."

  validate-sentences:
    name: Validate sentence / Word-Order Map data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run sentence validator
        run: python3 validate_data.py

  syntax-check:
    name: Inline-script + data-file syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Parse inline scripts and data files
        run: |
          node -e "
            const fs = require('fs');
            const htmlFiles = ['wordmap.html', 'tree.html', 'index.html'];
            for (const f of htmlFiles) {
              if (!fs.existsSync(f)) continue;
              const html = fs.readFileSync(f, 'utf-8');
              const blocks = html.match(/<script(?![^>]*src)[^>]*>([\\s\\S]*?)<\\/script>/g) || [];
              let i = 0;
              for (const b of blocks) {
                i++;
                const code = b.replace(/<script[^>]*>/, '').replace(/<\\/script>/, '');
                try { new Function(code); }
                catch (e) { console.error(f, 'inline script', i, 'syntax error:', e.message); process.exit(1); }
              }
              console.log(f, '— all', i, 'inline scripts parse OK');
            }
            const jsFiles = ['wordmap_data.js', 'wordmap_meta.js', 'lang-filter.js', 'lang_names.js', 'meta_i18n_ext.js', 'meta_i18n_coverage.js', 'data.js'];
            for (const f of jsFiles) {
              if (!fs.existsSync(f)) continue;
              try { new Function(fs.readFileSync(f, 'utf-8')); console.log(f, 'OK'); }
              catch (e) { console.error(f, 'syntax error:', e.message); process.exit(1); }
            }
          "

  cache-buster-check:
    name: Cache-buster sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify every <script src="X.js?v=N"> in wordmap.html / tree.html / index.html points at an existing file
        run: |
          node -e "
            const fs = require('fs');
            const htmls = ['wordmap.html', 'tree.html', 'index.html'].filter(f => fs.existsSync(f));
            let bad = 0;
            for (const h of htmls) {
              const txt = fs.readFileSync(h, 'utf-8');
              const re = /src=\"([^\"?]+\\.js)(?:\\?v=\\d+)?\"/g;
              let m;
              while ((m = re.exec(txt)) !== null) {
                const path = m[1];
                if (path.startsWith('http')) continue;
                if (!fs.existsSync(path)) {
                  console.error(h, 'references missing file:', path);
                  bad++;
                }
              }
            }
            if (bad > 0) process.exit(1);
            console.log('All script src references resolve.');
          "
