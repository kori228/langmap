                    const native = lang.native || '';
                    const m = lang.meta || {};
                    // Build searchable strings — main fields + aliases +
                    // iso6393 + canonicalCode (all NFD-normalized)
                    const dispN = normalizeSearchText(display);
                    const enN   = normalizeSearchText(en);
                    const natN  = normalizeSearchText(native);
                    const codeN = normalizeSearchText(code);
                    const aliasArr = Array.isArray(m.aliases) ? m.aliases : [];
                    const aliasNs = aliasArr.map(normalizeSearchText);
                    const isoN = normalizeSearchText(m.iso6393 || '');
                    const canonN = normalizeSearchText(m.canonicalCode || '');
                    const aliasHit = aliasNs.some(a => a && a.includes(ql));
                    if (dispN.includes(ql) || enN.includes(ql) ||
                        natN.includes(ql) || codeN.includes(ql) ||
                        aliasHit ||
                        (isoN && isoN.includes(ql)) ||
                        (canonN && canonN.includes(ql))) {
                        // Score: exact code match > display prefix > en prefix > code prefix > native prefix > alias > iso > substring
                        // Audit fix 2026-05-08: exact code match always wins so
                        // 2-letter codes like "ka" (Georgian) aren't pushed
                        // out of top results by the many English names that
                        // start with the same prefix (Kabyle, Kannada, etc.).
                        let score = 100;
                        if (codeN === ql || isoN === ql || canonN === ql) score = -1;
                        else if (dispN.startsWith(ql)) score = 0;
                        else if (enN.startsWith(ql)) score = 1;
                        else if (codeN.startsWith(ql)) score = 2;
                        else if (natN.startsWith(ql)) score = 3;
                        else if (aliasNs.some(a => a && a.startsWith(ql))) score = 4;
                        else if (isoN.startsWith(ql) || canonN.startsWith(ql)) score = 5;
                        // Audit Task 115: capture disambiguator for the
                        // search result tooltip if the row has one.
                        let disambig = '';
                        if (m.disambiguator) {
                            disambig = (typeof m.disambiguator === 'object')
                                ? (m.disambiguator[uiLang] || m.disambiguator[uiLang.split('_')[0]] || m.disambiguator.en || '')
                                : String(m.disambiguator);
                        }
                        matches.push({ code, display, en, native, score, disambig });
                    }
                }
                // Mark each match's era so we can disable non-selected era entries.
                // showHistorical = true → only historical langs are clickable.
                // showHistorical = false → only modern langs are clickable.
                for (const m of matches) {
                    const isHist = HIST_CODE_SET.has(m.code);
                    m.isHist = isHist;
                    m.disabled = isHist !== showHistorical;
                }
                matches.sort((a, b) => a.score - b.score || a.display.localeCompare(b.display));
                const top = matches.slice(0, 12);
                if (top.length === 0) {
                    const noMatchLabel = i18n('noMatch');
                    results.innerHTML = `<div style="padding:8px;color:#999">${escapeHtml(noMatchLabel)}</div>`;
                } else {
                    // The era label here is the *opposite* of current era —
                    // it tells the user "this match is in the [other] era".
                    const eraLbl = showHistorical
                        ? i18n('modernLangTooltip')
                        : i18n('historicalLangTooltip');
                    results.innerHTML = top.map((m, idx) => {
                        const native = m.native && m.native !== m.display ? ` <span style="color:#999;font-size:11px">${escapeHtml(m.native)}</span>` : '';
                        const en = m.en !== m.display ? ` <span style="color:#aaa;font-size:11px">(${escapeHtml(m.en)})</span>` : '';
                        // Audit Task 115: append disambiguator hint after the row
                        // when present so duplicate-name groups (mn_cn/xng,
                        // omx/mnw) are visually distinguishable in search.
                        const dis = m.disambig
                            ? ` <span style="color:#a04020;font-size:10px;font-style:italic"> — ${escapeHtml(m.disambig)}</span>`
                            : '';
                        const baseStyle = 'padding:6px 9px;border-bottom:1px solid #f0f0f0';
                        // Audit Task 136: combobox/listbox semantics — each
                        // visible result is a role="option" with a stable id.
                        const optId = `lang-search-opt-${idx}`;
                        if (m.disabled) {
                            const tooltip = i18n('eraFilterOffHint').replace('{era}', eraLbl);
                            return `<div id="${optId}" class="lang-search-item disabled" role="option" aria-disabled="true" aria-selected="false" data-code="${escapeHtml(m.code)}" data-disabled="1" title="${escapeHtml(tooltip)}" style="${baseStyle};opacity:0.4;cursor:not-allowed">${escapeHtml(m.display)}${native}${en}${dis} <span style="float:right;color:#bbb;font-size:10px">${escapeHtml(m.code)} · ${escapeHtml(eraLbl)}</span></div>`;
                        }
                        return `<div id="${optId}" class="lang-search-item" role="option" aria-selected="false" data-code="${escapeHtml(m.code)}" style="${baseStyle};cursor:pointer">${escapeHtml(m.display)}${native}${en}${dis} <span style="float:right;color:#bbb;font-size:10px">${escapeHtml(m.code)}</span></div>`;
                    }).join('');
                    // Modal only opens on explicit option click (see the
                    // 'click' handler on .lang-search-item below) —
                    // typing alone does NOT auto-open. (User reported
                    // 2026-05-25: live preview while typing was disruptive.)
                }
                results.style.display = 'block';
                input.setAttribute('aria-expanded', 'true');
            }
            input.addEventListener('input', e => renderResults(e.target.value.trim()));
            input.addEventListener('focus', e => { if (e.target.value.trim()) renderResults(e.target.value.trim()); });
            input.addEventListener('blur', () => setTimeout(() => {
                results.style.display = 'none';
                input.setAttribute('aria-expanded', 'false');
                input.setAttribute('aria-activedescendant', '');
            }, 200));
            // Audit Task 136: keyboard navigation for the listbox.
            //   ArrowDown / ArrowUp moves the active option (visual highlight + aria-activedescendant)
            //   Enter selects the active enabled option
            //   Escape closes without opening the modal
            let activeOptionIdx = -1;
            function setActiveOption(newIdx) {
                const items = results.querySelectorAll('.lang-search-item');
                if (items.length === 0) { activeOptionIdx = -1; return; }
                if (newIdx < 0) newIdx = items.length - 1;
                if (newIdx >= items.length) newIdx = 0;
                activeOptionIdx = newIdx;
                items.forEach((it, i) => {
                    if (i === newIdx) {
                        it.style.background = '#f0f4ff';
                        it.setAttribute('aria-selected', 'true');
                        input.setAttribute('aria-activedescendant', it.id || '');
                        // Scroll into view
                        if (it.scrollIntoView) it.scrollIntoView({block: 'nearest'});
                    } else {
                        it.style.background = '';
                        it.setAttribute('aria-selected', 'false');
                    }
                });
            }
            input.addEventListener('keydown', e => {
                if (e.key === 'ArrowDown') { e.preventDefault(); setActiveOption(activeOptionIdx + 1); }
                else if (e.key === 'ArrowUp')   { e.preventDefault(); setActiveOption(activeOptionIdx - 1); }
                else if (e.key === 'Escape')    {
                    if (results.style.display !== 'none') {
                        results.style.display = 'none';
                        input.setAttribute('aria-expanded', 'false');
                        input.setAttribute('aria-activedescendant', '');
                        e.stopPropagation();
                    }
                }
                else if (e.key === 'Enter') {
                    if (activeOptionIdx >= 0) {
                        const items = results.querySelectorAll('.lang-search-item');
                        const it = items[activeOptionIdx];
                        if (it && it.getAttribute('data-disabled') !== '1') {
                            e.preventDefault();
                            const code = it.getAttribute('data-code');
                            if (code && LANG_DATA[code]) {
                                showLangInfo(code);
                                input.value = '';
                                results.style.display = 'none';
                                input.setAttribute('aria-expanded', 'false');
                            }
                        }
                    }
                }
            });
            // Reset active option whenever results re-render
            input.addEventListener('input', () => { activeOptionIdx = -1; });
            results.addEventListener('mousedown', e => e.preventDefault());  // prevent input blur before click
            results.addEventListener('click', e => {
                const item = e.target.closest('.lang-search-item');
                if (!item) return;
                if (item.getAttribute('data-disabled') === '1') return;  // off-era item
                const code = item.getAttribute('data-code');
                if (!code || !LANG_DATA[code]) return;
                const lang = LANG_DATA[code];
                centerLangOnMap(code);
                // If modal already shows this lang (from live preview), avoid
                // calling showLangInfo (which would toggle it closed).
                if (infoPanel.dataset.code !== code || !infoPanel.classList.contains('visible')) {
                    showLangInfo(code);
                }
                input.value = '';
                results.style.display = 'none';
            });
            results.addEventListener('mouseover', e => {
                const item = e.target.closest('.lang-search-item');
                if (item) item.style.background = '#f5f5f5';
            });
            results.addEventListener('mouseout', e => {
                const item = e.target.closest('.lang-search-item');
                if (item) item.style.background = '';
            });
        })();

        // Phase 3b (Session 37): clicking ancestor/descendant link navigates modal
        // to that lang. Map jumps to its coords too.
        infoContent.addEventListener('click', e => {
            const a = e.target.closest('a[data-langcode]');
            if (a) {
                e.preventDefault();
                const target = a.getAttribute('data-langcode');
                if (target && LANG_DATA[target]) {
                    showLangInfo(target);
                    if (typeof map !== 'undefined' && map && map.setView) {
                        const t = LANG_DATA[target];
                        map.setView([t.lat, t.lng], Math.max(map.getZoom(), 4));
                    }
                }
                return;
            }
            // Audit Task 101: clicking an evidence marker expands its
            // detail inline (under the row) so it is reachable without hover.
            const ev = e.target.closest('.ev-marker');
            if (ev) {
                e.preventDefault();
                e.stopPropagation();
                toggleEvDetail(ev);
            }
        });
        // Audit Task 101: keyboard activation for evidence markers.
        infoContent.addEventListener('keydown', e => {
            if (e.key !== 'Enter' && e.key !== ' ') return;
            const ev = e.target.closest('.ev-marker');
            if (!ev) return;
            e.preventDefault();
            toggleEvDetail(ev);
        });
        function toggleEvDetail(ev) {
            const tr = ev.closest('tr');
            if (!tr) return;
            const next = tr.nextElementSibling;
            if (next && next.classList.contains('ev-detail-row')) {
                next.parentNode.removeChild(next);
                return;
            }
            const detail = ev.getAttribute('aria-label') || ev.getAttribute('title') || '';
            if (!detail) return;
            const detailRow = document.createElement('tr');
            detailRow.className = 'ev-detail-row';
            const td = document.createElement('td');
            td.colSpan = 3;
            const div = document.createElement('div');
            div.className = 'ev-detail';
            div.textContent = detail;
            td.appendChild(div);
            detailRow.appendChild(td);
            tr.parentNode.insertBefore(detailRow, tr.nextSibling);
        }

        // === Compare view (Pass 32) ============================================
        // Multi-language side-by-side comparison panel. Users add languages from
        // the modal, the FAB shows count, the bottom panel renders an N×20 table.
        // State persists in localStorage and URL hash (cmp=ja,ko,zh).
        const COMPARE_STORAGE_KEY = 'wm.compareList';
        const COMPARE_MAX = 8;
        let _compareList = [];
        window.__compareList = _compareList;  // exposed for updateHash to read

        // i18n labels for compare UI (subset; falls back to en)
        const COMPARE_I18N = {
            en:    { title:'Language comparison', clear:'Clear', fab:'Compare', add:'+ Add to compare', remove:'✓ In comparison (remove)', max:'Maximum 8 languages' },
            ja:    { title:'言語比較', clear:'クリア', fab:'比較', add:'+ 比較に追加', remove:'✓ 比較中（削除）', max:'最大 8 言語まで' },
            ko:    { title:'언어 비교', clear:'초기화', fab:'비교', add:'+ 비교에 추가', remove:'✓ 비교 중 (제거)', max:'최대 8개 언어' },
            zh:    { title:'语言对比', clear:'清空', fab:'对比', add:'+ 加入对比', remove:'✓ 对比中（移除）', max:'最多 8 种语言' },
            yue:   { title:'語言對比', clear:'清空', fab:'對比', add:'+ 加入對比', remove:'✓ 對比中（移除）', max:'最多 8 種語言' },
            vi:    { title:'So sánh ngôn ngữ', clear:'Xóa', fab:'So sánh', add:'+ Thêm vào so sánh', remove:'✓ Đang so sánh (gỡ)', max:'Tối đa 8 ngôn ngữ' },
            th:    { title:'การเปรียบเทียบภาษา', clear:'ล้าง', fab:'เปรียบเทียบ', add:'+ เพิ่มเพื่อเปรียบเทียบ', remove:'✓ กำลังเปรียบเทียบ (ลบ)', max:'สูงสุด 8 ภาษา' },
            id:    { title:'Perbandingan bahasa', clear:'Hapus', fab:'Bandingkan', add:'+ Tambah ke perbandingan', remove:'✓ Sedang dibandingkan (hapus)', max:'Maksimum 8 bahasa' },
            hi:    { title:'भाषा तुलना', clear:'साफ़ करें', fab:'तुलना', add:'+ तुलना में जोड़ें', remove:'✓ तुलना में (हटाएं)', max:'अधिकतम 8 भाषाएं' },
            de:    { title:'Sprachvergleich', clear:'Leeren', fab:'Vergleichen', add:'+ Zum Vergleich', remove:'✓ Im Vergleich (entfernen)', max:'Maximal 8 Sprachen' },
            fr:    { title:'Comparaison de langues', clear:'Effacer', fab:'Comparer', add:'+ Ajouter à la comparaison', remove:'✓ En comparaison (retirer)', max:'8 langues maximum' },
            it:    { title:'Confronto lingue', clear:'Pulisci', fab:'Confronta', add:'+ Aggiungi al confronto', remove:'✓ In confronto (rimuovi)', max:'Massimo 8 lingue' },
            es:    { title:'Comparación de idiomas', clear:'Borrar', fab:'Comparar', add:'+ Añadir a comparar', remove:'✓ En comparación (quitar)', max:'Máximo 8 idiomas' },
            es_eu: { title:'Comparación de idiomas', clear:'Borrar', fab:'Comparar', add:'+ Añadir a comparar', remove:'✓ En comparación (quitar)', max:'Máximo 8 idiomas' },
            es_mx: { title:'Comparación de idiomas', clear:'Borrar', fab:'Comparar', add:'+ Añadir a comparar', remove:'✓ En comparación (quitar)', max:'Máximo 8 idiomas' },
            pt:    { title:'Comparação de idiomas', clear:'Limpar', fab:'Comparar', add:'+ Adicionar à comparação', remove:'✓ Em comparação (remover)', max:'Máximo de 8 idiomas' },
            pt_eu: { title:'Comparação de idiomas', clear:'Limpar', fab:'Comparar', add:'+ Adicionar à comparação', remove:'✓ Em comparação (remover)', max:'Máximo de 8 idiomas' },
            pt_br: { title:'Comparação de idiomas', clear:'Limpar', fab:'Comparar', add:'+ Adicionar à comparação', remove:'✓ Em comparação (remover)', max:'Máximo de 8 idiomas' },
            ru:    { title:'Сравнение языков', clear:'Очистить', fab:'Сравнить', add:'+ Добавить к сравнению', remove:'✓ В сравнении (убрать)', max:'Максимум 8 языков' },
            uk:    { title:'Порівняння мов', clear:'Очистити', fab:'Порівняти', add:'+ Додати до порівняння', remove:'✓ У порівнянні (вилучити)', max:'Максимум 8 мов' },
            ar:    { title:'مقارنة اللغات', clear:'مسح', fab:'مقارنة', add:'+ إضافة للمقارنة', remove:'✓ قيد المقارنة (إزالة)', max:'بحد أقصى 8 لغات' },
            he:    { title:'השוואת שפות', clear:'נקה', fab:'השווה', add:'+ הוסף להשוואה', remove:'✓ בהשוואה (הסר)', max:'מקסימום 8 שפות' },
            sw:    { title:'Ulinganishaji wa lugha', clear:'Futa', fab:'Linganisha', add:'+ Ongeza ili kulinganisha', remove:'✓ Inalinganishwa (toa)', max:'Lugha 8 zaidi' },
        };
        function compareT(key) {
            const base = uiLang.split('_')[0];
            return (COMPARE_I18N[uiLang] && COMPARE_I18N[uiLang][key])
                || (COMPARE_I18N[base] && COMPARE_I18N[base][key])
                || COMPARE_I18N.en[key];
        }

        function loadCompareList() {
            // Priority: URL hash → localStorage
            const params = new URLSearchParams(location.hash.slice(1));
            const cmp = params.get('cmp');
            if (cmp) {
                _compareList = cmp.split(',').filter(c => LANG_DATA[c]).slice(0, COMPARE_MAX);
            } else {
                try {
                    const stored = localStorage.getItem(COMPARE_STORAGE_KEY);
                    if (stored) _compareList = JSON.parse(stored).filter(c => LANG_DATA[c]).slice(0, COMPARE_MAX);
                } catch (e) {}
            }
            window.__compareList = _compareList;
        }
        function saveCompareList() {
            window.__compareList = _compareList;
            try { localStorage.setItem(COMPARE_STORAGE_KEY, JSON.stringify(_compareList)); } catch (e) {}
            try { updateHash(); } catch (e) {}
        }
        function isInCompare(code) { return _compareList.indexOf(code) !== -1; }
        function addToCompare(code) {
            if (!LANG_DATA[code] || isInCompare(code)) return;
            if (_compareList.length >= COMPARE_MAX) { alert(compareT('max')); return; }
            _compareList.push(code);
            saveCompareList();
            updateCompareFab();
            renderCompareIfOpen();
            updateModalCompareBtn(code);
        }
        function removeFromCompare(code) {
            const i = _compareList.indexOf(code);
            if (i === -1) return;
            _compareList.splice(i, 1);
            saveCompareList();
            updateCompareFab();
            renderCompareIfOpen();
            updateModalCompareBtn(code);
            if (_compareList.length === 0) closeComparePanel();
        }
        function clearCompare() {
            const wasOpen = _compareList.slice();
            _compareList = [];
            saveCompareList();
            updateCompareFab();
            closeComparePanel();
            // Refresh modal compare button if a previously-compared lang is open
            const open = infoPanel && infoPanel.classList.contains('visible') ? infoPanel.dataset.code : '';
            if (open && wasOpen.indexOf(open) !== -1) updateModalCompareBtn(open);
        }
        function updateCompareFab() {
            const fab = document.getElementById('compare-fab');
            if (!fab) return;
            if (_compareList.length === 0) {
                fab.classList.remove('visible');
            } else {
                fab.classList.add('visible');
                const badge = fab.querySelector('.compare-fab-badge');
                if (badge) badge.textContent = String(_compareList.length);
                const lbl = fab.querySelector('.compare-fab-label');
                if (lbl) lbl.textContent = compareT('fab');
            }
        }
        function openComparePanel() {
            if (_compareList.length === 0) return;
            renderCompare();
            const panel = document.getElementById('compare-panel');
            panel.classList.add('visible');
            // Update title text per current UI lang
            const t = panel.querySelector('.compare-title'); if (t) t.textContent = compareT('title');
            const c = panel.querySelector('.compare-clear'); if (c) c.textContent = compareT('clear');
        }
        function closeComparePanel() {
            const panel = document.getElementById('compare-panel');
            if (panel) panel.classList.remove('visible');
        }
        function renderCompareIfOpen() {
            const panel = document.getElementById('compare-panel');
            if (panel && panel.classList.contains('visible')) renderCompare();
        }
        // Reorder: move source code so it lands at toIdx (clamped)
        function reorderCompare(srcCode, toIdx) {
            const from = _compareList.indexOf(srcCode);
            if (from === -1) return;
            let to = Math.max(0, Math.min(toIdx, _compareList.length - 1));
            if (from === to) return;
            _compareList.splice(from, 1);
            _compareList.splice(to, 0, srcCode);
            saveCompareList();
            renderCompare();
        }

        function renderCompare() {
            const body = document.getElementById('compare-body');
            if (!body) return;
            if (_compareList.length === 0) { body.innerHTML = ''; return; }
            const names = (typeof LANG_NAMES !== 'undefined' && LANG_NAMES[uiLang]) || (typeof LANG_NAMES !== 'undefined' && LANG_NAMES.en) || {};
            const conceptLangFb = uiLang.split('_')[0];
            let html = '<table class="compare-table"><thead><tr><th></th>';
            const len = _compareList.length;
            for (let idx = 0; idx < len; idx++) {
                const code = _compareList[idx];
                const lang = LANG_DATA[code]; if (!lang) continue;
                const display = names[code] || lang.name || code;
                html += '<th draggable="true" data-code="' + escapeHtml(code) + '" data-idx="' + idx + '" title="Drag to reorder">'
                     + '<span class="lang-name" data-code="' + escapeHtml(code) + '">' + escapeHtml(display) + '</span>'
                     + (lang.native ? '<span class="native-name" dir="auto">' + escapeHtml(lang.native) + '</span>' : '')
                     + '<button class="remove-col" data-code="' + escapeHtml(code) + '" type="button" aria-label="Remove ' + escapeHtml(display) + '">×</button>'
                     + '</th>';
            }
            html += '</tr></thead><tbody>';
            for (const w of WORD_LIST) {
                const conceptLabel = (w.label && (w.label[uiLang] || w.label[conceptLangFb] || w.label.en)) || w.id;
                html += '<tr><th scope="row">' + escapeHtml(conceptLabel) + '</th>';
                for (const code of _compareList) {
                    const cell = LANG_DATA[code] && LANG_DATA[code].words && LANG_DATA[code].words[w.id];
                    if (!cell || cell[0] === '—') {
                        html += '<td class="unattested">—</td>';
                    } else {
                        const surface = cell[0] || '';
                        const ipa = cell[1] || '';
                        html += '<td><span class="surface" dir="auto">' + escapeHtml(surface) + '</span>'
                             + (ipa && ipa !== '—' ? '<span class="ipa">' + escapeHtml(ipa) + '</span>' : '')
                             + '</td>';
                    }
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            body.innerHTML = html;
            // Wire interactions
            body.querySelectorAll('.remove-col').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    removeFromCompare(btn.dataset.code);
                });
                // Don't let the remove-button start a drag (the parent <th> is draggable)
                btn.addEventListener('mousedown', e => e.stopPropagation());
            });
            body.querySelectorAll('.lang-name[data-code]').forEach(el => {
                // No cursor:pointer override — the parent <th> already
                // has cursor:grab to signal that the whole header is
                // draggable. Click-to-open-modal still works (HTML5 drag
                // and click coexist: drag fires on mousedown+move, click
                // fires when no movement).
                el.style.textDecoration = 'underline';
                el.addEventListener('click', e => {
                    e.stopPropagation();
                    showLangInfo(el.dataset.code);
                });
            });

            // Drag-and-drop reordering on column headers
            let dragSrcCode = null;
            body.querySelectorAll('th[draggable="true"]').forEach(th => {
                th.addEventListener('dragstart', e => {
                    dragSrcCode = th.dataset.code;
                    th.classList.add('dragging');
                    if (e.dataTransfer) {
                        e.dataTransfer.effectAllowed = 'move';
                        e.dataTransfer.setData('text/plain', dragSrcCode);
                    }
                });
                th.addEventListener('dragend', () => {
                    th.classList.remove('dragging');
                    body.querySelectorAll('th.drop-before, th.drop-after')
                        .forEach(el => el.classList.remove('drop-before', 'drop-after'));
                    dragSrcCode = null;
                });
                th.addEventListener('dragover', e => {
                    if (!dragSrcCode || th.dataset.code === dragSrcCode) return;
                    e.preventDefault();
                    if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
                    const rect = th.getBoundingClientRect();
                    const before = (e.clientX - rect.left) < rect.width / 2;
                    th.classList.toggle('drop-before', before);
                    th.classList.toggle('drop-after', !before);
                });
                th.addEventListener('dragleave', () => {
                    th.classList.remove('drop-before', 'drop-after');
                });
                th.addEventListener('drop', e => {
                    e.preventDefault();
                    if (!dragSrcCode || th.dataset.code === dragSrcCode) return;
                    const targetIdx = parseInt(th.dataset.idx);
                    const srcIdx = _compareList.indexOf(dragSrcCode);
                    const rect = th.getBoundingClientRect();
                    const before = (e.clientX - rect.left) < rect.width / 2;
                    let toIdx = targetIdx + (before ? 0 : 1);
                    if (srcIdx < toIdx) toIdx -= 1;  // account for the splice removing src first
                    reorderCompare(dragSrcCode, toIdx);
                });
            });
        }

        function updateModalCompareBtn(code) {
            // Update the in-modal "Add/Remove from compare" button if it exists for this code

        function _wireDiceAutoClear(code) {
            let cleared = false;
            const clear = () => {
                if (cleared) return;
                cleared = true;
                try { triviaClearBlinks(); } catch (_) {}
                try {
                    if (_triviaSpotlight && _triviaSpotlight.has(code)) {
                        _triviaSpotlight.delete(code);
                        if (typeof updateMarkers === 'function') updateMarkers(currentWord);
                    }
                } catch (_) {}
                unwire();
            };
            const unwire = () => {
                try { map && map.off('movestart', clear); } catch (_) {}
                try { map && map.off('zoomstart', clear); } catch (_) {}
                try { map && map.off('click', clear); } catch (_) {}
                try { document.removeEventListener('click', _docClickHandler, true); } catch (_) {}

            const _docClickHandler = (ev) => {

        function loadTriviaI18nFor(lang) {

            if (!TRIVIA_I18N_LANGS.has(base)) return Promise.resolve();

        function renderTriviaArticle(id) {

                    const safeText = s.text || s.url || '';

                const next = list[pos + 1] || null;

                const nextBtn = document.getElementById('trivia-nav-next');
                const indexBtn = document.getElementById('trivia-nav-index');

                if (prev) {
                    prevBtn.hidden = false;
                    prevBtn.disabled = false;
                    prevBtn.dataset.articleId = prev.id;
                    prevTitle.textContent = `${String(pos).padStart(2,'0')}. ${pickLocalized(prev.title)}`;
                } else {
                    prevBtn.hidden = true;
                    delete prevBtn.dataset.articleId;
                    prevTitle.textContent = '';
                }
                if (next) {
                    nextBtn.hidden = false;
                    nextBtn.disabled = false;
                    nextBtn.dataset.articleId = next.id;

        function renderTriviaIndex() {

        function openTriviaComparePanel(codes) {

            // language headers via getDisplayName for the current UI lang.

            valid.forEach(c => {
                html += '<th>' + escapeHtml(getDisplayName(c, LANG_DATA[c])) + '</th>';

            for (const w of WORD_LIST) {
                const lbl = (w.label && (w.label[uiLang] || w.label[uiLang.split('_')[0]] || w.label.en)) || w.id;
                html += '<tr><th>' + escapeHtml(lbl) + '</th>';
                valid.forEach(c => {
                    const lang = LANG_DATA[c];

        // Temporary place-label balloon for panto actions. Held in
        // _pantoLabelMarker (2D Leaflet marker) and _pantoGlobeLabel
        // (3D globe.gl html-element) so a new panto replaces the
        // previous one immediately (no stacking). _pantoGlobeLabel is
        // read by updateGlobeLabels and rendered alongside language
        // labels so it remains visible after subsequent re-renders.
        let _pantoLabelMarker = null;
        // _pantoGlobeLabel is hoisted via `var` at the top of the IIFE so

        // initial render) can read it without TDZ-throwing.
        let _pantoLabelTimer1 = null;
        let _pantoLabelTimer2 = null;
        function _pantoLabelText(btn) {
            // 1. Explicit override always wins (used when the place name
            //    can't be derived from the button text — e.g. when the
            //    target is buried mid-phrase: "Sochi" inside "Ubykh's lost
            //    homeland (Sochi)").
            if (btn.dataset.label) return btn.dataset.label;
            let s = (btn.textContent || '').trim();
            // Strip leading emoji / punctuation up to the first letter.
            try { s = s.replace(/^[^\p{L}]+/u, ''); } catch (_) {}
            // 2. Parenthesized place-name fallback. Many translations put
            //    the place name in parens after a longer descriptive phrase
            //    ("Fly to Ubykh's lost homeland (Sochi)" / "…故郷（ソチ）へ").
            //    If we find one, use its contents directly.
            const parenMatch = s.match(/[（(]\s*([^（）()]+?)\s*[）)]/u);
            if (parenMatch && parenMatch[1].length > 0 && parenMatch[1].length < 40) {
                return parenMatch[1].trim();
            }
            // 3. Strip leading verb wrappers in major UI languages. Each
            //    alternative ends with whitespace so we don't accidentally
            //    eat part of a place name that starts with one of these
            //    tokens. Coverage:
            //      EN  Fly to / Zoom into / Survey / Visit / Open / Show / Explore / Go to
            //      VI  Bay đến / Đến
            //      ID  Terbang ke / Pergi ke
            //      FR  Voler (à|vers|jusqu'à) / Aller (à|jusqu'à)
            //      IT  Vola a / Vai a
            //      ES  Volar a / Ir a
            //      PT  Voar até / Voar a / Ir até
            //      DE  Nach
            //      RU  Перенестись (в|на) / Лететь (в|на)
            //      UK  Перенестися (в|на) / Летіти (в|на)
            //      AR  الطيران إلى / اذهب إلى
            //      HE  טוס (ל|אל) / לך ל
            //      SW  Ruka (hadi|kwa) / Enda
            //      TH  บินไป / ไปยัง
            s = s.replace(/^(?:Fly to|Zoom into|Zoom in to|Zoom to|Survey|Visit|Open|Show|Explore|Go to|Bay đến|Đến|Terbang ke|Pergi ke|Voler jusqu['’]à|Voler à|Voler vers|Aller jusqu['’]à|Aller à|Vola a|Vai a|Volar a|Ir a|Voar até|Voar a|Ir até|Nach|Перенестись в|Перенестись на|Лететь в|Лететь на|Перенестися в|Перенестися на|Летіти в|Летіти на|الطيران إلى|اذهب إلى|טוס ל|טוס אל|לך ל|Ruka hadi|Ruka kwa|Enda|บินไป|ไปยัง)\s+(?:the\s+)?/iu, '');
            // 4. Strip trailing verb wrappers.
            //    JA: …へ飛ぶ / …を拡大 / …を見る / …へ / …を訪ねる / …を縦覧
            //    DE: … fliegen / … reisen
            //    HI: … तक उड़ें / … पर जाएँ
            s = s.replace(/(?:を(?:拡大|見る|訪ねる|縦覧|散策|一望|サーベイ)|へ(?:飛ぶ)?)\s*$/u, '');
            s = s.replace(/\s+(?:fliegen|reisen)\s*$/iu, '');

            // 5. Strip trailing KO postposition + verb wrappers. Covers
            //    both directional 로/으로 ("to X") and object-marker
            //    을/를 ("zoom in to X" / "look at X"). Examples:
            //      "에트루리아로 날아가기"       → "에트루리아"
            //      "우비흐족의 잃어버린 고향 소치로" → "...소치"
            //      "바랑코를 확대"               → "바랑코"
            //      "워크샵을 답사"               → "워크샵"
            //    Bare 로/으로 is allowed (verb is optional) so even
            //    short author phrasing reduces correctly. The 을/를 form
            //    REQUIRES a verb to avoid stripping random object
            //    markers in mid-sentence button text.
            s = s.replace(/\s*(?:으?로)(?:\s+(?:날아가기|이동(?:하기)?|가기|보기|살펴보기|날아가|이동해|가))?\s*$/u, '');
            // Trailing verb form. Object marker 을/를 is OPTIONAL — covers
            // both "바랑코를 확대" and bare "크라운 프린스 산맥 확대".
            // Whitespace before the verb is required so verbs at the very
            // start of a name aren't accidentally consumed.
            s = s.replace(/(?:\s*[을를])?\s+(?:확대(?:하기)?|확대해|보기|살펴보기|둘러보기|답사(?:하기)?|방문(?:하기)?|훑어보기)\s*$/u, '');

            setTriviaCompact(false);
        });
        const _triviaBackBtn = document.getElementById('trivia-back');
        if (_triviaBackBtn) _triviaBackBtn.addEventListener('click', () => backToTriviaIndex());
        // Delegated handler for the article cards in the index grid
        const _triviaIndex = document.getElementById('trivia-index');
        if (_triviaIndex) _triviaIndex.addEventListener('click', (e) => {
            const card = e.target.closest('.trivia-card');
            if (!card || !card.dataset.articleId) return;
            navigateTrivia(card.dataset.articleId);
        });
        const _tilesRevertBtn = document.getElementById('tiles-revert');
        if (_tilesRevertBtn) _tilesRevertBtn.addEventListener('click', () => setTilesMode('flat'));
        const _triviaCompareCloseBtn = document.getElementById('trivia-compare-close');
        if (_triviaCompareCloseBtn) _triviaCompareCloseBtn.addEventListener('click', closeTriviaComparePanel);
        const _triviaNavPrev = document.getElementById('trivia-nav-prev');
        const _triviaNavNext = document.getElementById('trivia-nav-next');
        if (_triviaNavPrev) _triviaNavPrev.addEventListener('click', () => {
            if (_triviaNavPrev.disabled) return;
            const id = _triviaNavPrev.dataset.articleId;
            if (id) navigateTrivia(id);
        });
        if (_triviaNavNext) _triviaNavNext.addEventListener('click', () => {
            if (_triviaNavNext.disabled) return;
            const id = _triviaNavNext.dataset.articleId;
            if (id) navigateTrivia(id);
        });
        const _triviaNavIndex = document.getElementById('trivia-nav-index');
        if (_triviaNavIndex) _triviaNavIndex.addEventListener('click', () => backToTriviaIndex());
        const _triviaOpenBtn = document.getElementById('trivia-open');
        if (_triviaOpenBtn) _triviaOpenBtn.addEventListener('click', () => openTrivia());
        const _triviaCloseBtn = document.getElementById('trivia-close');
        if (_triviaCloseBtn) _triviaCloseBtn.addEventListener('click', closeTrivia);
        const _triviaBackdrop = document.getElementById('trivia-backdrop');
        if (_triviaBackdrop) _triviaBackdrop.addEventListener('click', closeTrivia);
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            const modal = document.getElementById('trivia-modal');
            if (modal && modal.classList.contains('visible')) {
                closeTrivia();
            }
        });

        window.openTrivia = openTrivia;
        window.closeTrivia = closeTrivia;
        window.navigateTrivia = navigateTrivia;
        window.triviaBlinkMarker = triviaBlinkMarker;

    })();
    </script>
</body>
</html>
