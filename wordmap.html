<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangMap — Word Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #map { width: 100vw; height: 100vh; }

        /* --- Header --- */
        .site-header {
            position: absolute; top: 0; left: 0; right: 0; z-index: 1001;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
            border-bottom: 1px solid #e0e0e0;
            padding: 6px 16px; display: flex; align-items: center; gap: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .site-header .logo {
            font-size: 20px; font-weight: 800; color: #1a1a2e; text-decoration: none;
            letter-spacing: -0.5px; white-space: nowrap;
        }
        .site-header .logo:hover { color: #333; }
        .site-header .subtitle {
            font-size: 12px; font-weight: 400; color: #888; margin-left: 4px;
        }
        .site-header .nav-tabs {
            display: flex; gap: 2px; background: #f0f0f0; border-radius: 6px; padding: 2px;
        }
        .site-header .nav-tab {
            font-size: 11px; padding: 4px 12px; border: none; border-radius: 4px;
            background: transparent; color: #666; cursor: pointer; text-decoration: none;
            white-space: nowrap; font-weight: 500;
        }
        .site-header .nav-tab:hover { background: rgba(0,0,0,0.05); color: #333; }
        .site-header .nav-tab.active {
            background: #fff; color: #1a1a2e; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-weight: 600;
        }
        .site-header .word-select-wrap {
            flex: 1; display: flex; align-items: center; gap: 6px;
        }
        .site-header select {
            font-size: 13px; padding: 4px 8px; border: 1px solid #ccc;
            border-radius: 5px; background: #fff; cursor: pointer; max-width: 240px;
        }
        .site-header .ui-lang-select {
            font-size: 11px; padding: 3px 6px; border: 1px solid #ddd;
            border-radius: 4px; background: #fafafa; cursor: pointer;
        }

        /* --- Bottom-left controls --- */
        .map-controls {
            position: absolute; bottom: 24px; left: 12px; z-index: 1000;
            background: rgba(255,255,255,0.92); backdrop-filter: blur(6px);
            border-radius: 8px; padding: 8px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; gap: 6px;
        }
        .map-controls .ctrl-row {
            display: flex; align-items: center; gap: 6px;
        }
        .toggle-btn {
            font-size: 11px; padding: 3px 8px; border: 1px solid #ccc;
            border-radius: 4px; background: #fff; cursor: pointer; white-space: nowrap;
        }
        .toggle-btn.active { background: #e0e7ff; border-color: #7c8cc4; }
        .ctrl-label { font-size: 11px; color: #555; }

        /* --- Language labels on map --- */
        :root { --label-scale: 1; }
        .lang-label {
            position: absolute; left: 50%; top: 50%;
            text-align: center; white-space: nowrap; cursor: pointer;
            pointer-events: auto;
            text-shadow: 0 0 3px #fff, 0 0 3px #fff, 0 0 3px #fff, 0 0 6px rgba(255,255,255,0.5);
        }
        .lang-label:hover { background: rgba(255,255,255,0.7); border-radius: 4px; padding: 1px 4px; }
        .lang-label .word {
            font-size: calc(15px * var(--label-scale)); font-weight: 700; color: #1a1a2e;
            line-height: 1.2;
        }
        .lang-label .ipa {
            font-size: calc(10px * var(--label-scale)); color: #555; font-style: italic;
            line-height: 1.2;
        }
        .lang-label .name {
            font-size: calc(9px * var(--label-scale)); color: #888; line-height: 1.3;
        }
        .zoom-far .lang-label .word { font-size: calc(11px * var(--label-scale)); }
        .zoom-far .lang-label .ipa { font-size: calc(8px * var(--label-scale)); }
        .zoom-far .lang-label .name { font-size: calc(7px * var(--label-scale)); }
        .zoom-mid .lang-label .word { font-size: calc(13px * var(--label-scale)); }
        .zoom-mid .lang-label .ipa { font-size: calc(9px * var(--label-scale)); }
        .zoom-mid .lang-label .name { font-size: calc(8px * var(--label-scale)); }

        /* --- Language info panel --- */
        .lang-info-panel {
            position: absolute; top: 50px; right: 12px; z-index: 1001;
            width: 340px; max-height: calc(100vh - 70px); overflow-y: auto;
            background: rgba(255,255,255,0.97); border-radius: 10px;
            padding: 16px 18px; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            font-size: 13px; line-height: 1.6; display: none;
        }
        .lang-info-panel.visible { display: block; }
        .lang-info-panel .close-btn {
            position: absolute; top: 8px; right: 12px;
            background: none; border: none; font-size: 18px; cursor: pointer; color: #999;
        }
        .lang-info-panel .close-btn:hover { color: #333; }
        .lang-info-panel h2 { font-size: 18px; margin: 0 0 2px; }
        .lang-info-panel .native-name { font-size: 14px; color: #666; margin-bottom: 10px; }
        .lang-info-panel table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .lang-info-panel td { padding: 3px 0; vertical-align: top; }
        .lang-info-panel td:first-child { font-weight: 600; color: #555; width: 90px; white-space: nowrap; }
        .lang-info-panel .desc { color: #444; font-size: 12px; line-height: 1.5; }

        /* --- URL watermark --- */
        .url-watermark {
            position: absolute; bottom: 8px; right: 8px; z-index: 1000;
            font-size: 11px; color: rgba(0,0,0,0.3); pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="site-header">
        <a href="index.html" class="logo">LangMap <span class="subtitle" id="ui-subtitle">Multilingual Word Atlas</span></a>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab" id="nav-order">Word Order</a>
            <a href="wordmap.html" class="nav-tab active" id="nav-map">Word Map</a>
        </div>
        <div class="word-select-wrap">
            <select id="word-select"></select>
        </div>
        <button class="toggle-btn" id="toggle-historical" style="font-size:11px">Historical</button>
        <select id="ui-lang" class="ui-lang-select"></select>
    </div>

    <!-- Bottom-left controls -->
    <div class="map-controls">
        <div class="ctrl-row">
            <button class="toggle-btn active" id="toggle-word">Word</button>
            <button class="toggle-btn active" id="toggle-ipa">IPA</button>
            <button class="toggle-btn active" id="toggle-name">Name</button>
            <button class="toggle-btn" id="toggle-native">Native</button>
        </div>
        <div class="ctrl-row">
            <span class="ctrl-label" id="size-label">Size</span>
            <input type="range" id="font-size" min="50" max="200" value="100" style="width:90px">
        </div>
    </div>

    <!-- URL watermark -->
    <div class="url-watermark">langmap.heuron.com/wordmap.html</div>

    <!-- Language info panel -->
    <div id="lang-info" class="lang-info-panel">
        <button class="close-btn" id="info-close">&times;</button>
        <div id="info-content"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="wordmap_data.js"></script>
    <script>
    // Load LANG_NAMES from app.js for translated language names
    let LANG_NAMES = {};
    let langNamesReady = false;
    fetch('app.js').then(r => r.text()).then(code => {
        const m = code.match(/const LANG_NAMES = \{([\s\S]*?)\n\};/);
        if (m) { try { LANG_NAMES = new Function('return {' + m[1] + '\n};')(); } catch(e) {} }
        langNamesReady = true;
        // Re-render markers now that LANG_NAMES is loaded
        if (typeof _refreshMarkers === 'function') _refreshMarkers();
    });
    </script>
    <script>
    (function() {
        'use strict';

        // --- Map setup ---
        const map = L.map('map', {
            center: [25, 20],
            zoom: 3,
            minZoom: 2,
            maxZoom: 10,
            worldCopyJump: true,
            zoomControl: false, // we'll position it ourselves
        });

        // Zoom control at top-right (below header)
        L.control.zoom({ position: 'topright' }).addTo(map);

        // Flat tiles (CartoDB Positron, no labels)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
            maxZoom: 18,
        }).addTo(map);

        // Country borders
        fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
            .then(r => r.json())
            .then(geojson => {
                L.geoJSON(geojson, {
                    style: (feature) => {
                        const name = feature.properties.ADMIN || feature.properties.name || '';
                        let hash = 0;
                        for (let i = 0; i < name.length; i++) {
                            hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
                        }
                        const colorIdx = Math.abs(hash) % COUNTRY_PALETTE.length;
                        return {
                            fillColor: COUNTRY_PALETTE[colorIdx],
                            fillOpacity: 1,
                            color: '#999',
                            weight: 0.8,
                            opacity: 0.5,
                        };
                    },
                }).addTo(map);
            })
            .catch(err => console.warn('Could not load country borders:', err));

        // --- UI language (detect from browser) ---
        function detectBrowserLang() {
            const langs = navigator.languages || [navigator.language || 'en'];
            for (const l of langs) {
                const code = l.replace('-', '_').toLowerCase();
                if (WM_UI[code]) return code;
                const base = code.split('_')[0];
                // Map browser codes to our UI codes
                const map = { ja:'ja', ko:'ko', zh:'zh', vi:'vi', th:'th', id:'id', hi:'hi',
                    en:'en', de:'de', fr:'fr', it:'it', ru:'ru', uk:'uk', ar:'ar', he:'he',
                    sw:'sw', pt:'pt_br', es:'es_mx', da:'en', sv:'en', no:'en', nl:'en' };
                if (map[base] && WM_UI[map[base]]) return map[base];
                // Chinese variants
                if (base === 'zh') {
                    if (code.includes('hk') || code.includes('tw') || code.includes('hant')) return 'yue';
                    return 'zh';
                }
            }
            return 'en';
        }
        let uiLang = detectBrowserLang();
        const uiLangSelect = document.getElementById('ui-lang');
        for (const [code, label] of Object.entries(WM_UI_LABELS)) {
            const opt = document.createElement('option');
            opt.value = code;
            opt.textContent = label;
            uiLangSelect.appendChild(opt);
        }
        uiLangSelect.value = uiLang;

        function wt(key) { return (WM_UI[uiLang] || WM_UI.en)[key] || WM_UI.en[key]; }

        // UI subtitle translations
        const SUBTITLES = {
            ja:'多言語ワールドアトラス', ko:'다국어 세계 지도', zh:'多语言世界地图', yue:'多語言世界地圖',
            vi:'Bản đồ từ vựng thế giới', th:'แผนที่คำศัพท์โลก', id:'Atlas Kata Dunia',
            hi:'बहुभाषी विश्व मानचित्र', en:'Multilingual Word Atlas', de:'Mehrsprachiger Weltatlas',
            fr:'Atlas mondial des mots', it:'Atlante mondiale delle parole',
            es_eu:'Atlas mundial de palabras', es_mx:'Atlas mundial de palabras',
            pt_eu:'Atlas mundial de palavras', pt_br:'Atlas mundial de palavras',
            ru:'Многоязычный атлас слов', uk:'Багатомовний атлас слів',
            ar:'أطلس الكلمات العالمي', he:'אטלס מילים עולמי', sw:'Atlasi ya Maneno ya Dunia',
        };
        const NAV_ORDER = {
            ja:'語順マップ', ko:'어순 맵', zh:'语序图', yue:'語序圖', vi:'Trật tự từ',
            th:'ลำดับคำ', id:'Urutan Kata', hi:'शब्द क्रम', en:'Word Order',
            de:'Wortstellung', fr:'Ordre des mots', it:'Ordine parole',
            es_eu:'Orden de palabras', es_mx:'Orden de palabras',
            pt_eu:'Ordem das palavras', pt_br:'Ordem das palavras',
            ru:'Порядок слов', uk:'Порядок слів', ar:'ترتيب الكلمات',
            he:'סדר מילים', sw:'Mpangilio wa maneno',
        };
        const NAV_MAP = {
            ja:'単語マップ', ko:'단어 맵', zh:'词汇地图', yue:'詞彙地圖', vi:'Bản đồ từ',
            th:'แผนที่คำ', id:'Peta Kata', hi:'शब्द मानचित्र', en:'Word Map',
            de:'Wortkarte', fr:'Carte des mots', it:'Mappa parole',
            es_eu:'Mapa de palabras', es_mx:'Mapa de palabras',
            pt_eu:'Mapa de palavras', pt_br:'Mapa de palavras',
            ru:'Карта слов', uk:'Карта слів', ar:'خريطة الكلمات',
            he:'מפת מילים', sw:'Ramani ya maneno',
        };

        function applyUILang() {
            document.getElementById('ui-subtitle').textContent = SUBTITLES[uiLang] || SUBTITLES.en;
            document.getElementById('nav-order').textContent = NAV_ORDER[uiLang] || NAV_ORDER.en;
            document.getElementById('nav-map').textContent = NAV_MAP[uiLang] || NAV_MAP.en;
            document.getElementById('toggle-word').textContent = wt('word');
            document.getElementById('toggle-ipa').textContent = wt('ipa');
            document.getElementById('toggle-name').textContent = wt('name');
            document.getElementById('toggle-native').textContent = wt('native');
            document.getElementById('toggle-historical').textContent = wt('historical') || 'Historical';
            document.getElementById('size-label').textContent = wt('size');
            rebuildWordSelect();
        }

        uiLangSelect.addEventListener('change', () => {
            uiLang = uiLangSelect.value;
            applyUILang();
            updateMarkers(currentWord);
            updateHash();
        });

        // --- Word selector ---
        const select = document.getElementById('word-select');

        function rebuildWordSelect() {
            const curVal = select.value;
            select.innerHTML = '';
            WORD_LIST.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w.id;
                opt.textContent = (uiLang === 'en' ? '' : w.ja + ' / ') + w.en;
                select.appendChild(opt);
            });
            if (curVal) select.value = curVal;
        }
        rebuildWordSelect();

        select.addEventListener('change', () => {
            updateMarkers(select.value);
            updateHash();
        });

        // --- Toggle buttons ---
        let showWord = true, showIpa = true, showName = true, showNative = false;
        let showHistorical = false;
        const btnWord = document.getElementById('toggle-word');
        const btnIpa = document.getElementById('toggle-ipa');
        const btnName = document.getElementById('toggle-name');
        const btnNative = document.getElementById('toggle-native');
        const btnHistorical = document.getElementById('toggle-historical');

        btnHistorical.addEventListener('click', () => {
            showHistorical = !showHistorical;
            btnHistorical.classList.toggle('active', showHistorical);
            updateMarkers(currentWord);
            updateHash();
        });

        function setupToggle(btn, getter, setter) {
            btn.addEventListener('click', () => {
                setter(!getter());
                btn.classList.toggle('active', getter());
                updateMarkers(currentWord);
            });
        }
        setupToggle(btnWord, () => showWord, v => showWord = v);
        setupToggle(btnIpa, () => showIpa, v => showIpa = v);
        setupToggle(btnName, () => showName, v => showName = v);

        btnNative.addEventListener('click', () => {
            showNative = !showNative;
            btnNative.classList.toggle('active', showNative);
            updateMarkers(currentWord);
            updateHash();
        });

        const fontSizeSlider = document.getElementById('font-size');
        fontSizeSlider.addEventListener('input', () => {
            document.documentElement.style.setProperty('--label-scale', parseInt(fontSizeSlider.value) / 100);
        });
        fontSizeSlider.addEventListener('change', () => { updateHash(); });

        // --- Language markers ---
        const markers = [];
        let currentWord = WORD_LIST[0].id;
        const MAJOR = new Set(['ja','ko','zh','en','de','fr','es_eu','es_mx','pt_br','ru','ar','hi','vi','th','id','tr','sw','fa']);

        // Historical → representative modern descendant
        const HIST_DESCENDANT = {
            la:'it', el_grc:'el', egy:'ar_eg', en_ang:'en', enm:'en', non:'is',
            got:'de', cu:'bg', pi:'si', cop:'ar_eg', arc:'he',
            sux:null, akk:null, hit:'tr', nci:'es_mx', myn:'es_mx',
            ine:null, zh_song:'zh', zh_han:'zh', zh_tang:'zh',
            ja_edo:'ja', ja_heian:'ja', ko_mid:'ko', ko_em:'ko', vi_nom:'vi',
            eo:null, tok:null, tlh:null, jbo:null,
        };

        function updateMarkers(wordId) {
            currentWord = wordId;
            markers.forEach(m => map.removeLayer(m));
            markers.length = 0;
            const zoom = map.getZoom();

            // Determine which languages to show
            const coordGroups = {};
            const visibleLangs = [];

            if (showHistorical) {
                // Historical mode: show historical langs + their modern descendants only
                const descendantCodes = new Set();
                for (const [hist, modern] of Object.entries(HIST_DESCENDANT)) {
                    if (LANG_DATA[hist] && LANG_DATA[hist].words[wordId]) {
                        visibleLangs.push(hist);
                        if (modern && LANG_DATA[modern] && LANG_DATA[modern].words[wordId]) {
                            descendantCodes.add(modern);
                        }
                    }
                }
                for (const code of descendantCodes) {
                    visibleLangs.push(code);
                }
            } else {
                // Normal mode: current languages only
                for (const [code, lang] of Object.entries(LANG_DATA)) {
                    if (EXCLUDED_CODES.has(code)) continue;
                    if (!lang.words[wordId]) continue;
                    if (zoom < 4 && !MAJOR.has(code)) continue;
                    visibleLangs.push(code);
                }
            }

            // Group by coordinates
            for (const code of visibleLangs) {
                const lang = LANG_DATA[code];
                const key = lang.lat.toFixed(1) + ',' + lang.lng.toFixed(1);
                if (!coordGroups[key]) coordGroups[key] = [];
                coordGroups[key].push(code);
            }

            for (const code of visibleLangs) {
                const lang = LANG_DATA[code];
                const entry = lang.words[wordId];
                const [word, ipa] = entry;

                // Vertical offset for co-located
                const key = lang.lat.toFixed(1) + ',' + lang.lng.toFixed(1);
                const group = coordGroups[key];
                let yOffset = 0;
                if (group.length > 1) {
                    let lineHeight = 0;
                    if (showWord) lineHeight += (zoom <= 3 ? 13 : zoom <= 5 ? 15 : 17);
                    if (showIpa) lineHeight += (zoom <= 3 ? 10 : zoom <= 5 ? 11 : 12);
                    if (showName) lineHeight += (zoom <= 3 ? 9 : zoom <= 5 ? 10 : 11);
                    const spacing = Math.max(lineHeight + 4, 16);
                    const idx = group.indexOf(code);
                    const center = (group.length - 1) / 2;
                    yOffset = (idx - center) * spacing;
                }

                let displayName;
                if (showNative) {
                    displayName = lang.native;
                } else {
                    const names = LANG_NAMES[uiLang] || LANG_NAMES.en || {};
                    displayName = names[code] || lang.name;
                }

                let html = `<div class="lang-label" style="transform:translate(-50%,calc(-50% + ${yOffset}px))">`;
                if (showWord) html += `<div class="word">${word}</div>`;
                if (showIpa) html += `<div class="ipa">/${ipa}/</div>`;
                if (showName) html += `<div class="name">${displayName}</div>`;
                html += '</div>';

                const icon = L.divIcon({ className: '', html, iconSize: [0, 0], iconAnchor: [0, 0] });
                const marker = L.marker([lang.lat, lang.lng], { icon, interactive: true });
                marker._langCode = code;
                marker.on('click', () => showLangInfo(code));
                marker.addTo(map);
                markers.push(marker);
            }
        }

        // --- URL hash ---
        function updateHash() {
            const c = map.getCenter();
            const z = map.getZoom();
            const s = fontSizeSlider.value;
            location.hash = `w=${currentWord}&z=${z}&lat=${c.lat.toFixed(2)}&lng=${c.lng.toFixed(2)}&nat=${showNative?1:0}&hist=${showHistorical?1:0}&fs=${s}&ui=${uiLang}`;
        }

        function loadHash() {
            const h = location.hash.slice(1);
            const params = Object.fromEntries(h.split('&').map(s => s.split('=')));
            if (params.w && WORD_LIST.find(w => w.id === params.w)) {
                select.value = params.w;
                currentWord = params.w;
            }
            if (params.z && params.lat && params.lng) {
                map.setView([parseFloat(params.lat), parseFloat(params.lng)], parseInt(params.z));
            }
            if (params.nat !== undefined) {
                showNative = params.nat === '1';
                btnNative.classList.toggle('active', showNative);
            }
            if (params.hist !== undefined) {
                showHistorical = params.hist === '1';
                btnHistorical.classList.toggle('active', showHistorical);
            }
            if (params.fs) {
                fontSizeSlider.value = params.fs;
                document.documentElement.style.setProperty('--label-scale', parseInt(params.fs) / 100);
            }
            if (params.ui && WM_UI[params.ui]) {
                uiLang = params.ui;
                uiLangSelect.value = params.ui;
                applyUILang();
            }
        }
        loadHash();
        applyUILang(); // Apply detected/loaded UI language

        map.on('zoomend', () => { updateMarkers(currentWord); updateHash(); });
        map.on('moveend', () => { updateHash(); });

        // Expose refresh for async LANG_NAMES load
        window._refreshMarkers = () => updateMarkers(currentWord);

        // Initial render
        updateMarkers(currentWord);

        // Zoom class
        function updateZoomClass() {
            const z = map.getZoom();
            const c = map.getContainer();
            c.classList.remove('zoom-far', 'zoom-mid', 'zoom-close');
            if (z <= 3) c.classList.add('zoom-far');
            else if (z <= 5) c.classList.add('zoom-mid');
            else c.classList.add('zoom-close');
        }
        map.on('zoomend', updateZoomClass);
        updateZoomClass();

        // --- Language info panel ---
        const infoPanel = document.getElementById('lang-info');
        const infoContent = document.getElementById('info-content');
        document.getElementById('info-close').addEventListener('click', () => {
            infoPanel.classList.remove('visible');
        });

        function showLangInfo(code) {
            const lang = LANG_DATA[code];
            if (!lang) return;
            const m = lang.meta || {};
            let html = `<h2>${lang.name}</h2>`;
            html += `<div class="native-name">${lang.native} [${code}]</div>`;
            html += '<table>';
            if (m.family) html += `<tr><td>${wt('family')}</td><td>${m.family}</td></tr>`;
            if (m.speakers) html += `<tr><td>${wt('speakers')}</td><td>${m.speakers}</td></tr>`;
            if (m.countries) html += `<tr><td>${wt('countries')}</td><td>${m.countries}</td></tr>`;
            if (m.official) html += `<tr><td>${wt('official')}</td><td>${m.official}</td></tr>`;
            if (m.script) html += `<tr><td>${wt('script')}</td><td>${m.script}</td></tr>`;
            html += '</table>';
            if (m.description) {
                const desc = typeof m.description === 'object' ? (m.description[uiLang] || m.description.en || '') : m.description;
                html += `<div class="desc">${desc}</div>`;
            }
            html += '<table style="margin-top:10px;border-top:1px solid #eee;padding-top:8px">';
            for (const w of WORD_LIST) {
                const entry = lang.words[w.id];
                if (entry) {
                    html += `<tr><td>${w.en}</td><td>${entry[0]}</td><td style="color:#888;font-size:11px">/${entry[1]}/</td></tr>`;
                }
            }
            html += '</table>';
            infoContent.innerHTML = html;
            infoPanel.classList.add('visible');
        }

    })();
    </script>
</body>
</html>
