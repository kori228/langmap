        //
        // Some entries are in HIST_DESCENDANT (with `null` value) purely
        // to satisfy the validator's [#17] inverse-invariant check for
        // `dataStatus: 'fragmentary'` — but the underlying language is
        // LIVING (Rotokas, Taa, Itelmen, Tundra Yukaghir, Yuchi,
        // Kusunda). Strip them so the modern/historical filter doesn't
        // misclassify them as historical.
        const LIVING_FRAGMENTARY_CODES = new Set([
            'roo', 'nmn', 'itl', 'ykg', 'yuc', 'kgg',
            // 2026-05-17: trivia-featured Australian + Americas langs.
            'lbz', 'nny', 'kky', 'blc', 'tue', 'ncs',
        ]);
        const HIST_CODE_SET = new Set(
            Object.keys(HIST_DESCENDANT).filter(c => !LIVING_FRAGMENTARY_CODES.has(c))
        );

        // Phase 3b (Session 37): build reverse map for ancestor lookup.
        // For each modern lang code, list historical ancestors that descend to it.
        const ANCESTORS_OF = {};
        for (const [hist, modern] of Object.entries(HIST_DESCENDANT)) {
            if (!modern) continue;
            (ANCESTORS_OF[modern] = ANCESTORS_OF[modern] || []).push(hist);
        }
        window.__langmap.historical = showHistorical;
        window.__langmap.getActiveCodes = function () {
            const out = new Set();
            if (showHistorical) {
                for (const c of HIST_CODE_SET) if (LANG_DATA[c]) out.add(c);
            } else {
                for (const c of Object.keys(LANG_DATA)) {
                    if (HIST_CODE_SET.has(c)) continue;
                    if (EXCLUDED_CODES.has(c)) continue;
                    out.add(c);
                }
            }
            return out;
        };

        // True if both surface and IPA are dash/empty — the entry is
        // explicitly unattested (common in fragmentary historical languages
        // like Meroitic, Pyu, Khitan, PIE for non-basic vocab). Skip these
        // to avoid showing "—" as a fake word on the map. Per wordmap-check.md §3.
        function isUnattestedEntry(entry) {
            if (!Array.isArray(entry) || entry.length !== 2) return true;
            const [w, ipa] = entry;
            const dashOrEmpty = v => !v || v === '—' || v === '-';
            return dashOrEmpty(w) && dashOrEmpty(ipa);
        }

        // Read the canonical speaker count for `code`. Falls back through
        // the structured speakerCount overlay (Task 220) → prose parsing
        // → 0. Used by getVisibleLangs() to gate display by zoom level.
        function langSpeakerCount(code) {
            const m = LANG_DATA[code] && LANG_DATA[code].meta;
            if (!m) return 0;
            const sc = m.speakerCount;
            if (sc) {
                if (typeof sc.l1 === 'number')        return sc.l1;
                if (typeof sc.total === 'number')     return sc.total;
                if (typeof sc.rangeMax === 'number')  return sc.rangeMax;
                if (typeof sc.l1RangeMax === 'number') return sc.l1RangeMax;
            }
            // Light prose fallback: pull the leading numeric magnitude.
            const s = m.speakers;
            if (typeof s !== 'string') return 0;
            const mat = s.match(/(\d+(?:[.,]\d+)?)\s*([KMB])\b/i);
            if (mat) {
                const n = parseFloat(mat[1].replace(',', '.'));
                const u = mat[2].toUpperCase();
                if (u === 'K') return n * 1_000;
                if (u === 'M') return n * 1_000_000;
                if (u === 'B') return n * 1_000_000_000;
            }
            const bare = s.match(/^\D*(\d{4,})/);
            return bare ? parseInt(bare[1], 10) : 0;
        }

        // Priority-based greedy thinning for the modern map (user request
        // 2026-05-19). Given a list of language codes and their already-
        // projected pixel positions, return at most `maxCount` codes such
        // that no two selected labels are within `minPxDist` of each other.
        // Selection order is by speakerCount descending so the linguistically
        // largest representatives always win a contested cell. Cleared by
        // the existing zoom-tier gate for low zooms; this kicks in once the
        // gate releases the full ~900-lang pool at z≥5 and prevents Europe /
        // East Asia / South Asia from looking like a pin explosion while
        // sub-Saharan / Siberia / Oceania look empty.
        function selectByPriority(codes, positions, minPxDist, maxCount) {
            if (codes.length <= maxCount) {
                // Cap not yet exceeded; still apply overlap thinning so
                // dense regions don't dominate. Skip if even thinner.
            }
            const sorted = codes.slice().sort((a, b) => {
                const sa = langSpeakerCount(a) || 0;
                const sb = langSpeakerCount(b) || 0;
                if (sb !== sa) return sb - sa;
                // Stable tiebreak by code string so panning doesn't reshuffle
                return a < b ? -1 : (a > b ? 1 : 0);
            });
            const kept = [];
            const keptPts = [];
            const minSq = minPxDist * minPxDist;
            // Co-located threshold: pairs within this pixel distance are
            // treated as "same point" and handed off to the cellGroups
            // vertical-stacking fallback rather than blocked here. Without
            // this, langs that share a city (e.g. ga + en_ie both at Dublin,
            // or yi + de both in Berlin, or hy_grab + hy both at Yerevan)
            // had the higher-speaker partner monopolize the location and
            // the smaller lang silently vanished. 8px ≈ within the same
            // labelH-tall cell at typical fs, so stacking will render them
            // adjacent vertically.
            const COLOCATED_SQ = 8 * 8;
            for (const code of sorted) {
                if (kept.length >= maxCount) break;
                const pt = positions[code];
                if (!pt) continue;
                let blocked = false;
                for (let i = 0; i < keptPts.length; i++) {
                    const dx = keptPts[i].x - pt.x;
                    const dy = keptPts[i].y - pt.y;
                    const d2 = dx * dx + dy * dy;
                    if (d2 < minSq && d2 > COLOCATED_SQ) { blocked = true; break; }
                }
                if (!blocked) {
                    kept.push(code);
                    keptPts.push(pt);
                }
            }
            return kept;
        }

        function getVisibleLangs(wordId, zoom) {
            const visibleLangs = [];
            const unattestedLangs = [];
            const descendantCodes = new Set();
            // Trivia spotlight: when active, ignore the zoom-tier gating
            // entirely and return only the spotlit codes. Used by the
            // compare action so the listed languages are visible at any
            // zoom level (without it, low-zoom views hide tiny-speaker
            // langs like Rotokas / Hawaiian).
            if (_triviaSpotlight && _triviaSpotlight.size > 0) {
                for (const code of _triviaSpotlight) {
                    const lang = LANG_DATA[code];
                    if (!lang || !lang.words || !lang.words[wordId]) continue;
                    if (isUnattestedEntry(lang.words[wordId])) {
                        unattestedLangs.push(code);
                    } else {
                        visibleLangs.push(code);
                    }
                }
                return { visibleLangs, unattestedLangs, descendantCodes };
            }
            // User request 2026-05-09: if any lang-filter chip is active,
            // override the zoom-based gate so users see everything that
            // matches their filter regardless of zoom.
            const filterActive = (window.__langmap
                && typeof window.__langmap.anyFilterActive === 'function'
                && window.__langmap.anyFilterActive());
            // Speaker-count threshold by zoom (modern path).
            // Desktop & Mobile (unified 2026-05-19 — mobile gate previously
            // shifted up by 1 to match the smaller screen, but the new
            // priority-based thinning (selectByPriority) now handles density
            // uniformly across both, so the candidate pool can be the same):
            //   z ≤ 3   → 100M+ only
            //   z = 4   → 10M+ only
            //   z ≥ 5   → all
            // Filter-active overrides this (treated as zoom ≥ 5).
            const tierMin = filterActive ? 0
                : (zoom <= 3 ? 100_000_000
                   : zoom <= 4 ? 10_000_000
                   : 0);
            if (showHistorical) {
                for (const [hist, modern] of Object.entries(HIST_DESCENDANT)) {
                    if (!LANG_DATA[hist] || !LANG_DATA[hist].words[wordId]) continue;
                    if (isUnattestedEntry(LANG_DATA[hist].words[wordId])) {
                        unattestedLangs.push(hist);
                    } else {
                        visibleLangs.push(hist);
                        if (modern && LANG_DATA[modern] && LANG_DATA[modern].words[wordId] && !isUnattestedEntry(LANG_DATA[modern].words[wordId])) {
                            descendantCodes.add(modern);
                        }
                    }
                }
                for (const code of descendantCodes) visibleLangs.push(code);
            } else {
                for (const [code, lang] of Object.entries(LANG_DATA)) {
                    if (EXCLUDED_CODES.has(code)) continue;
                    if (!lang.words[wordId]) continue;
                    if (tierMin > 0 && langSpeakerCount(code) < tierMin) continue;
                    if (isUnattestedEntry(lang.words[wordId])) {
                        unattestedLangs.push(code);
                    } else {
                        visibleLangs.push(code);
                    }
                }
            }
            return { visibleLangs, unattestedLangs, descendantCodes };
        }

        // HTML-escape utility (per wordmap-check-4.md §5). All data values
        // (word, ipa, displayName, native, descriptions, etc.) MUST go
        // through this before being inserted into innerHTML strings.
        // Color values (descColor) are validated against an allow-list
        // since they're set by code, not by data — an attribute escape
        // would also work but is unnecessary for fixed enum values.
        const ESCAPE_HTML_MAP = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' };
        function escapeHtml(s) {
            if (s == null) return '';
            return String(s).replace(/[&<>"']/g, c => ESCAPE_HTML_MAP[c]);
        }
        const ALLOWED_DESC_COLORS = new Set(['#c0392b', '#ff6b6b', '']);
        function safeColor(c) { return ALLOWED_DESC_COLORS.has(c) ? c : ''; }

        function buildLabelHtml(code, word, ipa, displayName, descColor, cssClass) {
            const isVertical = VERTICAL_LANGS.has(code);
            const c = safeColor(descColor);
            const codeAttr = escapeHtml(code);
            const w = escapeHtml(word), i = escapeHtml(ipa), n = escapeHtml(displayName);
            // Audit Task 135: keyboard-accessible labels.
            // role="button" + tabindex="0" lets keyboard users tab to the
            // label and Enter/Space to open the language modal. aria-label
            // includes display name + word + IPA so screen readers announce
            // a meaningful summary.
            const ariaParts = [n];
            if (showWord && word) ariaParts.push(word);
            if (showIpa && ipa) ariaParts.push('/' + ipa + '/');
            const ariaLabel = escapeHtml(ariaParts.filter(Boolean).join(' — '));
            let html = `<div class="${cssClass}${isVertical ? ' vertical' : ''}" data-code="${codeAttr}" role="button" tabindex="0" aria-label="${ariaLabel}">`;
            // Audit Task 129: dir="auto" on word + name so RTL labels render
            // in correct order; IPA stays LTR.
            if (showWord) html += `<div class="word" dir="auto" ${c ? `style="color:${c}"` : ''}>${w}</div>`;
            if (showIpa) html += `<div class="ipa" dir="ltr" ${c ? `style="color:${c}"` : ''}>/${i}/</div>`;
            if (showName) html += `<div class="name" dir="auto" ${c ? `style="color:${c}"` : ''}>${n}</div>`;
            html += '</div>';
            return html;
        }

        function getDisplayName(code, lang) {
            if (showNative) return lang.native;
            const names = LANG_NAMES[uiLang] || LANG_NAMES.en || {};
            return names[code] || lang.name;
        }

        function updateMarkers(wordId) {
            currentWord = wordId;

            if (is3D) {
                updateGlobeLabels(wordId);
                return;
            }

            markers.forEach(m => map.removeLayer(m));
            markers.length = 0;
            const zoom = map.getZoom();
            const labelScale = parseInt(fontSizeSlider.value, 10) / 100;

            const { visibleLangs, unattestedLangs, descendantCodes } = getVisibleLangs(wordId, zoom);

            // --- Pixel-grid-based grouping ---
            // Project every visible marker to container pixel coords at the
            // current zoom, then bucket into a coarse grid whose cell size
            // matches the estimated label box. Markers in the same cell get
            // stacked vertically. Grid bucketing avoids chain-expansion of
            // overlapping pairs into huge groups across the map.
            let baseLineH = 0;
            if (showWord) baseLineH += (zoom <= 3 ? 13 : zoom <= 5 ? 15 : 17);
            if (showIpa)  baseLineH += (zoom <= 3 ? 10 : zoom <= 5 ? 11 : 12);
            if (showName) baseLineH += (zoom <= 3 ? 9  : zoom <= 5 ? 10 : 11);
            const labelH = (baseLineH * labelScale) + 4;
            const labelW = (zoom <= 3 ? 60 : zoom <= 5 ? 80 : 100) * labelScale;

            // When a filter is active, only ACTIVE labels compete for cell
            // slots. Dimmed (filtered-out) labels stay at their natural
            // position and don't push active labels around. (Per user
            // request 2026-05-04: "filter で非活性化された言語は退ける
            // 対応から外す。活性化された言語のみかぶらないように退ける".)
            const filterActive = (window.__langmap && typeof window.__langmap.anyFilterActive === 'function')
                && window.__langmap.anyFilterActive();
            const isActive = (code) => !filterActive
                || (window.__langmap.passesFilter && window.__langmap.passesFilter(code));

            const ppx = {};
            // First pass: project ALL visible langs to pixels.
            for (const code of visibleLangs) {
                const lang = LANG_DATA[code];
                const pt = map.latLngToContainerPoint([lang.lat, lang.lng]);
                ppx[code] = pt;
            }
            // Also project unattested historical langs so they participate
            // in the same cellGroups + merge pass (see below). Without
            // this, an unattested hist lang sitting on top of an attested
            // modern descendant rendered at its raw lat/lng and visually
            // collided with the modern label (user report 2026-05-22:
            // "歴史言語の場合、現代語に被るケースがある気がします").
            for (const code of unattestedLangs) {
                const lang = LANG_DATA[code];
                if (!lang) continue;
                const pt = map.latLngToContainerPoint([lang.lat, lang.lng]);
                ppx[code] = pt;
            }

            // Priority-based greedy thinning for the modern, no-filter,
            // no-spotlight path. Updated 2026-05-19 (user feedback that
            // mobile z=6 still missed many langs): the thinning now scopes
            // to the VIEWPORT instead of the whole world, so dense visible
            // regions like Europe can take the full cap budget without
            // off-screen high-speaker langs (Chinese/Hindi from elsewhere)
            // eating the slots. Skipped when:
            //   - trivia spotlight is active (already filtered to specific
            //     codes; user wants those visible at any zoom)
            //   - any filter chip is active (user wants ALL filter matches)
            //   - historical mode (different visualization purpose)
            const _spotlightActive = _triviaSpotlight && _triviaSpotlight.size > 0;
            const _mobile = window.matchMedia('(max-width: 640px)').matches;
            let renderLangs = visibleLangs;
            if (!_spotlightActive && !filterActive && !showHistorical) {
                // Restrict the candidate pool to langs whose marker is in
                // the visible viewport (with a generous margin so labels
                // partially extending off-screen still get drawn).
                const mapContainer = map.getContainer();
                const cw = mapContainer ? mapContainer.clientWidth : 1024;
                const ch = mapContainer ? mapContainer.clientHeight : 768;
                const MARGIN = 200; // px outside viewport still in pool
                const inViewport = visibleLangs.filter(code => {
                    const pt = ppx[code];
                    return pt && pt.x >= -MARGIN && pt.x <= cw + MARGIN
                                && pt.y >= -MARGIN && pt.y <= ch + MARGIN;
                });
                // Tuning notes:
                //   - viewport-scoped cap: mobile=120, desktop=180 (~good
                //     density for typical mobile viewport on z=6)
                //   - overlap radius: 0.55*labelW (both desktop and mobile).
                //     labelW is a conservative upper bound on actual label
                //     width (real native-name text is usually 50-60% of
                //     labelW), so a multiplier of 0.55 still keeps labels
                //     from rendering on top of each other while letting
                //     adjacent langs through. Desktop used 0.75 before but
                //     that over-blocked at high fs — e.g. at fs=140 z=6,
                //     Khmer (Phnom Penh) was suppressed because Vietnamese
                //     Southern (Ho Chi Minh City) is ~85px away while the
                //     gate demanded 105px. Vertical stacking fallback
                //     handles any residual overlap.
                const MAX_PINS = _mobile ? 120 : 180;
                const MIN_PX = labelW * 0.55;
                renderLangs = selectByPriority(inViewport, ppx, MIN_PX, MAX_PINS);
                // Ensure the user-focused language survives speaker-tier
                // thinning. selectByPriority sorts by speaker count and
                // drops anything within MIN_PX of a higher-speaker neighbor
                // — so Dungan (~150K) gets thinned out by Kyrgyz (~5M) at
                // the same lat/lng. The collision pass below already gives
                // the focused lang top placement priority, but it can only
                // do that if focused is IN renderLangs.
                const _fp = document.getElementById('lang-info');
                const _fc = (_fp && _fp.classList.contains('visible'))
                    ? _fp.dataset.code : null;
                if (_fc && visibleLangs.includes(_fc)
                    && !renderLangs.includes(_fc) && ppx[_fc]) {
                    renderLangs = renderLangs.concat([_fc]);
                }
            }

            const cellGroups = {};
            const codeToCell = {};  // code -> cellKey (post-merge)
            // Bucketize BOTH attested (renderLangs) and unattested historical
            // langs into the same cellGroups, so a hist lang with "—"
            // placeholder co-located with a modern descendant gets stacked
            // alongside it instead of free-floating.
            const stackableLangs = [...renderLangs, ...unattestedLangs];
            for (const code of stackableLangs) {
                if (!isActive(code)) continue;  // dimmed labels don't compete
                const pt = ppx[code];
                if (!pt) continue;
                const cellKey = Math.floor(pt.x / labelW) + ',' + Math.floor(pt.y / labelH);
                if (!cellGroups[cellKey]) cellGroups[cellKey] = [];
                cellGroups[cellKey].push(code);
                codeToCell[code] = cellKey;
            }

            // Merge pass: when a cell has a stack of >=2, the stack
            // visually extends into vertically-adjacent cells. If those
            // adjacent cells also have labels, the stacked label collides
            // with them. Pull those adjacent labels into the same stack.
            // (User report 2026-05-22: "2つがもっと離れていますが、離れた
            // 後にその場所にある別の言語と表示が被ってしまっているケース".)
            const STACK_UNIT = labelH + 14;
            let _mergeChanged = true;
            let _mergeIter = 0;
            while (_mergeChanged && _mergeIter < 5) {
                _mergeChanged = false;
                _mergeIter++;
                for (const key of Object.keys(cellGroups)) {
                    const group = cellGroups[key];
                    if (!group || group.length < 2) continue;
                    const [cx, cy] = key.split(',').map(Number);
                    // Stack of N extends ((N-1)/2) * STACK_UNIT above and
                    // below the group's mean y, AND each end-label itself
                    // is labelH/2 tall — so a label sitting at the far edge
                    // of an adjacent cell (labelH below that boundary) can
                    // still visually collide with the stack's end label.
                    // Add +1 cell of headroom on top of the raw stack span
                    // so the merge absorbs those worst-case adjacents. The
                    // outer while-loop re-runs until no more merges, so
                    // chains like {ko_mid+ko_gor → +ko_hg → +ko_kp → +okg}
                    // pull in all four nearby Korean Peninsula langs.
                    const halfStack = ((group.length - 1) * STACK_UNIT) / 2;
                    const cellReach = Math.max(1, Math.ceil(halfStack / labelH) + 1);
                    for (let r = 1; r <= cellReach; r++) {
                        for (const dir of [-1, +1]) {
                            const adjKey = cx + ',' + (cy + r * dir);
                            if (cellGroups[adjKey] && cellGroups[adjKey].length > 0) {
                                // Merge — preserve N→S ordering for natural reading
                                if (dir < 0) {
                                    cellGroups[key] = [...cellGroups[adjKey], ...group];
                                } else {
                                    cellGroups[key] = [...group, ...cellGroups[adjKey]];
                                }
                                for (const c of cellGroups[adjKey]) codeToCell[c] = key;
                                delete cellGroups[adjKey];
                                _mergeChanged = true;
                            }
                        }
                    }
                }
            }

            // For every merged group, sort by marker y so the stack
            // reads naturally north→south (top→bottom). Then compute the
            // mean x AND y so stacked labels share a single column at the
            // group's centroid — without the x alignment, markers at
            // slightly different lng (e.g. okg 126.19, ko_mid 126.55,
            // ko 126.98 around Korea) render the stack as a zigzag and
            // neighbouring labels collide sideways.
            const groupMeanX = {};
            const groupMeanY = {};
            for (const [key, codes] of Object.entries(cellGroups)) {
                if (codes.length < 2) continue;
                codes.sort((a, b) => ppx[a].y - ppx[b].y);  // north → south
                let sumX = 0, sumY = 0;
                for (const c of codes) { sumX += ppx[c].x; sumY += ppx[c].y; }
                groupMeanX[key] = sumX / codes.length;
                groupMeanY[key] = sumY / codes.length;
            }

            // Compute initial (xOffset, yOffset) for every renderable lang
            // using cellGroups stacking. Stored in offsets[code] so the
            // final collision pass below can adjust them as needed.
            const offsets = {};
            const unattestedSet = new Set(unattestedLangs);
            const allRenderable = [...renderLangs, ...unattestedLangs];
            for (const code of allRenderable) {
                if (!ppx[code]) continue;
                const pt = ppx[code];
                const cellKey = codeToCell[code];
                let xOff = 0, yOff = 0;
                if (cellKey != null) {
                    const group = cellGroups[cellKey];
                    if (group && group.length > 1) {
                        const idx = group.indexOf(code);
                        if (idx >= 0) {
                            const center = (group.length - 1) / 2;
                            const targetX = groupMeanX[cellKey];
                            const targetY = groupMeanY[cellKey] + (idx - center) * STACK_UNIT;
                            xOff = targetX - pt.x;
                            yOff = targetY - pt.y;
                        }
                    }
                }
                offsets[code] = { x: xOff, y: yOff };
            }

            // FINAL COLLISION AVOIDANCE PASS — guarantees no overlapping
            // labels. The cellGroups + merge pass above handles most
            // co-location cases, but cell-boundary edge cases (two markers
            // straddling a cell border, or X-adjacent labels missed by the
            // vertical-only merge) can still leave residual visual overlap.
            // Walk all labels in priority order (speakers desc) and find
            // the nearest non-overlapping y slot (trying both up and down).
            // If no slot fits within MAX_PUSH of the target position the
            // label is hidden — better to drop a hard-to-place label than
            // render it hundreds of pixels away from its true location
            // (user report 2026-05-22: ko_hg ended up at Daejeon when
            // pushed far south to find a free slot).
            // Selected language (lang-info modal currently open) — user
            // explicitly chose this one (via search click, marker click,
            // or ?lang= URL param), so they must SEE it. Promote to the
            // very top of collision priority so a higher-speaker neighbor
            // (e.g. Kyrgyz crowding out Dungan at the same lat/lng)
            // doesn't push it past MAX_PUSH and hide it.
            //
            // Use a fresh DOM lookup instead of the `infoPanel` const —
            // updateMarkers() runs during boot BEFORE the `const infoPanel`
            // declaration further down (TDZ), so a direct reference throws.
            const _focusedPanel = document.getElementById('lang-info');
            const _focusedCode = (_focusedPanel
                && _focusedPanel.classList.contains('visible'))
                ? _focusedPanel.dataset.code : null;
            const _spotlight = (typeof _triviaSpotlight !== 'undefined') ? _triviaSpotlight : null;
            const _collisionOrder = allRenderable.filter(c => ppx[c]).slice();
            _collisionOrder.sort((a, b) => {
                // Focused (lang-info modal open on it) wins outright.
                if (_focusedCode) {
                    if (a === _focusedCode && b !== _focusedCode) return -1;
                    if (b === _focusedCode && a !== _focusedCode) return 1;
                }
                // Trivia spotlight: forced-visible langs (compare panel
                // pinned X languages — they should all stay visible).
                if (_spotlight) {
                    const aSpot = _spotlight.has(a) ? 0 : 1;
                    const bSpot = _spotlight.has(b) ? 0 : 1;
                    if (aSpot !== bSpot) return aSpot - bSpot;
                }
                // Attested before unattested (unattested has lower priority
                // so it gets pushed in dense areas).
                const aUna = unattestedSet.has(a) ? 1 : 0;
                const bUna = unattestedSet.has(b) ? 1 : 0;
                if (aUna !== bUna) return aUna - bUna;
                const sa = langSpeakerCount(a) || 0;
                const sb = langSpeakerCount(b) || 0;
                if (sb !== sa) return sb - sa;
                return a < b ? -1 : a > b ? 1 : 0;
            });
            // Conservative bounding-box half-extents. Width uses 40% of
            // labelW (labels are usually 50-60% of labelW in practice),
            // height matches labelH plus a small safety margin.
            const _bbHalfW = labelW * 0.4;
            const _bbHalfH = labelH * 0.5 + 2;
            // Cap on how far the collision pass can push a label from its
            // cellGroups-assigned target. Beyond this the label is hidden
            // (kept off the map) rather than visually relocated to a
            // misleading geographic position.
            const MAX_PUSH = labelH * 1.5;
            const _placedBoxes = [];
            const hiddenCodes = new Set();
            const _findFreeY = (cx, startY, _placed, dir) => {
                // Walk dir=+1 (down) or dir=-1 (up) until we find a y with
                // no collision against the placed boxes. Return the y, or
                // Infinity if we exceeded MAX_PUSH from startY.
                let y = startY;
                for (let attempt = 0; attempt < 40; attempt++) {
                    let collided = null;
                    for (const p of _placed) {
                        if (Math.abs(p.cx - cx) < _bbHalfW * 2 &&
                            Math.abs(p.cy - y) < _bbHalfH * 2) {
                            collided = p; break;
                        }
                    }
                    if (!collided) return y;
                    if (dir > 0) {
                        y = collided.cy + _bbHalfH * 2 + 4;
                    } else {
                        y = collided.cy - _bbHalfH * 2 - 4;
                    }
                    if (Math.abs(y - startY) > MAX_PUSH) return Infinity;
                }
                return Infinity;
            };
            for (const code of _collisionOrder) {
                const pt = ppx[code];
                const off = offsets[code];
                const cx = pt.x + off.x;
                const cyTarget = pt.y + off.y;
                // Try both directions and take the smaller displacement.
                const cyDown = _findFreeY(cx, cyTarget, _placedBoxes, +1);
                const cyUp   = _findFreeY(cx, cyTarget, _placedBoxes, -1);
                const dDown = isFinite(cyDown) ? Math.abs(cyDown - cyTarget) : Infinity;
                const dUp   = isFinite(cyUp)   ? Math.abs(cyUp   - cyTarget) : Infinity;
                const cy = dDown <= dUp ? cyDown : cyUp;
                if (!isFinite(cy)) {
                    // No slot within MAX_PUSH in either direction — hide it.
                    hiddenCodes.add(code);
                    continue;
                }
                _placedBoxes.push({ cx, cy });
                offsets[code] = { x: cx - pt.x, y: cy - pt.y };
            }

            // Single render loop for both attested and unattested langs.
            // Skip codes that the collision pass couldn't place.
            for (const code of allRenderable) {
                if (hiddenCodes.has(code)) continue;
                const lang = LANG_DATA[code];
                if (!lang) continue;
                const off = offsets[code] || { x: 0, y: 0 };
                const isUna = unattestedSet.has(code);
                let word, ipa;
                if (isUna) {
                    word = '—'; ipa = '—';
                } else {
                    const entry = lang.words[wordId];
                    word = entry[0]; ipa = entry[1];
                }
                const displayName = getDisplayName(code, lang);
                const isDescendant = showHistorical && descendantCodes.has(code);
                const descColor = (isDescendant && !isUna) ? '#c0392b' : '';
                const cssClass = isUna ? 'lang-label unattested' : 'lang-label';
                const html = buildLabelHtml(code, word, ipa, displayName, descColor, cssClass);
                const labelHtml = html.replace('>', ` style="transform:translate(calc(-50% + ${off.x}px),calc(-50% + ${off.y}px))">`);
                const icon = L.divIcon({ className: '', html: labelHtml, iconSize: [0, 0], iconAnchor: [0, 0] });
                const marker = L.marker([lang.lat, lang.lng], { icon, interactive: true });
                marker._langCode = code;
                marker.on('click', () => showLangInfo(code));
                marker.addTo(map);
                markers.push(marker);
            }
            // Re-apply selected highlight + connector after re-render
            // (markers are torn down and re-added each updateMarkers call).
            if (typeof updateSelectedLabel === 'function') updateSelectedLabel();
            if (typeof updateConnectorLine === 'function') updateConnectorLine();
            if (typeof refreshTriviaBlinks === 'function') refreshTriviaBlinks();
        }

        function updateGlobeLabels(wordId) {
            if (!globe) return;
            // Translate the current globe altitude to a Leaflet-equivalent
            // zoom and feed it to getVisibleLangs so 3D gates speaker
            // tiers the same way as the 2D map. This is called from the
            // globe controls' "end" event (via updateMarkers), so the
            // displayed set refreshes when the user finishes a zoom.
            const _pov3D = (globe.pointOfView && globe.pointOfView()) || { altitude: 1.0 };
            const _equivZoom = altitudeToZoom(_pov3D.altitude);
            const { visibleLangs, unattestedLangs, descendantCodes } = getVisibleLangs(wordId, _equivZoom);
            const labelScale = parseInt(fontSizeSlider.value, 10) / 100;
            // Globe altitude in [0.1, 6]; lower = zoomed-in, labels appear
            // larger relative to globe, so they need MORE degree separation.
            // Higher altitude = labels appear small, need LESS separation.
            const pov = globe.pointOfView();
            const altScale = Math.max(0.4, Math.min(2.5, 1 / Math.sqrt(pov.altitude)));

            // --- Lat/lng grid bucketing (degree cells scale with altitude and font) ---
            // Avoid chain-expansion: bucket by fixed cell size; only labels
            // landing in the same cell get stacked.
            let lines = 0;
            if (showWord) lines++;
            if (showIpa) lines++;
            if (showName) lines++;
            const baseSpacingDeg = (0.4 + lines * 0.3) * labelScale * altScale;
            const cellSizeDeg = baseSpacingDeg * 1.2;

            // When a filter is active, only ACTIVE labels compete for cell
            // slots — dimmed labels stay at their natural lat (consistent
            // with the 2D map behavior).
            const filterActive = (window.__langmap && typeof window.__langmap.anyFilterActive === 'function')
                && window.__langmap.anyFilterActive();
            const isActive = (code) => !filterActive
                || (window.__langmap.passesFilter && window.__langmap.passesFilter(code));

            const cellGroups = {};
            for (const code of visibleLangs) {
                if (!isActive(code)) continue;  // dimmed labels don't compete
                const lang = LANG_DATA[code];
                const cellKey = Math.floor(lang.lat / cellSizeDeg) + ',' + Math.floor(lang.lng / cellSizeDeg);
                if (!cellGroups[cellKey]) cellGroups[cellKey] = [];
                cellGroups[cellKey].push(code);
            }

            const elements = [];
            for (const code of visibleLangs) {
                const lang = LANG_DATA[code];
                const entry = lang.words[wordId];
                if (!entry) continue;
                const [word, ipa] = entry;
                const displayName = getDisplayName(code, lang);
                const isDescendant = showHistorical && descendantCodes.has(code);
                const descColor = isDescendant ? '#ff6b6b' : '';

                // Offset co-located labels by shifting latitude (zoom + scale aware)
                const cellKey = Math.floor(lang.lat / cellSizeDeg) + ',' + Math.floor(lang.lng / cellSizeDeg);
                const group = cellGroups[cellKey];
                let latOffset = 0;
                if (group && group.length > 1) {
                    const idx = group.indexOf(code);
                    if (idx >= 0) {  // dimmed labels weren't bucketed
                        const center = (group.length - 1) / 2;
                        latOffset = (idx - center) * baseSpacingDeg;
                    }
                }

                const el = document.createElement('div');
                el.innerHTML = buildLabelHtml(code, word, ipa, displayName, descColor, 'globe-label');
                el.firstChild.dataset.code = code;

                elements.push({ el: el.firstChild, lat: lang.lat + latOffset, lng: lang.lng, code });
            }
            // 3D unattested cells: full .globe-label cards with "—" placeholders
            // (mirrors 2D version). Same shape as attested labels so the
            // connector line picks them up via .globe-label[data-code=...].
            for (const code of unattestedLangs) {
                if (!isActive(code)) continue;
                const lang = LANG_DATA[code];
                if (!lang) continue;
                const displayName = getDisplayName(code, lang);
                const el = document.createElement('div');
                el.innerHTML = buildLabelHtml(code, '—', '—', displayName, '', 'globe-label unattested');
                el.firstChild.dataset.code = code;
                el.firstChild.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showLangInfo(code);
                });
                elements.push({ el: el.firstChild, lat: lang.lat, lng: lang.lng, code });
            }
            // Trivia panto label (transient place-name balloon). Pushed
            // last so it stacks on top of language labels at the same lat/lng.
            if (_pantoGlobeLabel && _pantoGlobeLabel.el) {
                elements.push({
                    el: _pantoGlobeLabel.el,
                    lat: _pantoGlobeLabel.lat,
                    lng: _pantoGlobeLabel.lng,
                });
            }
            globe.htmlElementsData(elements);
            // Re-apply selected highlight + connector after globe re-renders
            // (labels are managed by globe.gl; defer one tick for DOM update)
            requestAnimationFrame(() => {
                if (typeof updateSelectedLabel === 'function') updateSelectedLabel();
                if (typeof updateConnectorLine === 'function') updateConnectorLine();
                if (typeof refreshTriviaBlinks === 'function') refreshTriviaBlinks();
            });
        }

        // --- URL hash ---
        // URL hash management — uses URLSearchParams + history.replaceState
        // (per wordmap-check-4.md §6 + §11). Preserves filter-state param
        // owned by lang-filter.js. replaceState avoids polluting back-button
        // history on every map move/zoom.
        function updateHash(opts) {
            opts = opts || {};
            // Audit Task 123: don't write hash while we're applying one
            // from popstate/hashchange — that would bounce-back loop.
            if (window.__langmap && window.__langmap.isApplyingHash && window.__langmap.isApplyingHash()) return;
            let lat, lng, z;
            if (is3D && globe) {
                const pov = globe.pointOfView();
                lat = pov.lat; lng = pov.lng;
                z = Math.round(2 + Math.log(4.0 / Math.max(0.2, pov.altitude)) / Math.log(1 / 0.55));
            } else {
                const c = map.getCenter();
                lat = c.lat; lng = c.lng;
                z = map.getZoom();
            }
            const params = new URLSearchParams();
            params.set('w', currentWord);
            params.set('z', String(z));
            params.set('lat', lat.toFixed(2));
            params.set('lng', lng.toFixed(2));
            params.set('nat', showNative ? '1' : '0');
            params.set('hist', showHistorical ? '1' : '0');
            params.set('fs', String(fontSizeSlider.value));
            params.set('ui', uiLang);
            params.set('g3d', is3D ? '1' : '0');
            if (is3D && globe) params.set('alt', globe.pointOfView().altitude.toFixed(2));
            // Persist open language modal so reload restores it.
            const openCode = infoPanel && infoPanel.classList.contains('visible')
                ? infoPanel.dataset.code : '';
            if (openCode) params.set('lang', openCode);
            // Persist open trivia article so reload / share URL restores it.
            const triviaModal = document.getElementById('trivia-modal');
            const openTrivia = triviaModal && triviaModal.classList.contains('visible')
                ? triviaModal.dataset.articleId : '';
            if (openTrivia) params.set('trivia', openTrivia);
            // Pass 32: persist compare list
            if (window.__compareList && window.__compareList.length > 0) {
                params.set('cmp', window.__compareList.join(','));
            }
            // Preserve the filter param owned by lang-filter.js
            const fParam = (window.__langmap && typeof window.__langmap.getFilterHashParam === 'function')
                ? window.__langmap.getFilterHashParam() : '';
            if (fParam) {
                const eq = fParam.indexOf('=');
                params.set(fParam.slice(0, eq), fParam.slice(eq + 1));
            }
            const hash = '#' + params.toString();
            // replaceState by default — avoids history bloat from continuous
            // moveend/zoomend. Caller can pass {push:true} for explicit nav.
            try {
                if (opts.push) history.pushState(null, '', hash);
                else          history.replaceState(null, '', hash);
            } catch (e) { location.hash = hash; }
        }

        function loadHash() {
            const params = new URLSearchParams(location.hash.slice(1));
            const w = params.get('w');
            if (w && WORD_LIST.find(item => item.id === w)) {
                select.value = w;
                currentWord = w;
            }
            const z = parseInt(params.get('z'));
            const latStr = params.get('lat'); const lngStr = params.get('lng');
            const lat = parseFloat(latStr); const lng = parseFloat(lngStr);
            if (Number.isFinite(z) && Number.isFinite(lat) && Number.isFinite(lng)) {
                map.setView([lat, lng], z);
            }
            const nat = params.get('nat');
            if (nat === '0' || nat === '1') {
                showNative = nat === '1';
                updateNameSwitch();
            }
            const hist = params.get('hist');
            if (hist === '0' || hist === '1') {
                showHistorical = hist === '1';
                eraModern.classList.toggle('active', !showHistorical);
                eraHistorical.classList.toggle('active', showHistorical);
                eraModern.setAttribute('aria-checked', String(!showHistorical));
                eraHistorical.setAttribute('aria-checked', String(showHistorical));
            }
            const fs = parseInt(params.get('fs'));
            if (Number.isFinite(fs) && fs >= 50 && fs <= 200) {
                fontSizeSlider.value = String(fs);
                document.documentElement.style.setProperty('--label-scale', fs / 100);
            }
            const ui = params.get('ui');
            if (ui && WM_UI[ui]) {
                uiLang = ui;
                uiLangSelect.value = ui;
                window.__langmap.uiLang = uiLang;
                window.dispatchEvent(new CustomEvent('langmap:uichange', { detail: { uiLang } }));
                applyUILang();
            }
            // Fetch trivia translation overlay for the resolved uiLang (initial
            // load — also retriggered when the user picks a different uiLang).
            if (typeof loadTriviaI18nFor === 'function') loadTriviaI18nFor(uiLang);
            if (params.get('g3d') === '1') {
                is3D = true;
                btn3D.classList.add('active');
                btn3D.setAttribute('aria-pressed', 'true');
                btn3D.textContent = '3D';
                document.body.classList.add('is-3d');
                mapEl.style.display = 'none';
                globeEl.style.display = 'block';
                initGlobe();
                if (Number.isFinite(lat) && Number.isFinite(lng)) {
                    const altParam = parseFloat(params.get('alt'));
                    const alt = Number.isFinite(altParam) ? altParam : zoomToAltitude(Number.isFinite(z) ? z : 3);
                    globe.pointOfView({ lat, lng, altitude: alt });
                }
            }
            // Restore open language modal (after everything else is loaded so
            // map markers exist by the time we look up the label DOM).
            const langCode = params.get('lang');
            if (langCode && LANG_DATA[langCode]) {
                // Defer until after initial markers are rendered.
                setTimeout(() => { showLangInfo(langCode); }, 100);
            }
            // Restore open trivia article from URL (?trivia=<id>). Deferred
            // so the trivia setup block at the end of the IIFE has run.
            const triviaId = params.get('trivia');
            if (triviaId) {
                setTimeout(() => {
                    if (typeof window.openTrivia === 'function') {
                        window.openTrivia(triviaId);
                    }
                }, 150);
            }
        }
        loadHash();
        applyUILang(); // Apply detected/loaded UI language
        // Notify subscribers (lang-filter.js) of the resolved initial UI lang.
        // lang-filter.js loads before this inline script via <script src> in
        // the head, so its filter panel is built before __langmap.uiLang is
        // assigned here. Dispatching after loadHash() lets the filter pick
        // up the resolved (possibly hash-loaded) UI lang and rebuild its
        // chip translations. Per wordmap-check-4.md §12.
        window.__langmap.uiLang = uiLang;
        window.dispatchEvent(new CustomEvent('langmap:uichange', { detail: { uiLang } }));

        // Audit Task 123: respond to browser back/forward + manual hash edits.
        // Without this, copying a state URL to a new tab works (loadHash runs
        // at page load) but back/forward navigation does not restore state.
        // Guard against the feedback loop: applyHashState should not trigger
        // updateHash() for transient state changes during application.
        let _applyingHashState = false;
        function applyHashState() {
            if (_applyingHashState) return;
            _applyingHashState = true;
            try {
                loadHash();
                updateMarkers(currentWord);
            } finally {
                _applyingHashState = false;
            }
        }
        window.addEventListener('popstate',   applyHashState);
        window.addEventListener('hashchange', applyHashState);
        // Also expose so other code paths (search/option) can guard if needed.
        window.__langmap.isApplyingHash = () => _applyingHashState;

        // rAF-throttled connector update — keeps line glued to the label
        // during continuous map drag/zoom without re-layout thrashing.
        let _connRafPending = false;
        function scheduleConnectorUpdate() {
            if (_connRafPending) return;
            _connRafPending = true;
            requestAnimationFrame(() => {
                _connRafPending = false;
                // UX fix #4: refresh selectedLabel ref before redrawing so the
                // connector tracks fresh DOM position during/after zoom layout.
                if (typeof updateSelectedLabel === 'function') updateSelectedLabel();
                updateConnectorLine();
            });
        }
        map.on('zoomend', () => { updateMarkers(currentWord); updateHash(); updateSelectedLabel(); scheduleConnectorUpdate(); });
        // moveend re-runs updateMarkers so the viewport-scoped pin cap
        // (selectByPriority) re-evaluates which langs are in the visible
        // area. Without this, after panning, dropped pins stay dropped
        // and new regions show no pins until the user zooms.
        // Pan-only events: update the hash + connector immediately, but
        // DEBOUNCE the marker re-layout. Continuous panning (drag) skips
        // re-renders entirely (the user's drag feels smooth, markers
        // track lat/lng via Leaflet's translate transforms). When the
        // pan settles for 400ms we re-render once so languages in the
        // newly-revealed area appear. Explicit flies (centerLangOnMap)
        // attach their own one-shot moveend listener so they re-render
        // as soon as the fly settles, regardless of this debounce.
        let _panDebounceTimer = null;
        map.on('moveend', () => {
            updateHash();
            scheduleConnectorUpdate();
            clearTimeout(_panDebounceTimer);
            _panDebounceTimer = setTimeout(() => {
                try { updateMarkers(currentWord); } catch (_) {}
            }, 400);
        });
        // While the user is actively panning, cancel the pending
        // re-render so it only fires when motion stops for the full
        // debounce window.
        map.on('movestart', () => { clearTimeout(_panDebounceTimer); });
        // Continuous events for smooth tracking during drag
        map.on('move', scheduleConnectorUpdate);
        map.on('viewreset', scheduleConnectorUpdate);
        window.addEventListener('resize', scheduleConnectorUpdate);
        window.addEventListener('scroll', scheduleConnectorUpdate, true);
        // UX fix #4 (revised): Leaflet's `zoom`/`zoomanim` only fire once at the
        // start; they don't tick per-frame during the CSS-transform zoom animation.
        // Run a self-driving rAF loop from zoomstart to zoomend so the connector
        // tracks the label every frame while the map animates.
        let _zoomLoopActive = false;
        function zoomLoop() {
            if (!_zoomLoopActive) return;
            if (typeof updateSelectedLabel === 'function') updateSelectedLabel();
            updateConnectorLine();
            requestAnimationFrame(zoomLoop);
        }
        map.on('zoomstart', () => {
            _zoomLoopActive = true;
            requestAnimationFrame(zoomLoop);
        });
        map.on('zoomend', () => { _zoomLoopActive = false; });

        // Expose refresh for async LANG_NAMES load
        window._refreshMarkers = () => updateMarkers(currentWord);

        // Initial render
        updateMarkers(currentWord);

        // Zoom class
        function updateZoomClass() {
            const z = map.getZoom();
            const c = map.getContainer();
            c.classList.remove('zoom-far', 'zoom-mid', 'zoom-close');
            if (z <= 3) c.classList.add('zoom-far');
            else if (z <= 5) c.classList.add('zoom-mid');
            else c.classList.add('zoom-close');
        }
        map.on('zoomend', updateZoomClass);
        updateZoomClass();

        // --- Language info panel ---
        const infoPanel = document.getElementById('lang-info');
        const infoContent = document.getElementById('info-content');
        // Audit Task 137: track the element that opened the dialog so focus
        // can be restored on close. document.activeElement at close time is
        // unreliable because Leaflet markers are recreated on every render.
        let _lastDialogOpener = null;
        function closeInfoPanel() {
            infoPanel.classList.remove('visible');
            // Clear dataset.code so the open-language state is consistent
            // (per wordmap-check-4.md §19).
            delete infoPanel.dataset.code;
            updateSelectedLabel();
            updateConnectorLine();
            updateHash();  // remove `lang` param from URL
            // Audit Task 137: restore focus to the opener if still in DOM.
            // Falls back to language search input if opener has been removed.
            if (_lastDialogOpener && document.contains(_lastDialogOpener) && typeof _lastDialogOpener.focus === 'function') {
                try { _lastDialogOpener.focus(); } catch (_) { /* ignore */ }
            } else {
                const search = document.getElementById('lang-search');
                if (search) try { search.focus(); } catch (_) { /* ignore */ }
            }
            _lastDialogOpener = null;
        }

        // === Selected-language highlight + connector line to info panel ===
        // When the info panel is open, mark the corresponding map label
        // with .selected (yellow ring) and draw a dashed line from the
        // label to the panel's left edge. Recomputed on map move/zoom,
        // marker re-render, panel open/close, and window resize.
        // Lazy DOM lookups — these helpers can be called during initial
        // updateMarkers() before the const infoPanel above is in TDZ scope,
        // so resolve via getElementById each call. Cheap enough.
        function _infoPanel()    { return document.getElementById('lang-info'); }
        function _connectorSvg() { return document.getElementById('connector-line'); }
        function getSelectedLabelEl() {
            const ip = _infoPanel();
            if (!ip) return null;
            const code = ip.dataset.code;
            if (!code || !ip.classList.contains('visible')) return null;
            // Try 2D label first, then 3D globe label
            return document.querySelector(`.lang-label[data-code="${CSS.escape(code)}"]`)
                || document.querySelector(`.globe-label[data-code="${CSS.escape(code)}"]`);
        }
        // Track retries so updateSelectedLabel doesn't keep retrying forever
        // when the lang's marker is genuinely off-screen (e.g. far from the
        // current map center on reload). Reset every time the modal opens.
        let _selRetries = 0;
        function updateSelectedLabel() {
            const ip = _infoPanel();
            if (!ip) return;
            const open = ip.classList.contains('visible');
            // Clear previous selection AND restore the Leaflet marker's natural
            // z-index (the CSS z-index on `.selected` doesn't escape the marker
            // icon container — we have to bump the marker icon itself).
            document.querySelectorAll('.lang-label.selected, .globe-label.selected').forEach(el => {
                el.classList.remove('selected');
                const marker = el.closest('.leaflet-marker-icon');
                if (marker) marker.style.zIndex = '';
            });
            if (!open) return;
            const el = getSelectedLabelEl();
            if (el) {
                _selRetries = 0;
                el.classList.add('selected');
                // Bring selected label's marker icon to front so overlapping
                // nearby labels don't cover it (per user request).
                const marker = el.closest('.leaflet-marker-icon');
                if (marker) marker.style.zIndex = '1000';
            } else if (_selRetries < 20) {
                // The lang's marker hasn't been added to DOM yet (race between
                // loadHash showLangInfo and Leaflet marker rendering). Retry on
                // the next animation frame, up to ~20 frames (~333ms @ 60fps).
                // Common cause: page reload with `lang=xxx` in URL.
                _selRetries++;
                requestAnimationFrame(updateSelectedLabel);
            }
        }
        function updateConnectorLine() {
            const ip = _infoPanel();
            const svg = _connectorSvg();
            if (!ip || !svg) return;
            const open = ip.classList.contains('visible');
            const labelEl = open ? getSelectedLabelEl() : null;
            if (!open || !labelEl) {
                svg.classList.remove('visible');
                return;
            }
            const lr = labelEl.getBoundingClientRect();
            const pr = ip.getBoundingClientRect();
            // UX fix #3 (Session 53): in 3D mode, when the selected language
            // is on the far side of the globe, globe.gl sets the html-label
            // to display:none. getBoundingClientRect() then returns
            // (0,0,0,0), which would make the connector arrow originate from
            // the top-left corner of the viewport. Treat zero-size or
            // off-screen labels as "no source" and hide the line.
            const labelHidden = (lr.width === 0 && lr.height === 0)
                              || lr.right <= 0 || lr.bottom <= 0
                              || lr.left >= window.innerWidth
                              || lr.top >= window.innerHeight;
            if (labelHidden) {
                svg.classList.remove('visible');
                return;
            }
            // UX fix #2 (Session 38): if the label is fully behind the modal panel,
            // don't draw the line.
            const labelCx = lr.left + lr.width / 2;
            const labelCy = lr.top + lr.height / 2;
            const labelOccluded = labelCx >= pr.left && labelCx <= pr.right
                                && labelCy >= pr.top && labelCy <= pr.bottom;
            if (labelOccluded) {
                svg.classList.remove('visible');
                return;
            }
            // UX fix #2b (Session 39): mobile breakpoint matches CSS (768px) where
            // the modal docks to the bottom edge full-width. On mobile we draw a
            // vertical connector (label-bottom → modal-top); on desktop we draw a
            // horizontal-ish bezier (label-side → modal-vertical-center).
            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            const PANEL_INSET = 2;  // tip flush to modal edge
            let x1, y1, x2, y2;
            if (isMobile) {
                // Mobile: label-bottom-center → modal-top-center (vertical drop)
                x1 = labelCx;
                y1 = lr.bottom;
                x2 = pr.left + pr.width / 2;
                y2 = pr.top + PANEL_INSET;
            } else {
                // Desktop: label-side → modal-left/right-edge (vertical center)
                const panelOnLeft = pr.left + pr.width / 2 < labelCx;
                x1 = panelOnLeft ? lr.left : lr.right;
                y1 = labelCy;
                x2 = panelOnLeft ? pr.right - PANEL_INSET : pr.left + PANEL_INSET;
                y2 = pr.top + pr.height / 2;
            }
            // Single quadratic bezier — gentle curve. Control point logic differs
            // for vertical (mobile) vs horizontal (desktop) layouts.
            let cpx, cpy;
            if (isMobile) {
                // Mobile: bow horizontally a bit, mostly vertical line
                cpx = (x1 + x2) / 2 + (x1 < x2 ? 12 : -12);
                cpy = (y1 + y2) / 2;
            } else {
                // Desktop: bow upward
                cpx = (x1 + x2) / 2;
                cpy = (y1 + y2) / 2 - Math.min(40, Math.abs(y2 - y1) * 0.25 + 8);
            }
            const path = `M ${x1} ${y1} Q ${cpx} ${cpy} ${x2} ${y2}`;
            // marker-end on the path auto-orients the triangle arrowhead
            // to the tangent at the endpoint — no JS rotation needed.
            svg.querySelector('.conn-path').setAttribute('d', path);
            svg.classList.add('visible');

        // Pan the map (or globe) to a language's coordinate.
        //   Mobile: modal is near-fullscreen (Task 233), so simple
        //     setView is fine — the marker reveals when the modal closes.
        //   Desktop: modal occupies the right side (top:56, width:340,
        //     right:12 → ~352px reserved). Use fitBounds with
        //     paddingBottomRight so the marker centers in the LEFT
        //     visible portion of the map, not the geometric center.
        function centerLangOnMap(code) {
            const lang = LANG_DATA[code];
            if (!lang || !Number.isFinite(lang.lat) || !Number.isFinite(lang.lng)) return;
            if (is3D && globe) {
                globe.pointOfView({ lat: lang.lat, lng: lang.lng, altitude: 1.2 }, 800);
                return;
            }
            if (!map) return;
            // After the fly settles, re-layout markers ONCE so the focused
            // lang appears even when it was previously thinned out of
            // renderLangs. Done via 'moveend' (one-shot) rather than the
            // general 'moveend' handler — the general handler no longer
            // re-renders on pan for perf reasons (see comment there).
            const _flyDone = () => {
                map.off('moveend', _flyDone);
                try { updateMarkers(currentWord); } catch (_) {}
            };
            map.on('moveend', _flyDone);
            const targetZoom = Math.max(map.getZoom(), 5);
            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            if (isMobile) {
                // Shift the centered marker slightly below screen center so
                // it isn't visually obscured by the header (~60px) + 2D/3D
                // and gear button stack (~108px) at the top — user request
                // "中央より若干下になるように". paddingTopLeft on fitBounds
                // moves the effective centering down by half its value, so
                // ~120px padding → ~60px downward offset from raw center.
                try {
                    map.fitBounds([[lang.lat, lang.lng], [lang.lat, lang.lng]], {
                        paddingTopLeft: [0, 120],
                        maxZoom: targetZoom,
                        animate: true,
                    });
                } catch (e) {
                    map.setView([lang.lat, lang.lng], targetZoom);
                }
                return;
            }
            // Compute the live modal width so the marker stays centered
            // in the visible map area even if the modal CSS changes.
            // Fall back to 352 if the panel isn't measurable yet.
            const panel = document.getElementById('lang-info');
            let modalRight = 352;
            if (panel) {
                const r = panel.getBoundingClientRect();
                if (r.width > 0) modalRight = Math.round(r.width + 12);
            }
            try {
                map.fitBounds([[lang.lat, lang.lng], [lang.lat, lang.lng]], {
                    paddingBottomRight: [modalRight, 0],
                    maxZoom: targetZoom,
                    animate: true,
                });
            } catch (e) {
                map.setView([lang.lat, lang.lng], targetZoom);
            }
        }

        function showLangInfo(code) {
            const lang = LANG_DATA[code];

            // can restore focus on close. activeElement is the most reliable
            // signal for keyboard openers; pointer openers may have already
            // shifted focus, in which case the search input is a sane default.
            const opener = document.activeElement;
            if (opener && opener !== document.body) _lastDialogOpener = opener;
            // UX fix #1: toggle — second click on same code closes the modal.
            if (infoPanel.classList.contains('visible') && infoPanel.dataset.code === code) {
                closeInfoPanel();
                return;
            }
            infoPanel.dataset.code = code;
            renderLangInfo(code);
            infoPanel.classList.add('visible');
            // Reset scroll to top when opening a new lang or switching
            // from another lang. After the panel-restructure the scroll
            // container is #info-content, not infoPanel itself, so we
            // reset both (infoPanel for legacy paths, #info-content
            // for the current layout).
            infoPanel.scrollTop = 0;
            const _ic = document.getElementById('info-content');
            if (_ic) _ic.scrollTop = 0;
            _selRetries = 0;
            updateSelectedLabel();
            updateConnectorLine();
            updateHash();  // persist `lang` to URL so reload restores
            if (!lang.meta) {
                loadMeta().then(() => {
                    if (infoPanel.classList.contains('visible') && infoPanel.dataset.code === code) {
                        renderLangInfo(code);
                    }
                }).catch(() => {

                    if (sp) sp.textContent = '⚠';
